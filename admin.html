<style>
  :root {
    --red: #991b1b; --red-dark: #7f1d1d; --ink: #18181b; --muted: #71717a;
    --border: #e4e4e7; --bg: #f8fafc;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); }
  header.topbar { background:#fff; border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; justify-content:space-between; }
  .brand-name { color:var(--red); font-weight:800; font-size:18px; letter-spacing:-0.02em; line-height:1; }
  .brand-sub { color:#a1a1aa; font-size:10px; letter-spacing:0.2em; font-weight:600; margin-top:2px; }
  .btn-logout { font-size:12px; color:#71717a; background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px; cursor:pointer; }
  main { max-width:1100px; margin:0 auto; padding:24px 16px 60px; }

  /* login */
  .login-wrap { max-width:360px; margin:80px auto; background:#fff; border:1px solid var(--border); border-radius:14px; padding:28px; }
  .login-wrap h1 { font-size:16px; margin:0 0 4px; }
  .login-wrap p { font-size:12px; color:#71717a; margin:0 0 18px; }
  .login-wrap input { width:100%; border:1px solid #d4d4d8; border-radius:8px; padding:10px 12px; font-size:14px; margin-bottom:10px; }
  .login-wrap input:focus { outline:none; border-color:var(--red); box-shadow:0 0 0 3px rgba(153,27,27,0.12); }
  .btn-primary { width:100%; background:var(--red); color:#fff; border:none; border-radius:8px; padding:11px; font-size:14px; font-weight:600; cursor:pointer; }
  .btn-primary:hover { background:var(--red-dark); }
  .login-err { background:#fef2f2; color:#b91c1c; font-size:12px; border-radius:8px; padding:8px 10px; margin-bottom:10px; }

  .toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; margin-bottom:16px; }
  select { border:1px solid #d4d4d8; border-radius:8px; padding:8px 10px; font-size:13px; }
  .stat-pill { font-size:12px; color:#71717a; }
  .btn-export { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#fff; background:#047857; border:none; border-radius:8px; padding:8px 14px; cursor:pointer; }
  .btn-export:hover { background:#065f46; }

  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  thead th { text-align:left; font-size:11px; text-transform:uppercase; color:#a1a1aa; background:#fafafa; padding:10px 12px; font-weight:600; }
  tbody td { padding:10px 12px; border-top:1px solid #f4f4f5; font-size:13px; vertical-align:top; }
  tbody tr:hover { background:#fafafa; cursor:pointer; }
  .mono { font-family:ui-monospace,monospace; font-size:12px; color:#52525b; }

  /* Dashboard Piloto */
  .view-tabs { display:flex; gap:4px; margin-bottom:20px; border-bottom:2px solid var(--border); padding-bottom:0; }
  .view-tab { padding:9px 18px; font-size:13px; font-weight:600; cursor:pointer; border:none; background:none; color:var(--muted); border-bottom:3px solid transparent; margin-bottom:-2px; border-radius:0; transition:color 0.15s; }
  .view-tab:hover { color:var(--ink); }
  .view-tab.active { color:var(--red); border-bottom-color:var(--red); }
  .dash-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:24px; }
  .dash-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
  .dash-card .dc-label { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:0.05em; text-transform:uppercase; margin-bottom:6px; }
  .dash-card .dc-value { font-size:26px; font-weight:800; color:var(--ink); line-height:1; }
  .dash-card .dc-sub { font-size:11px; color:var(--muted); margin-top:4px; }
  .dash-card.highlight .dc-value { color:var(--red); }
  .dash-section { background:#fff; border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:18px; }
  .dash-section h3 { margin:0 0 14px; font-size:13px; font-weight:700; color:var(--ink); }
  .dash-table { width:100%; border-collapse:collapse; font-size:13px; }
  .dash-table th { text-align:left; padding:7px 10px; font-size:11px; font-weight:700; color:var(--muted); border-bottom:1px solid var(--border); text-transform:uppercase; letter-spacing:0.04em; }
  .dash-table td { padding:8px 10px; border-bottom:1px solid #f4f4f5; color:var(--ink); }
  .dash-table tr:last-child td { border-bottom:none; }
  .dash-table td.num { text-align:right; font-variant-numeric:tabular-nums; }
  .dash-table th.num { text-align:right; }
  .dash-filters { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
  .dash-filter-btn { padding:6px 14px; font-size:12px; font-weight:600; border:1px solid var(--border); border-radius:8px; background:#fff; cursor:pointer; color:var(--muted); transition:all 0.12s; }
  .dash-filter-btn:hover { border-color:#d4d4d8; color:var(--ink); }
  .dash-filter-btn.active { background:var(--red); color:#fff; border-color:var(--red); }
  .dash-row2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
  .dash-badge { display:inline-block; font-size:11px; font-weight:700; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:2px 8px; color:var(--muted); }
  .dash-fuera { font-size:28px; font-weight:800; color:var(--red); }
  .estado-select { font-size:11px; font-weight:600; border:none; border-radius:6px; padding:4px 8px; cursor:pointer; }
  .empty-msg { text-align:center; padding:50px 20px; color:#a1a1aa; font-size:14px; }

  .detail-row td { background:#fafafa; padding:16px; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:12px; margin-bottom:10px; }
  .detail-link { display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:11px; color:#52525b; word-break:break-all; margin-bottom:10px; }
  .detail-items { font-size:12px; }
  .detail-items div { padding:3px 0; border-bottom:1px dashed #e4e4e7; }
</style>

const ESTADOS = ['Borrador','Cotización generada','Enviada al paciente','Pendiente de pago','Pago informado','Pago validado','Pedido ingresado al sistema','En preparación logística','Despachado','Cerrado','Anulado'];

// --- Criterios de urgencia: pago informado pendiente de ingreso ---
function fechaPagoInformado(c) {
  var hist = Array.isArray(c.historial) ? c.historial : [];
  for (var i = hist.length - 1; i >= 0; i--) {
    if (hist[i] && hist[i].estado === 'Pago informado' && hist[i].fecha) return hist[i].fecha;
  }
  return c.created_at; // respaldo si no hay historial con ese estado
}
function esPagoInformadoPendiente(c) { return c.estado === 'Pago informado'; }
function esUrgente48h(c) {
  if (!esPagoInformadoPendiente(c)) return false;
  var f = fechaPagoInformado(c);
  if (!f) return false;
  return (Date.now() - new Date(f).getTime()) > 48 * 60 * 60 * 1000;
}
var IDX_INGRESADO = ESTADOS.indexOf('Pedido ingresado al sistema');
function estaGestionado(c) {
  return c.estado !== 'Anulado' && ESTADOS.indexOf(c.estado) >= IDX_INGRESADO;
}
function comparaPrioridadUrgencia(a, b) {
  var aInf = esPagoInformadoPendiente(a), bInf = esPagoInformadoPendiente(b);
  if (aInf && !bInf) return -1;
  if (!aInf && bInf) return 1;
  if (aInf && bInf) {
    var aUrg = esUrgente48h(a), bUrg = esUrgente48h(b);
    if (aUrg && !bUrg) return -1;
    if (!aUrg && bUrg) return 1;
    // dentro del mismo grupo: más antiguo primero
    return new Date(fechaPagoInformado(a)).getTime() - new Date(fechaPagoInformado(b)).getTime();
  }
  return 0; // el resto conserva el orden ya existente (created_at desc)
}
let vistaActiva = 'cotizaciones'; // 'cotizaciones' | 'dashboard'
let dashFiltro = 'todo'; // 'hoy' | '7d' | '30d' | 'todo'
function esObservador() { return !!(miPerfil && miPerfil.es_observador); }

function institucionInfo(inst) {
  const s = (inst || '').toUpperCase();
  if (s.indexOf('UNAB') !== -1) return { label: 'UNAB Stgo', color: '#eff6ff;color:#1d4ed8', despacho: 'UNAB Santiago — Echaurren 237', responsable: 'Nicole', codigo: 'UNAB' };
  if (s.indexOf('UDP') !== -1) return { label: 'UDP Stgo', color: '#f5f3ff;color:#6d28d9', despacho: 'UDP Santiago — Av. Ejército Libertador 219', responsable: 'Carla', codigo: 'UDP' };
  if (s.indexOf('MAYOR') !== -1) return { label: 'U Mayor Stgo', color: '#fdf4ff;color:#a21caf', despacho: 'U. Mayor Santiago — Av. Libertador Bernardo O\'Higgins 2013', responsable: 'Nicole', codigo: 'UMAYOR' };
  if (s.indexOf('HOSMIL') !== -1) return { label: 'HOSMIL', color: '#fef2f2;color:#991b1b', despacho: 'Hospital Militar (HOSMIL)', responsable: 'Nicole', codigo: 'HOSMIL' };
  return { label: inst || '-', color: '#f4f4f5;color:#3f3f46', despacho: inst || '-', responsable: '-', codigo: '' };
}

const DOMINIO_POR_CODIGO = {
  HOSMIL: 'https://recetario-hosmil.vercel.app/',
  UNAB: 'https://recetario-unab.vercel.app/',
  UDP: 'https://recetario-udp.vercel.app/',
  UMAYOR: 'https://recetario-umayor.vercel.app/',
};
function linkPublicoDe(c) {
  const inst = institucionInfo(c.institucion);
  const dominio = DOMINIO_POR_CODIGO[inst.codigo];
  // Cotizaciones nuevas: link seguro con token. Cotizaciones antiguas (antes del token): usan el link guardado en su momento.
  if (c.token && dominio) return dominio + '?t=' + encodeURIComponent(c.token);
  return c.link || '';
}

function fmt(n) { return '$' + Math.round(n || 0).toLocaleString('es-CL'); }

function valorSeguro(v) {
  return (v === null || v === undefined || v === '') ? '-' : v;
}

function descuentoEfectivo(it) {
  // Misma lógica usada en la tabla del detalle — fuente única, evita inconsistencias
  if (typeof it.descuento === 'number') {
    return (it.descuento > 1 ? Math.round(it.descuento) : Math.round(it.descuento * 100)) + '%';
  }
  if (typeof it.precioLista === 'number' && it.precioLista > 0 && typeof it.precioFinal === 'number') {
    const pct = Math.round((1 - it.precioFinal / it.precioLista) * 100);
    return pct <= 0 ? '0%' : '≈' + pct + '%';
  }
  return '-';
}
function fechaCorta(iso) {
  try { return new Date(iso).toLocaleString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }); }
  catch (e) { return '-'; }
}
function esc(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderLogin(errMsg) {
  document.getElementById('dashboard-view').style.display = 'none';
  const v = document.getElementById('login-view');
  v.style.display = 'block';
  v.innerHTML =
    '<header class="topbar"><div><div class="brand-name">STRAUMANN</div><div class="brand-sub">GROUP CHILE · NEODENT</div></div></header>' +
    (errorConexion ? '<div style="background:#fff3cd;border:1px solid #fde68a;border-radius:10px;padding:14px 18px;margin:16px;text-align:center;font-size:13px;">⚠️ ' + (errorConexionMsg || 'No se pudo conectar. Puede deberse a firewall, VPN o red corporativa.') + '<br><button onclick="location.reload()" style="margin-top:8px;padding:7px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;">🔄 Reintentar</button></div>' : '') +
    '<div class="login-wrap">' +
      '<h1>Panel Inside Sales</h1>' +
      '<p>Acceso restringido según institución asignada</p>' +
      (errMsg ? '<div class="login-err">⚠️ ' + esc(errMsg) + '</div>' : '') +
      '<input type="email" id="li-email" placeholder="Correo">' +
      '<input type="password" id="li-pass" placeholder="Contraseña">' +
      '<button class="btn-primary" id="li-btn">Iniciar sesión</button>' +
    '</div>';
  document.getElementById('li-btn').addEventListener('click', doLogin);
  document.getElementById('li-pass').addEventListener('keydown', function(e){ if (e.key === 'Enter') doLogin(); });
}

async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pass = document.getElementById('li-pass').value;
  const btn = document.getElementById('li-btn');
  btn.disabled = true; btn.textContent = 'Ingresando...';
  try {
    const { error } = await sb.auth.signInWithPassword({ email: email, password: pass });
    if (error) {
      console.warn('[Admin] Error en signInWithPassword:', error.message, error);
      const msg = (error.message || '').toLowerCase();
      const esRed = msg.includes('failed to fetch') || msg.includes('networkerror') ||
                    msg.includes('load failed') || msg.includes('fetch') ||
                    msg.includes('timeout') || msg.includes('err_failed') ||
                    msg.includes('network') || msg.includes('connect');
      if (esRed) {
        errorConexion = true;
        renderLogin('⚠️ No se pudo conectar con el servidor. Puede deberse a firewall, VPN o red corporativa. Intenta desde otra red o con datos móviles.');
      } else {
        // Credenciales inválidas u otro error de auth
        renderLogin('Correo o contraseña incorrectos.');
      }
    }
  } catch (e) {
    // Error de red que no llegó como { error } sino como excepción JS
    console.warn('[Admin] Excepción en signInWithPassword:', e);
    errorConexion = true;
    renderLogin('⚠️ No se pudo conectar con el servidor. Puede deberse a firewall, VPN o red corporativa. Intenta desde otra red o con datos móviles.');
  }
}

async function doLogout() {
  if (channel) { sb.removeChannel(channel); channel = null; }
  await sb.auth.signOut();
}

async function cargarCotizaciones() {
  try {
    const { data, error } = await sb.from('cotizaciones').select('*').is('deleted_at', null).order('created_at', { ascending: false });
    if (!error && data) {
      cotizaciones = data;
      errorConexion = false;
      errorConexionMsg = '';
    } else if (error) {
      console.warn('[Admin] Error en cargarCotizaciones:', error.message, error);
      const msg = (error.message || '').toLowerCase();
      const code = String(error.code || error.status || '');
      if (msg.includes('failed to fetch') || msg.includes('networkerror') ||
          msg.includes('load failed') || msg.includes('fetch') ||
          msg.includes('network') || msg.includes('timeout') || msg.includes('connect')) {
        errorConexionMsg = 'Error de red o firewall. La consulta no llegó al servidor. Intenta desde otra red o con datos móviles.';
      } else if (code === '401' || code === '403' || msg.includes('permission') ||
                 msg.includes('unauthorized') || msg.includes('rls') || msg.includes('policy')) {
        errorConexionMsg = 'Error de permisos (RLS/Auth). Tu sesión puede haber expirado. Cierra sesión y vuelve a ingresar.';
      } else {
        errorConexionMsg = 'Error al cargar cotizaciones: ' + (error.message || 'error desconocido') + ' (código: ' + (code || '-') + ')';
      }
      // NO limpiar cotizaciones — mantener los datos ya cargados visibles
      errorConexion = true;
    }
  } catch (e) {
    // Excepción JS: red completamente bloqueada
    console.warn('[Admin] Excepción en cargarCotizaciones:', e);
    errorConexionMsg = 'No se pudo conectar con el servidor. Puede deberse a firewall, VPN o red corporativa.';
    // NO limpiar cotizaciones
    errorConexion = true;
  }
  renderDashboard();
}

function suscribirRealtime() {
  if (channel) return;
  try {
    channel = sb.channel('cotizaciones-cambios')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'cotizaciones' }, function () { cargarCotizaciones(); })
      .subscribe(function (status) {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') { channel = null; }
      });
  } catch (e) { channel = null; }
}

async function cambiarEstado(id, nuevoEstado) {
  if (esObservador()) {
    alert('Tu rol es de solo lectura. No puedes cambiar estados.');
    return;
  }
  const row = cotizaciones.find(function (c) { return c.id === id; });
  const historial = (row && row.historial) ? row.historial.slice() : [];
  historial.push({ estado: nuevoEstado, fecha: new Date().toISOString() });
  try {
    const { error } = await sb.rpc('actualizar_estado_cotizacion', { p_id: id, p_estado: nuevoEstado, p_historial: historial });
    if (error) {
      // Error de Supabase (respuesta válida pero con error)
      alert('No se pudo cambiar el estado: ' + (error.message || 'error desconocido') + '\nRecarga la página para verificar el estado actual.');
      errorConexion = true;
      renderDashboard();
    } else {
      // Actualizar localmente y re-renderizar para que color/UI queden consistentes
      if (row) { row.estado = nuevoEstado; }
      renderDashboard();
    }
  } catch (e) {
    // Error de red: Supabase no alcanzable
    alert('⚠️ No se pudo cambiar el estado por un problema de red o firewall.\nEl cambio NO fue guardado. Verifica tu conexión e intenta nuevamente.');
    errorConexion = true;
    renderDashboard();
  }
}

function toggleFila(id) {
  // No alternar si el usuario está seleccionando texto (ej: copiando el número de cotización)
  const sel = window.getSelection ? window.getSelection().toString() : '';
  if (sel.length > 0) return;
  filaAbierta = filaAbierta === id ? null : id;
  renderDashboard();
}

async function verComprobante(path, btn) {
  const original = btn.textContent;
  btn.textContent = 'Abriendo…';
  btn.disabled = true;
  try {
    const { data, error } = await sb.storage.from('comprobantes').createSignedUrl(path, 3600);
    if (error || !data) throw error || new Error('sin url');
    window.open(data.signedUrl, '_blank');
  } catch (e) {
    alert('No se pudo abrir el comprobante. Puede que ya no tengas permiso para esta institución, o el archivo se haya eliminado.');
  }
  btn.textContent = original;
  btn.disabled = false;
}

async function copiarLinkComprobante(path, btn) {
  const original = btn.textContent;
  btn.textContent = 'Generando…';
  btn.disabled = true;
  try {
    const { data, error } = await sb.storage.from('comprobantes').createSignedUrl(path, 604800); // 7 días — link para compartir por correo, uso diferido
    if (error || !data || !data.signedUrl) throw error || new Error('sin url');
    if (navigator.clipboard) { await navigator.clipboard.writeText(data.signedUrl); }
    btn.textContent = '✓ Link copiado';
    setTimeout(function () { btn.textContent = original; btn.disabled = false; }, 1500);
    return;
  } catch (e) {
    alert('No se pudo generar el link del comprobante. Puede que ya no tengas permiso para esta institución, o el archivo se haya eliminado.');
  }
  btn.textContent = original;
  btn.disabled = false;
}

function copiarTexto(value, btn) {
  function done() {
    const original = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(function () { btn.textContent = original; }, 1200);
  }
  if (navigator.clipboard) { navigator.clipboard.writeText(value).then(done).catch(done); }
  else { done(); }
}

async function eliminarCotizacionAnulada(id, btn) {
  if (!esSuperAdmin()) return; // defensa extra en frontend; el RPC igual lo valida server-side
  const confirmado = confirm('Esta acción eliminará definitivamente esta cotización anulada. ¿Confirmas?');
  if (!confirmado) return;

  const original = btn.textContent;
  btn.textContent = 'Eliminando…';
  btn.disabled = true;
  try {
    const { error } = await sb.rpc('eliminar_cotizacion_anulada', { p_id: id });
    if (error) {
      alert('No se pudo eliminar: ' + error.message);
      btn.textContent = original;
      btn.disabled = false;
      return;
    }
    filaAbierta = null; // cierra el detalle expandido de la fila eliminada
    await cargarCotizaciones(); // refresca lista + indicadores superiores + badges automáticamente
  } catch (e) {
    alert('Error de red al intentar eliminar. Intenta de nuevo.');
    btn.textContent = original;
    btn.disabled = false;
  }
}

async function copiarGestionCompleta(id, btn) {
  const c = cotizaciones.find(function (x) { return x.id === id; });
  if (!c) { alert('No se encontró la cotización.'); return; }

  const original = btn.textContent;
  btn.textContent = 'Copiando…';
  btn.disabled = true;

  function finalizar() {
    btn.textContent = '✓ Copiado';
    setTimeout(function () { btn.textContent = original; btn.disabled = false; }, 1200);
  }

  // Sección comprobante: si falla, no rompe el resto del bloque (degradación controlada)
  let comprobanteTxt = '-';
  let comprobanteEsLink = false;
  if (c.comprobante_path) {
    try {
      const { data, error } = await sb.storage.from('comprobantes').createSignedUrl(c.comprobante_path, 604800); // 7 días — link va dentro de correo a Nicole/Customer
      if (error || !data || !data.signedUrl) throw error || new Error('sin url');
      comprobanteTxt = data.signedUrl;
      comprobanteEsLink = true;
    } catch (e) {
      console.warn('[Admin] No se pudo generar link de comprobante para gestión completa:', e);
      comprobanteTxt = 'No se pudo generar link';
    }
  }

  // Datos paciente — SIN "Link de pago"
  const inst = institucionInfo(c.institucion);
  const tel = c.paciente_whatsapp ? ('+56 9 ' + c.paciente_whatsapp) : '-';
  const datosLineas = [
    'Institución: ' + (c.institucion || inst.label || '-'),
    'N° Cotización: ' + valorSeguro(c.numero),
    'Nombre paciente: ' + valorSeguro(c.paciente),
    'RUT paciente: ' + valorSeguro(c.rut),
    'Correo paciente: ' + valorSeguro(c.paciente_email),
    'Dirección paciente: ' + valorSeguro(c.paciente_direccion),
    'Teléfono paciente: ' + tel,
    'Dr. tratante: ' + valorSeguro(c.doctor)
  ];

  // Productos: misma data y misma lógica de descuento que el detalle visual
  // (descuentoEfectivo / fmt), reutilizadas sin modificar
  const items = c.items || [];
  const filasProductosTxt = items.map(function (it) {
    return [
      valorSeguro(it.codigo),
      valorSeguro(it.descripcion),
      'x' + valorSeguro(it.cantidad),
      descuentoEfectivo(it),
      fmt(it.subtotal)
    ].join(' | ');
  });

  // ── Texto plano (fallback si el navegador no soporta ClipboardItem) ──────────
  const textoPlano = [
    datosLineas.join('\n'),
    '',
    'Link comprobante de pago: ' + comprobanteTxt,
    '',
    'PEDIDO / PRODUCTOS',
    'Código | Descripción | Cant. | Dscto. | Subtotal',
    filasProductosTxt.join('\n'),
    '',
    'Total: ' + fmt(c.total)
  ].join('\n');

  // ── HTML — tabla real para que no se descuadre al pegar en correo ───────────
  const filasProductosHtml = items.map(function (it) {
    return '<tr>' +
      '<td style="border:1px solid #ddd;padding:6px;text-align:left;">' + esc(it.codigo) + '</td>' +
      '<td style="border:1px solid #ddd;padding:6px;text-align:left;">' + esc(it.descripcion) + '</td>' +
      '<td style="border:1px solid #ddd;padding:6px;text-align:right;">x' + esc(it.cantidad) + '</td>' +
      '<td style="border:1px solid #ddd;padding:6px;text-align:right;">' + esc(descuentoEfectivo(it)) + '</td>' +
      '<td style="border:1px solid #ddd;padding:6px;text-align:right;">' + esc(fmt(it.subtotal)) + '</td>' +
    '</tr>';
  }).join('');

  const tablaHtml = '<table style="border-collapse:collapse;width:100%;font-family:Arial,sans-serif;font-size:13px;">' +
    '<thead><tr>' +
      '<th style="border:1px solid #ddd;padding:6px;text-align:left;background:#f5f5f5;">Código</th>' +
      '<th style="border:1px solid #ddd;padding:6px;text-align:left;background:#f5f5f5;">Descripción</th>' +
      '<th style="border:1px solid #ddd;padding:6px;text-align:right;background:#f5f5f5;">Cant.</th>' +
      '<th style="border:1px solid #ddd;padding:6px;text-align:right;background:#f5f5f5;">Dscto.</th>' +
      '<th style="border:1px solid #ddd;padding:6px;text-align:right;background:#f5f5f5;">Subtotal</th>' +
    '</tr></thead>' +
    '<tbody>' + filasProductosHtml + '</tbody>' +
  '</table>';

  const comprobanteHtml = comprobanteEsLink
    ? '<a href="' + esc(comprobanteTxt) + '">' + esc(comprobanteTxt) + '</a>'
    : esc(comprobanteTxt);

  const datosHtml = datosLineas.map(function (linea) {
    const idx = linea.indexOf(': ');
    const label = idx >= 0 ? linea.slice(0, idx + 1) : linea;
    const valor = idx >= 0 ? linea.slice(idx + 2) : '';
    return '<div>' + esc(label) + ' ' + esc(valor) + '</div>';
  }).join('');

  // Se usan <br> reales (contenido) en vez de depender solo de margin/padding,
  // porque Gmail/Outlook suelen "limpiar" el HTML pegado y descartan márgenes
  // en divs vacíos — un salto de línea real sobrevive ese proceso.
  const html = '<div style="font-family:Arial,sans-serif;font-size:13px;">' +
    datosHtml +
    '<br><br>' +
    '<div>Link comprobante de pago: ' + comprobanteHtml + '</div>' +
    '<br><br>' +
    '<div style="font-weight:bold;">PEDIDO / PRODUCTOS</div>' +
    '<br>' +
    tablaHtml +
    '<br><br>' +
    '<div style="font-weight:bold;">Total: ' + esc(fmt(c.total)) + '</div>' +
  '</div>';

  // ── Copiar: HTML real (tabla) + texto plano como fallback dentro del mismo portapapeles ──
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      await navigator.clipboard.write([
        new ClipboardItem({
          'text/html': new Blob([html], { type: 'text/html' }),
          'text/plain': new Blob([textoPlano], { type: 'text/plain' })
        })
      ]);
      finalizar();
    } else if (navigator.clipboard) {
      await navigator.clipboard.writeText(textoPlano);
      finalizar();
    } else {
      copiarTexto(textoPlano, btn);
    }
  } catch (e) {
    console.warn('[Admin] Falló copia con formato HTML, reintentando solo texto plano:', e);
    try {
      await navigator.clipboard.writeText(textoPlano);
      finalizar();
    } catch (e2) {
      alert('No se pudo copiar al portapapeles.');
      btn.textContent = original;
      btn.disabled = false;
    }
  }
}

function calcDash(datos) {
  // Usar hora local del navegador para clasificar correctamente con DST de Chile
  // new Date(iso) + getHours/getDay usan la zona horaria configurada en el SO del admin
  function esFueraHorario(iso) {
    var d = new Date(iso);
    var dia = d.getDay(); // 0=dom, 6=sab, en hora local del navegador
    if (dia === 0 || dia === 6) return true;
    var minutos = d.getHours() * 60 + d.getMinutes();
    return minutos < 8 * 60 + 30 || minutos >= 18 * 60 + 30;
  }
  function fmtFecha(iso) {
    var d = new Date(iso);
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }

  var total = datos.length;
  var montoTotal = datos.reduce(function(s,c){ return s + (Number(c.total)||0); }, 0);
  var pedidos = datos.filter(function(c){ return c.estado === 'Pedido ingresado al sistema'; });
  var montoPedidos = pedidos.reduce(function(s,c){ return s + (Number(c.total)||0); }, 0);
  var anuladas = datos.filter(function(c){ return c.estado === 'Anulado'; });
  var pendientes = datos.filter(function(c){
    return c.estado !== 'Pedido ingresado al sistema' && c.estado !== 'Anulado';
  });

  // Por institución
  var porInst = {};
  datos.forEach(function(c) {
    var label = institucionInfo(c.institucion).label;
    if (!porInst[label]) porInst[label] = { n: 0, monto: 0 };
    porInst[label].n++;
    porInst[label].monto += Number(c.total) || 0;
  });

  // Por estado
  var porEstado = {};
  datos.forEach(function(c) {
    var e = c.estado || '(sin estado)';
    if (!porEstado[e]) porEstado[e] = { n: 0, monto: 0 };
    porEstado[e].n++;
    porEstado[e].monto += Number(c.total) || 0;
  });

  // Por día
  var porDia = {};
  datos.forEach(function(c) {
    if (!c.created_at) return;
    var fecha = fmtFecha(c.created_at);
    if (!porDia[fecha]) porDia[fecha] = { n: 0, monto: 0 };
    porDia[fecha].n++;
    porDia[fecha].monto += Number(c.total) || 0;
  });

  // Fuera de horario
  var fuera = datos.filter(function(c){ return c.created_at && esFueraHorario(c.created_at); });

  function pct(val, tot) {
    if (!tot) return '0%';
    var p = (val / tot * 100);
    return (Number.isInteger(p) ? p : p.toFixed(1)) + '%';
  }

  // Serie de evolución ordenada para el gráfico
  var serieEvolucion = Object.keys(porDia).sort().map(function(fecha, i, arr) {
    return { fecha: fecha, n: porDia[fecha].n };
  });
  var acum = 0;
  serieEvolucion.forEach(function(s) { acum += s.n; s.acum = acum; });

  // Implantes cotizados: clasificar por descripción del ítem
  // Regla: descripción empieza con "implante" (case-insensitive) y NO contiene "por implante"
  // (los autos-agregados usan frases como "agregado automático por implante" / "precio especial por implante")
  // Straumann: descripción además contiene "straumann" — cubre BLT, BLC, BLX
  // Neodent: cumple la regla de implante pero no contiene "straumann"
  var implantesNeodent = 0, implantesStraumann = 0;
  datos.forEach(function(cot) {
    (cot.items || []).forEach(function(it) {
      var desc = (it.descripcion || '').toLowerCase().trimStart();
      if (!desc.startsWith('implante')) return;
      if (desc.includes('por implante')) return;       // excluir autos-agregados y precios especiales
      var cant = parseInt(it.cantidad, 10) || 1;
      if (desc.includes('straumann')) {
        implantesStraumann += cant;
      } else {
        implantesNeodent += cant;
      }
    });
  });
  var implantesTotal = implantesNeodent + implantesStraumann;

  // Monto pendiente por convertir
  var montoPendiente = pendientes.reduce(function(s,c){ return s + (Number(c.total)||0); }, 0);

  // Pendientes con más de 48 horas desde su creación
  var ahora48 = Date.now();
  var MS_48H = 48 * 60 * 60 * 1000;
  var pendientes48h = pendientes.filter(function(c) {
    if (!c.created_at) return false;
    return (ahora48 - new Date(c.created_at).getTime()) > MS_48H;
  }).length;

  // Por institución enriquecida
  var porInstEnriq = {};
  datos.forEach(function(c) {
    var label = institucionInfo(c.institucion).label;
    if (!porInstEnriq[label]) porInstEnriq[label] = { n: 0, pedidos: 0, montoCot: 0, montoIng: 0 };
    var r = porInstEnriq[label];
    r.n++;
    r.montoCot += Number(c.total) || 0;
    if (c.estado === 'Pedido ingresado al sistema') { r.pedidos++; r.montoIng += Number(c.total) || 0; }
  });

  return {
    total: total, montoTotal: montoTotal,
    pedidos: pedidos.length, montoPedidos: montoPedidos,
    anuladas: anuladas.length, pendientes: pendientes.length,
    montoPendiente: montoPendiente, pendientes48h: pendientes48h,
    porInst: porInst, porInstEnriq: porInstEnriq, porEstado: porEstado,
    porDia: porDia, fuera: fuera.length,
    pctPedidos: pct(pedidos.length, total),
    pctPendientes: pct(pendientes.length, total),
    pctAnuladas: pct(anuladas.length, total),
    pctFuera: pct(fuera.length, total),
    serieEvolucion: serieEvolucion,
    implantesNeodent: implantesNeodent,
    implantesStraumann: implantesStraumann,
    implantesTotal: implantesTotal,
    pctImplantesNeodent: pct(implantesNeodent, implantesTotal),
    pctImplantesStraumann: pct(implantesStraumann, implantesTotal)
  };
}

function filtrarPorPeriodo(datos, periodo) {
  var ahora = new Date();
  var limite = null;
  if (periodo === 'hoy') {
    limite = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
  } else if (periodo === '7d') {
    limite = new Date(ahora.getTime() - 7 * 24 * 60 * 60 * 1000);
  } else if (periodo === '30d') {
    limite = new Date(ahora.getTime() - 30 * 24 * 60 * 60 * 1000);
  }
  if (!limite) return datos;
  return datos.filter(function(c) {
    return c.created_at && new Date(c.created_at) >= limite;
  });
}

function renderGraficoEvolucion(serie) {
  if (!serie || serie.length === 0) {
    return '<div class="dash-section"><h3>Evolución de cotizaciones</h3>' +
      '<div style="color:var(--muted);font-size:13px;padding:24px 0;text-align:center;">Sin datos para el período seleccionado.</div></div>';
  }

  var W = 680, H = 200, PL = 38, PR = 16, PT = 18, PB = 36;
  var iW = W - PL - PR, iH = H - PT - PB;

  var maxN = Math.max.apply(null, serie.map(function(s){ return s.n; }));
  var maxA = Math.max.apply(null, serie.map(function(s){ return s.acum; }));
  // Escalar la línea diaria sobre eje izquierdo (max = max diario * 1.2 para aire)
  var scaleY_n = maxN > 0 ? iH / (maxN * 1.2) : iH;
  // Escalar acumulado sobre eje derecho (independiente)
  var scaleY_a = maxA > 0 ? iH / (maxA * 1.1) : iH;

  var n = serie.length;
  function xPos(i) { return PL + (n === 1 ? iW / 2 : i * iW / (n - 1)); }
  function yN(val)  { return PT + iH - val * scaleY_n; }
  function yA(val)  { return PT + iH - val * scaleY_a; }

  // Polylines
  var ptsN = serie.map(function(s, i){ return xPos(i).toFixed(1) + ',' + yN(s.n).toFixed(1); }).join(' ');
  var ptsA = serie.map(function(s, i){ return xPos(i).toFixed(1) + ',' + yA(s.acum).toFixed(1); }).join(' ');

  // Etiquetas eje X (mostrar máx 8 labels para no amontonar)
  var step = Math.max(1, Math.ceil(n / 8));
  var xLabels = '';
  serie.forEach(function(s, i) {
    if (i % step !== 0 && i !== n - 1) return;
    var label = s.fecha.slice(5); // MM-DD
    xLabels += '<text x="' + xPos(i).toFixed(1) + '" y="' + (H - 6) + '" text-anchor="middle" font-size="10" fill="#a1a1aa">' + label + '</text>';
  });

  // Etiquetas eje Y izquierdo (4 niveles)
  var yLabels = '';
  for (var l = 0; l <= 4; l++) {
    var val = Math.round(maxN * 1.2 * l / 4);
    var y = PT + iH - (val * scaleY_n);
    yLabels += '<text x="' + (PL - 4) + '" y="' + (y + 3).toFixed(1) + '" text-anchor="end" font-size="9" fill="#a1a1aa">' + val + '</text>';
    yLabels += '<line x1="' + PL + '" y1="' + y.toFixed(1) + '" x2="' + (W - PR) + '" y2="' + y.toFixed(1) + '" stroke="#f0f0f0" stroke-width="1"/>';
  }

  // Puntos en línea diaria (visibles si pocos datos)
  var dots = n <= 14 ? serie.map(function(s, i) {
    return '<circle cx="' + xPos(i).toFixed(1) + '" cy="' + yN(s.n).toFixed(1) + '" r="3" fill="#991b1b"/>';
  }).join('') : '';

  var svg =
    '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:' + W + 'px;display:block;">' +
    yLabels +
    '<polyline points="' + ptsA + '" fill="none" stroke="#d4d4d8" stroke-width="1.5" stroke-dasharray="4 3"/>' +
    '<polyline points="' + ptsN + '" fill="none" stroke="#991b1b" stroke-width="2"/>' +
    dots +
    xLabels +
    '</svg>';

  // Leyenda
  var leyenda =
    '<div style="display:flex;gap:20px;font-size:11px;color:var(--muted);margin-top:6px;">' +
    '<span style="display:flex;align-items:center;gap:5px;"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="#991b1b" stroke-width="2"/></svg> Cotizaciones / día</span>' +
    '<span style="display:flex;align-items:center;gap:5px;"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="#d4d4d8" stroke-width="1.5" stroke-dasharray="4 3"/></svg> Acumulado</span>' +
    '</div>';

  return '<div class="dash-section"><h3>Evolución de cotizaciones</h3>' + svg + leyenda + '</div>';
}

  v.innerHTML =

    '<div style="display:flex;align-items:center;gap:12px;"><span style="font-size:10px;color:#a1a1aa;">by Daniel Jordán</span><button class="btn-logout" id="btn-logout">Cerrar sesión</button></div></header>' +
    '<main>' +
    tabsHtml +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">' +
    '<h2 style="margin:0;font-size:18px;">Dashboard Piloto</h2>' +

    '<p style="margin:0 0 18px;font-size:12px;color:var(--muted);">Métricas basadas en cotizaciones cargadas. Zona horaria: Chile (UTC-3 aprox.)</p>' +

function renderDashboard() {
  document.getElementById('login-view').style.display = 'none';
  const v = document.getElementById('dashboard-view');
  v.style.display = 'block';

  const visibles = cotizaciones.filter(function (c) {
    const matchEstado = estadoFiltro === 'Todos' || c.estado === estadoFiltro;
    const matchInst = institucionFiltro === 'Todas' || institucionInfo(c.institucion).label === institucionFiltro;
    const matchUrgencia =
      filtroUrgencia === 'Todos' ? true :
      filtroUrgencia === 'PagoInformado' ? esPagoInformadoPendiente(c) :
      filtroUrgencia === 'Urgente48h' ? esUrgente48h(c) :
      filtroUrgencia === 'Gestionados' ? estaGestionado(c) : true;
    return matchEstado && matchInst && matchUrgencia;
  }).sort(comparaPrioridadUrgencia);

  // Indicadores superiores: siempre sobre el universo filtrado por institución
  // (no por estadoFiltro/filtroUrgencia), para que el número no desaparezca
  // al estar mirando otro filtro.
  const universoIndicadores = cotizaciones.filter(function (c) {
    return institucionFiltro === 'Todas' || institucionInfo(c.institucion).label === institucionFiltro;
  });
  const countPagoInformado = universoIndicadores.filter(esPagoInformadoPendiente).length;
  const countUrgente48h = universoIndicadores.filter(esUrgente48h).length;

          (esSuperAdmin() && c.estado === 'Anulado'
            ? '<div style="margin-bottom:10px;"><button class="btn-logout" style="color:#b91c1c;border-color:#fecaca;" onclick="eliminarCotizacionAnulada(\'' + c.id + '\', this)">🗑️ Eliminar anulado</button></div>'
            : '') +
          (function () { const lp = linkPublicoDe(c); return lp ? '<div class="detail-link"><span>' + esc(lp) + '</span><button class="btn-logout" onclick="copiarTexto(\'' + lp.replace(/'/g,"\\'") + '\', this)">Copiar link</button></div>' : ''; })() +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">' +
            '<span style="font-size:11px;font-weight:700;color:#a1a1aa;text-transform:uppercase;">Productos (para ingresar el pedido)</span>' +
            '<button class="btn-logout" onclick="copiarTexto(\'' + codigosParaCopiar.replace(/'/g,"\\'").replace(/\n/g,'\\n') + '\', this)">📋 Copiar solo los códigos</button>' +

    '<header class="topbar"><div><div class="brand-name">STRAUMANN</div><div class="brand-sub">GROUP CHILE · NEODENT</div></div>' +
    '<div style="display:flex;align-items:center;gap:12px;"><span style="font-size:10px;color:#a1a1aa;">by Daniel Jordán</span><button class="btn-logout" id="btn-logout">Cerrar sesión</button></div></header>' +
    (errorConexion ? '<div style="background:#fff3cd;border:1px solid #fde68a;border-radius:10px;padding:14px 18px;margin:16px;text-align:center;font-size:13px;">⚠️ ' + (errorConexionMsg || 'Sin conexión con el servidor.') + ' Los datos mostrados pueden no estar actualizados.<br><button onclick="errorConexion=false;errorConexionMsg=\'\';cargarCotizaciones();" style="margin-top:8px;padding:7px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;">🔄 Reintentar</button></div>' : '') +

        '<span class="stat-pill">' + visibles.length + ' de ' + cotizaciones.length + ' cotizaciones</span>' +

          '<select id="filtro-institucion"></select>' +

        '<table><thead><tr><th>Institución</th><th>N° Cotización</th><th>Paciente</th><th>Doctor</th><th>Fecha</th><th style="text-align:right;">Total</th><th>Estado</th></tr></thead>' +
        '<tbody>' + filasHtml + '</tbody></table>' +

  const selInst = document.getElementById('filtro-institucion');
  const labelsPresentes = Array.from(new Set(cotizaciones.map(function (c) { return institucionInfo(c.institucion).label; }))).sort();

  const sel = document.getElementById('filtro-estado');
  let opts = '<option value="Todos">Todos los estados</option>';

  sel.addEventListener('change', function (e) { estadoFiltro = e.target.value; renderDashboard(); });
  document.getElementById('btn-logout').addEventListener('click', doLogout);
  document.getElementById('btn-exportar').addEventListener('click', function () { exportarExcel(visibles); });
}

sb.auth.onAuthStateChange(function (event, session) {
  if (session) {
    suscribirRealtime();
    cargarMiPerfil().then(cargarCotizaciones);
  } else {
    miPerfil = null;
    if (channel) { sb.removeChannel(channel); channel = null; }
    renderLogin();
  }
});

async function cargarMiPerfil() {
  try {
    const { data: userData } = await sb.auth.getUser();
    if (!userData || !userData.user) { miPerfil = null; return; }
    const { data, error } = await sb.from('admin_perfiles')
      .select('es_super_admin, es_observador')
      .eq('user_id', userData.user.id)
      .maybeSingle();
    miPerfil = (!error && data) ? data : null;
  } catch (e) {
    miPerfil = null;
  }
}

(async function init() {
  const { data } = await sb.auth.getSession();
  if (data && data.session) {
    await cargarMiPerfil();
    suscribirRealtime();
    cargarCotizaciones();
  } else {
    renderLogin();
  }
})();
</script>
