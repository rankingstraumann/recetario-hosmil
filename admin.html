<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Inside Sales | Straumann Group Chile</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --red: #991b1b; --red-dark: #7f1d1d; --ink: #18181b; --muted: #71717a;
    --border: #e4e4e7; --bg: #f8fafc;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); }
  header.topbar { background:#fff; border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; justify-content:space-between; }
  .brand-name { color:var(--red); font-weight:800; font-size:18px; letter-spacing:-0.02em; line-height:1; }
  .brand-sub { color:#a1a1aa; font-size:10px; letter-spacing:0.2em; font-weight:600; margin-top:2px; }
  .btn-logout { font-size:12px; color:#71717a; background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px; cursor:pointer; }
  main { max-width:1100px; margin:0 auto; padding:24px 16px 60px; }

  /* login */
  .login-wrap { max-width:360px; margin:80px auto; background:#fff; border:1px solid var(--border); border-radius:14px; padding:28px; }
  .login-wrap h1 { font-size:16px; margin:0 0 4px; }
  .login-wrap p { font-size:12px; color:#71717a; margin:0 0 18px; }
  .login-wrap input { width:100%; border:1px solid #d4d4d8; border-radius:8px; padding:10px 12px; font-size:14px; margin-bottom:10px; }
  .login-wrap input:focus { outline:none; border-color:var(--red); box-shadow:0 0 0 3px rgba(153,27,27,0.12); }
  .btn-primary { width:100%; background:var(--red); color:#fff; border:none; border-radius:8px; padding:11px; font-size:14px; font-weight:600; cursor:pointer; }
  .btn-primary:hover { background:var(--red-dark); }
  .login-err { background:#fef2f2; color:#b91c1c; font-size:12px; border-radius:8px; padding:8px 10px; margin-bottom:10px; }

  .toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; margin-bottom:16px; }
  select { border:1px solid #d4d4d8; border-radius:8px; padding:8px 10px; font-size:13px; }
  .stat-pill { font-size:12px; color:#71717a; }
  .btn-export { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#fff; background:#047857; border:none; border-radius:8px; padding:8px 14px; cursor:pointer; }
  .btn-export:hover { background:#065f46; }

  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  thead th { text-align:left; font-size:11px; text-transform:uppercase; color:#a1a1aa; background:#fafafa; padding:10px 12px; font-weight:600; }
  tbody td { padding:10px 12px; border-top:1px solid #f4f4f5; font-size:13px; vertical-align:top; }
  tbody tr:hover { background:#fafafa; cursor:pointer; }
  .mono { font-family:ui-monospace,monospace; font-size:12px; color:#52525b; }
  .estado-select { font-size:11px; font-weight:600; border:none; border-radius:6px; padding:4px 8px; cursor:pointer; }
  .empty-msg { text-align:center; padding:50px 20px; color:#a1a1aa; font-size:14px; }

  .detail-row td { background:#fafafa; padding:16px; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:12px; margin-bottom:10px; }
  .detail-link { display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:11px; color:#52525b; word-break:break-all; margin-bottom:10px; }
  .detail-items { font-size:12px; }
  .detail-items div { padding:3px 0; border-bottom:1px dashed #e4e4e7; }
</style>
</head>
<body>

<div id="login-view"></div>
<div id="dashboard-view" style="display:none;"></div>

<script>
const SUPABASE_URL = 'https://gzimllusbxjorbsbtsse.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6aW1sbHVzYnhqb3Jic2J0c3NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDQ4NDcsImV4cCI6MjA5NzUyMDg0N30.DFq-_PY10hyr2QmMUXk-v8VW2LKYz3bAW37VCutwmzY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ESTADOS = ['Borrador','Cotización generada','Enviada al paciente','Pendiente de pago','Pago informado','Pago validado','Pedido ingresado al sistema','En preparación logística','Despachado','Cerrado','Anulado'];
const ESTADO_COLOR = {
  'Borrador': '#f4f4f5;color:#3f3f46',
  'Cotización generada': '#eff6ff;color:#1d4ed8',
  'Enviada al paciente': '#eef2ff;color:#4338ca',
  'Pendiente de pago': '#fffbeb;color:#92400e',
  'Pago informado': '#fef3c7;color:#92400e',
  'Pago validado': '#ecfdf5;color:#047857',
  'Pedido ingresado al sistema': '#d1fae5;color:#065f46',
  'En preparación logística': '#f0f9ff;color:#0369a1',
  'Despachado': '#f5f3ff;color:#6d28d9',
  'Cerrado': '#f4f4f5;color:#52525b',
  'Anulado': '#fef2f2;color:#b91c1c'
};

let cotizaciones = [];
let estadoFiltro = 'Todos';
let institucionFiltro = 'Todas';
let filaAbierta = null;
let channel = null;
let errorConexion = false;

function institucionInfo(inst) {
  const s = (inst || '').toUpperCase();
  if (s.indexOf('UNAB') !== -1) return { label: 'UNAB Stgo', color: '#eff6ff;color:#1d4ed8', despacho: 'UNAB Santiago — Echaurren 237', responsable: 'Nicole', codigo: 'UNAB' };
  if (s.indexOf('UDP') !== -1) return { label: 'UDP Stgo', color: '#f5f3ff;color:#6d28d9', despacho: 'UDP Santiago — Av. Ejército Libertador 219', responsable: 'Carla', codigo: 'UDP' };
  if (s.indexOf('MAYOR') !== -1) return { label: 'U Mayor Stgo', color: '#fdf4ff;color:#a21caf', despacho: 'U. Mayor Santiago — Av. Libertador Bernardo O\'Higgins 2013', responsable: 'Nicole', codigo: 'UMAYOR' };
  if (s.indexOf('HOSMIL') !== -1) return { label: 'HOSMIL', color: '#fef2f2;color:#991b1b', despacho: 'Hospital Militar (HOSMIL)', responsable: 'Nicole', codigo: 'HOSMIL' };
  return { label: inst || '-', color: '#f4f4f5;color:#3f3f46', despacho: inst || '-', responsable: '-', codigo: '' };
}

const DOMINIO_POR_CODIGO = {
  HOSMIL: 'https://recetario-hosmil.vercel.app/',
  UNAB: 'https://recetario-unab.vercel.app/',
  UDP: 'https://recetario-udp.vercel.app/',
  UMAYOR: 'https://recetario-umayor.vercel.app/',
};
function linkPublicoDe(c) {
  const inst = institucionInfo(c.institucion);
  const dominio = DOMINIO_POR_CODIGO[inst.codigo];
  // Cotizaciones nuevas: link seguro con token. Cotizaciones antiguas (antes del token): usan el link guardado en su momento.
  if (c.token && dominio) return dominio + '?t=' + encodeURIComponent(c.token);
  return c.link || '';
}

function fmt(n) { return '$' + Math.round(n || 0).toLocaleString('es-CL'); }
function fechaCorta(iso) {
  try { return new Date(iso).toLocaleString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }); }
  catch (e) { return '-'; }
}
function esc(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderLogin(errMsg) {
  document.getElementById('dashboard-view').style.display = 'none';
  const v = document.getElementById('login-view');
  v.style.display = 'block';
  v.innerHTML =
    '<header class="topbar"><div><div class="brand-name">STRAUMANN</div><div class="brand-sub">GROUP CHILE · NEODENT</div></div></header>' +
    (errorConexion ? '<div style="background:#fff3cd;border:1px solid #fde68a;border-radius:10px;padding:14px 18px;margin:16px;text-align:center;font-size:13px;">⚠️ <strong>Sin conexión con el servidor.</strong> Puede deberse a firewall, VPN o red corporativa.<br><button onclick="location.reload()" style="margin-top:8px;padding:7px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;">🔄 Reintentar</button></div>' : '') +
    '<div class="login-wrap">' +
      '<h1>Panel Inside Sales</h1>' +
      '<p>Acceso restringido según institución asignada</p>' +
      (errMsg ? '<div class="login-err">⚠️ ' + esc(errMsg) + '</div>' : '') +
      '<input type="email" id="li-email" placeholder="Correo">' +
      '<input type="password" id="li-pass" placeholder="Contraseña">' +
      '<button class="btn-primary" id="li-btn">Iniciar sesión</button>' +
    '</div>';
  document.getElementById('li-btn').addEventListener('click', doLogin);
  document.getElementById('li-pass').addEventListener('keydown', function(e){ if (e.key === 'Enter') doLogin(); });
}

async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pass = document.getElementById('li-pass').value;
  const btn = document.getElementById('li-btn');
  btn.disabled = true; btn.textContent = 'Ingresando...';
  try {
    const { error } = await sb.auth.signInWithPassword({ email: email, password: pass });
    if (error) {
      console.warn('[Admin] Error en signInWithPassword:', error.message, error);
      const msg = (error.message || '').toLowerCase();
      const esRed = msg.includes('failed to fetch') || msg.includes('networkerror') ||
                    msg.includes('load failed') || msg.includes('fetch') ||
                    msg.includes('timeout') || msg.includes('err_failed') ||
                    msg.includes('network') || msg.includes('connect');
      if (esRed) {
        errorConexion = true;
        renderLogin('⚠️ No se pudo conectar con el servidor. Puede deberse a firewall, VPN o red corporativa. Intenta desde otra red o con datos móviles.');
      } else {
        // Credenciales inválidas u otro error de auth
        renderLogin('Correo o contraseña incorrectos.');
      }
    }
  } catch (e) {
    // Error de red que no llegó como { error } sino como excepción JS
    console.warn('[Admin] Excepción en signInWithPassword:', e);
    errorConexion = true;
    renderLogin('⚠️ No se pudo conectar con el servidor. Puede deberse a firewall, VPN o red corporativa. Intenta desde otra red o con datos móviles.');
  }
}

async function doLogout() {
  if (channel) { sb.removeChannel(channel); channel = null; }
  await sb.auth.signOut();
}

async function cargarCotizaciones() {
  try {
    const { data, error } = await sb.from('cotizaciones').select('*').order('created_at', { ascending: false });
    if (!error && data) { cotizaciones = data; errorConexion = false; }
    else if (error) { errorConexion = true; }
  } catch (e) { errorConexion = true; }
  renderDashboard();
}

function suscribirRealtime() {
  if (channel) return;
  try {
    channel = sb.channel('cotizaciones-cambios')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'cotizaciones' }, function () { cargarCotizaciones(); })
      .subscribe(function (status) {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') { channel = null; }
      });
  } catch (e) { channel = null; }
}

async function cambiarEstado(id, nuevoEstado) {
  const row = cotizaciones.find(function (c) { return c.id === id; });
  const historial = (row && row.historial) ? row.historial.slice() : [];
  historial.push({ estado: nuevoEstado, fecha: new Date().toISOString() });
  try {
    const { error } = await sb.rpc('actualizar_estado_cotizacion', { p_id: id, p_estado: nuevoEstado, p_historial: historial });
    if (error) {
      // Error de Supabase (respuesta válida pero con error)
      alert('No se pudo cambiar el estado: ' + (error.message || 'error desconocido') + '\nRecarga la página para verificar el estado actual.');
      errorConexion = true;
      renderDashboard();
    } else {
      // Actualizar localmente y re-renderizar para que color/UI queden consistentes
      if (row) { row.estado = nuevoEstado; }
      renderDashboard();
    }
  } catch (e) {
    // Error de red: Supabase no alcanzable
    alert('⚠️ No se pudo cambiar el estado por un problema de red o firewall.\nEl cambio NO fue guardado. Verifica tu conexión e intenta nuevamente.');
    errorConexion = true;
    renderDashboard();
  }
}

function toggleFila(id) {
  filaAbierta = filaAbierta === id ? null : id;
  renderDashboard();
}

async function verComprobante(path, btn) {
  const original = btn.textContent;
  btn.textContent = 'Abriendo…';
  btn.disabled = true;
  try {
    const { data, error } = await sb.storage.from('comprobantes').createSignedUrl(path, 3600);
    if (error || !data) throw error || new Error('sin url');
    window.open(data.signedUrl, '_blank');
  } catch (e) {
    alert('No se pudo abrir el comprobante. Puede que ya no tengas permiso para esta institución, o el archivo se haya eliminado.');
  }
  btn.textContent = original;
  btn.disabled = false;
}

function copiarTexto(value, btn) {
  function done() {
    const original = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(function () { btn.textContent = original; }, 1200);
  }
  if (navigator.clipboard) { navigator.clipboard.writeText(value).then(done).catch(done); }
  else { done(); }
}

function exportarExcel(rows) {
  if (!rows.length) { alert('No hay cotizaciones para exportar con los filtros actuales.'); return; }

  const hojaCotizaciones = rows.map(function (c) {
    const inst = institucionInfo(c.institucion);
    return {
      'Institución': inst.label,
      'Responsable': inst.responsable,
      'N° Cotización': c.numero,
      'Paciente': c.paciente,
      'RUT': c.rut || '',
      'Doctor': c.doctor,
      'Fecha': fechaCorta(c.fecha),
      'Correo paciente': c.paciente_email || '',
      'WhatsApp paciente': c.paciente_whatsapp ? '+56 9 ' + c.paciente_whatsapp : '',
      'Dirección facturación': c.paciente_direccion || '',
      'Observaciones': c.observaciones || '',
      'Cant. ítems': (c.items || []).reduce(function (s, it) { return s + (Number(it.cantidad) || 0); }, 0),
      'Total': Number(c.total) || 0,
      'Estado': c.estado,
      'Fecha de cirugía': c.fecha_cirugia || '',
      'Comprobante subido': c.comprobante_path ? 'Sí' : 'No',
      'Link cotización': linkPublicoDe(c)
    };
  });

  const hojaItems = [];
  rows.forEach(function (c) {
    const inst = institucionInfo(c.institucion);
    (c.items || []).forEach(function (it) {
      hojaItems.push({
        'N° Cotización': c.numero,
        'Institución': inst.label,
        'Código': it.codigo,
        'Descripción': it.descripcion,
        'Cantidad': Number(it.cantidad) || 0,
        'Subtotal': Number(it.subtotal) || 0
      });
    });
  });

  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.json_to_sheet(hojaCotizaciones);
  ws1['!cols'] = [{wch:12},{wch:12},{wch:24},{wch:20},{wch:14},{wch:16},{wch:18},{wch:26},{wch:16},{wch:30},{wch:30},{wch:10},{wch:12},{wch:18},{wch:14},{wch:42}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Cotizaciones');

  const ws2 = XLSX.utils.json_to_sheet(hojaItems);
  ws2['!cols'] = [{wch:24},{wch:12},{wch:16},{wch:42},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Detalle Items');

  const ahora = new Date();
  const pad2 = function (n) { return String(n).padStart(2, '0'); };
  const fechaArchivo = ahora.getFullYear() + pad2(ahora.getMonth()+1) + pad2(ahora.getDate());
  const sufijoInst = institucionFiltro !== 'Todas' ? '_' + institucionFiltro.replace(/\s+/g,'') : '';
  const sufijoEstado = estadoFiltro !== 'Todos' ? '_' + estadoFiltro.replace(/\s+/g,'') : '';
  XLSX.writeFile(wb, 'Reporte_Cotizaciones_' + fechaArchivo + sufijoInst + sufijoEstado + '.xlsx');
}

function renderDashboard() {
  document.getElementById('login-view').style.display = 'none';
  const v = document.getElementById('dashboard-view');
  v.style.display = 'block';

  const visibles = cotizaciones.filter(function (c) {
    const matchEstado = estadoFiltro === 'Todos' || c.estado === estadoFiltro;
    const matchInst = institucionFiltro === 'Todas' || institucionInfo(c.institucion).label === institucionFiltro;
    return matchEstado && matchInst;
  });

  let filasHtml = '';
  if (visibles.length === 0) {
    filasHtml = '<tr><td colspan="7"><div class="empty-msg">No hay cotizaciones' + (estadoFiltro !== 'Todos' ? ' con estado "' + esc(estadoFiltro) + '"' : ' todavía') + '.</div></td></tr>';
  } else {
    visibles.forEach(function (c) {
      const colorStyle = ESTADO_COLOR[c.estado] || '#f4f4f5;color:#3f3f46';
      const inst = institucionInfo(c.institucion);
      let estadoOpts = '';
      ESTADOS.forEach(function (e) { estadoOpts += '<option value="' + esc(e) + '"' + (c.estado === e ? ' selected' : '') + '>' + esc(e) + '</option>'; });

      filasHtml += '<tr onclick="toggleFila(\'' + c.id + '\')">' +
        '<td><span style="font-size:10px;font-weight:700;border-radius:6px;padding:3px 7px;background:' + inst.color + '">' + esc(inst.label) + '</span><br><span style="font-size:10px;color:#a1a1aa;margin-top:2px;display:inline-block;">' + esc(inst.responsable) + '</span></td>' +
        '<td class="mono">' + esc(c.numero) + '</td>' +
        '<td>' + esc(c.paciente) + (c.rut ? '<br><span style="color:#a1a1aa;">' + esc(c.rut) + '</span>' : '') + '</td>' +
        '<td>' + esc(c.doctor) + '</td>' +
        '<td>' + fechaCorta(c.fecha) + '</td>' +
        '<td style="text-align:right;font-weight:600;">' + fmt(c.total) + '</td>' +
        '<td onclick="event.stopPropagation()">' +
          '<select class="estado-select" style="background:' + colorStyle + '" onchange="cambiarEstado(\'' + c.id + '\', this.value)">' + estadoOpts + '</select>' +
        '</td>' +
      '</tr>';

      if (filaAbierta === c.id) {
        const itemsRows = (c.items || []).map(function (it) {
          const dto = (typeof it.descuento === 'number') ? Math.round(it.descuento * 100) + '%' : '-';
          return '<tr>' +
            '<td style="padding:6px 10px 6px 0;font-weight:700;font-family:ui-monospace,monospace;white-space:nowrap;">' + esc(it.codigo) + '</td>' +
            '<td style="padding:6px 10px;font-weight:700;">' + esc(it.descripcion) + '</td>' +
            '<td style="padding:6px 10px;text-align:center;">x' + it.cantidad + '</td>' +
            '<td style="padding:6px 10px;text-align:center;">' + dto + '</td>' +
            '<td style="padding:6px 0 6px 10px;text-align:right;white-space:nowrap;">' + fmt(it.subtotal) + '</td>' +
          '</tr>';
        }).join('');
        const itemsHtml = '<table style="width:100%;border-collapse:collapse;font-size:12px;">' +
          '<thead><tr style="color:#a1a1aa;font-size:10px;text-transform:uppercase;text-align:left;">' +
            '<th style="padding:2px 10px 6px 0;">Código</th><th style="padding:2px 10px 6px;">Descripción</th>' +
            '<th style="padding:2px 10px 6px;text-align:center;">Cant.</th><th style="padding:2px 10px 6px;text-align:center;">Dscto.</th>' +
            '<th style="padding:2px 0 6px 10px;text-align:right;">Subtotal</th>' +
          '</tr></thead>' +
          '<tbody style="border-top:1px solid #e4e4e7;">' + itemsRows + '</tbody>' +
        '</table>';
        const codigosParaCopiar = (c.items || []).map(function (it) { return it.codigo; }).join('\n');
        filasHtml += '<tr class="detail-row"><td colspan="7">' +
          '<div class="detail-grid">' +
            '<div><strong>Institución:</strong> ' + esc(c.institucion) + '</div>' +
            '<div><strong>Ejecutiva responsable:</strong> ' + esc(inst.responsable) + '</div>' +
            '<div><strong>Correo paciente:</strong> ' + esc(c.paciente_email || '-') + '</div>' +
            '<div><strong>WhatsApp paciente:</strong> ' + (c.paciente_whatsapp ? '+56 9 ' + esc(c.paciente_whatsapp) : '-') + '</div>' +
            '<div><strong>Dirección (facturación):</strong> ' + esc(c.paciente_direccion || '-') + '</div>' +
            '<div style="grid-column:1/-1;"><strong>Observaciones:</strong> ' + esc(c.observaciones || '-') + '</div>' +
          (c.fecha_cirugia ? '<div><strong>Fecha de cirugía:</strong> ' + esc(c.fecha_cirugia) + '</div>' : '') +
          '</div>' +
          '<div style="font-size:11px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:6px 10px;margin-bottom:10px;display:inline-block;">📦 Despacho siempre a ' + esc(inst.despacho) + ', independiente de la dirección de facturación.</div>' +
          (c.comprobante_path ? '<div style="margin-bottom:10px;"><button class="btn-logout" onclick="verComprobante(\'' + c.comprobante_path.replace(/'/g,"\\'") + '\', this)">📎 Ver comprobante de pago</button></div>' : '') +
          (function () { const lp = linkPublicoDe(c); return lp ? '<div class="detail-link"><span>' + esc(lp) + '</span><button class="btn-logout" onclick="copiarTexto(\'' + lp.replace(/'/g,"\\'") + '\', this)">Copiar link</button></div>' : ''; })() +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">' +
            '<span style="font-size:11px;font-weight:700;color:#a1a1aa;text-transform:uppercase;">Productos (para ingresar el pedido)</span>' +
            '<button class="btn-logout" onclick="copiarTexto(\'' + codigosParaCopiar.replace(/'/g,"\\'").replace(/\n/g,'\\n') + '\', this)">📋 Copiar solo los códigos</button>' +
          '</div>' +
          '<div class="detail-items">' + itemsHtml + '</div>' +
        '</td></tr>';
      }
    });
  }

  v.innerHTML =
    '<header class="topbar"><div><div class="brand-name">STRAUMANN</div><div class="brand-sub">GROUP CHILE · NEODENT</div></div>' +
    '<div style="display:flex;align-items:center;gap:12px;"><span style="font-size:10px;color:#a1a1aa;">by Daniel Jordán</span><button class="btn-logout" id="btn-logout">Cerrar sesión</button></div></header>' +
    (errorConexion ? '<div style="background:#fff3cd;border:1px solid #fde68a;border-radius:10px;padding:14px 18px;margin:16px;text-align:center;font-size:13px;">⚠️ <strong>Sin conexión con el servidor.</strong> Los datos pueden no estar actualizados.<br><button onclick="errorConexion=false;cargarCotizaciones();" style="margin-top:8px;padding:7px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;">🔄 Reintentar</button></div>' : '') +
    '<main>' +
      '<h2 style="margin:0 0 4px;">Cotizaciones</h2>' +
      '<p style="font-size:12px;color:#a1a1aa;margin:0 0 18px;">Se actualiza en vivo a medida que se generan cotizaciones.</p>' +
      '<div class="toolbar">' +
        '<span class="stat-pill">' + visibles.length + ' de ' + cotizaciones.length + ' cotizaciones</span>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
          '<select id="filtro-institucion"></select>' +
          '<select id="filtro-estado"></select>' +
          '<button class="btn-export" id="btn-exportar">📊 Exportar a Excel</button>' +
        '</div>' +
      '</div>' +
      '<div style="overflow-x:auto;">' +
        '<table><thead><tr><th>Institución</th><th>N° Cotización</th><th>Paciente</th><th>Doctor</th><th>Fecha</th><th style="text-align:right;">Total</th><th>Estado</th></tr></thead>' +
        '<tbody>' + filasHtml + '</tbody></table>' +
      '</div>' +
    '</main>';

  const selInst = document.getElementById('filtro-institucion');
  const labelsPresentes = Array.from(new Set(cotizaciones.map(function (c) { return institucionInfo(c.institucion).label; }))).sort();
  let optsInst = '<option value="Todas">Todas las instituciones</option>';
  labelsPresentes.forEach(function (label) {
    optsInst += '<option value="' + esc(label) + '"' + (institucionFiltro === label ? ' selected' : '') + '>' + esc(label) + '</option>';
  });
  selInst.innerHTML = optsInst;
  selInst.addEventListener('change', function (e) { institucionFiltro = e.target.value; renderDashboard(); });

  const sel = document.getElementById('filtro-estado');
  let opts = '<option value="Todos">Todos los estados</option>';
  ESTADOS.forEach(function (e) { opts += '<option value="' + esc(e) + '"' + (estadoFiltro === e ? ' selected' : '') + '>' + esc(e) + '</option>'; });
  sel.innerHTML = opts;
  sel.addEventListener('change', function (e) { estadoFiltro = e.target.value; renderDashboard(); });
  document.getElementById('btn-logout').addEventListener('click', doLogout);
  document.getElementById('btn-exportar').addEventListener('click', function () { exportarExcel(visibles); });
}

sb.auth.onAuthStateChange(function (event, session) {
  if (session) {
    suscribirRealtime();
    cargarCotizaciones();
  } else {
    if (channel) { sb.removeChannel(channel); channel = null; }
    renderLogin();
  }
});

(async function init() {
  const { data } = await sb.auth.getSession();
  if (data && data.session) {
    suscribirRealtime();
    cargarCotizaciones();
  } else {
    renderLogin();
  }
})();
</script>
</body>
</html>
