// --- Criterios de urgencia: pago informado pendiente de ingreso ---
function fechaPagoInformado(c) {
  var hist = Array.isArray(c.historial) ? c.historial : [];
  for (var i = hist.length - 1; i >= 0; i--) {
    if (hist[i] && hist[i].estado === 'Pago informado' && hist[i].fecha) return hist[i].fecha;
  }
  return c.created_at; // respaldo si no hay historial con ese estado
}
function esPagoInformadoPendiente(c) { return c.estado === 'Pago informado'; }
function esUrgente48h(c) {
  if (!esPagoInformadoPendiente(c)) return false;
  var f = fechaPagoInformado(c);
  if (!f) return false;
  return (Date.now() - new Date(f).getTime()) > 48 * 60 * 60 * 1000;
}
var IDX_INGRESADO = ESTADOS.indexOf('Pedido ingresado al sistema');
function estaGestionado(c) {
  return c.estado !== 'Anulado' && ESTADOS.indexOf(c.estado) >= IDX_INGRESADO;
}
function comparaPrioridadUrgencia(a, b) {
  var aInf = esPagoInformadoPendiente(a), bInf = esPagoInformadoPendiente(b);
  if (aInf && !bInf) return -1;
  if (!aInf && bInf) return 1;
  if (aInf && bInf) {
    var aUrg = esUrgente48h(a), bUrg = esUrgente48h(b);
    if (aUrg && !bUrg) return -1;
    if (!aUrg && bUrg) return 1;
    // dentro del mismo grupo: más antiguo primero
    return new Date(fechaPagoInformado(a)).getTime() - new Date(fechaPagoInformado(b)).getTime();
  }
  return 0; // el resto conserva el orden ya existente (created_at desc)
}

function institucionInfo(inst) {
  const s = (inst || '').toUpperCase();
  if (s.indexOf('TEMUCO') !== -1) return { label: 'U Mayor Temuco', color: '#fdf4ff;color:#a21caf', despacho: 'U. Mayor Temuco — Avenida Alemania 0281, 2° piso, Odontología, Temuco', responsable: 'Bethania', codigo: 'UMAYORT' };
  if (s.indexOf('UNAB') !== -1) return { label: 'UNAB Stgo', color: '#eff6ff;color:#1d4ed8', despacho: 'UNAB Santiago — Echaurren 237', responsable: 'Nicole', codigo: 'UNAB' };
  if (s.indexOf('UDP') !== -1) return { label: 'UDP Stgo', color: '#f5f3ff;color:#6d28d9', despacho: 'UDP Santiago — Av. Ejército Libertador 219', responsable: 'Carla', codigo: 'UDP' };
  if (s.indexOf('MAYOR') !== -1) return { label: 'U Mayor Stgo', color: '#fdf4ff;color:#a21caf', despacho: 'U. Mayor Santiago — Av. Libertador Bernardo O\'Higgins 2013', responsable: 'Nicole', codigo: 'UMAYOR' };
  if (s.indexOf('HOSMIL') !== -1) return { label: 'HOSMIL', color: '#fef2f2;color:#991b1b', despacho: 'Hospital Militar (HOSMIL)', responsable: 'Nicole', codigo: 'HOSMIL' };
  // HOTFIX -- ARMADA. Cubre 'ARMADA', 'CENTRAL ODONT...' (con o sin tilde en
  // la O de ODONTOLÓGICA, ya que .toUpperCase() preserva tildes) y
  // 'CENTRALODONTOLOGICA' sin espacio. Dato real confirmado en produccion:
  // institucion = 'Central Odontológica de la Armada'.
  if (s.indexOf('ARMADA') !== -1 || s.indexOf('CENTRAL ODONT') !== -1 || s.indexOf('CENTRALODONTOLOGICA') !== -1) {
    return { label: 'ARMADA', color: '#f0fdf4;color:#166534', despacho: 'Central Odontológica Armada', responsable: 'Catalina', codigo: 'ARMADA' };
  }
  return { label: inst || '-', color: '#f4f4f5;color:#3f3f46', despacho: inst || '-', responsable: '-', codigo: '' };
}

const DOMINIO_POR_CODIGO = {
  HOSMIL: 'https://recetario-hosmil.vercel.app/',
  UNAB: 'https://recetario-unab.vercel.app/',
  UDP: 'https://recetario-udp.vercel.app/',

  ARMADA: 'https://recetario-centralodontologica.vercel.app/',
  UC: 'https://recetario-uc.vercel.app/',
};
function linkPublicoDe(c) {
  const inst = institucionInfo(c.institucion);
  const dominio = DOMINIO_POR_CODIGO[inst.codigo];
  // Cotizaciones nuevas: link seguro con token. Cotizaciones antiguas (antes del token): usan el link guardado en su momento.
  if (c.token && dominio) return dominio + '?t=' + encodeURIComponent(c.token);
  return c.link || '';
}

function fmt(n) { return '$' + Math.round(n || 0).toLocaleString('es-CL'); }

function valorSeguro(v) {
  return (v === null || v === undefined || v === '') ? '-' : v;
}

function descuentoEfectivo(it) {
  // Misma lógica usada en la tabla del detalle — fuente única, evita inconsistencias
  if (typeof it.descuento === 'number') {
    return (it.descuento > 1 ? Math.round(it.descuento) : Math.round(it.descuento * 100)) + '%';
  }
  if (typeof it.precioLista === 'number' && it.precioLista > 0 && typeof it.precioFinal === 'number') {
    const pct = Math.round((1 - it.precioFinal / it.precioLista) * 100);
    return pct <= 0 ? '0%' : '≈' + pct + '%';
  }
  return '-';
}
function fechaCorta(iso) {
  try { return new Date(iso).toLocaleString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }); }
  catch (e) { return '-'; }
}
function esc(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

    '<div class="login-wrap">' +
      '<h1>Panel Inside Sales</h1>' +
      '<p>Acceso restringido según institución asignada</p>' +
      (errMsg ? '<div class="login-err">⚠️ ' + esc(errMsg) + '</div>' : '') +
      '<input type="email" id="li-email" placeholder="Correo">' +
      '<input type="password" id="li-pass" placeholder="Contraseña">' +
      '<button class="btn-primary" id="li-btn">Iniciar sesión</button>' +
    '</div>';
  document.getElementById('li-btn').addEventListener('click', doLogin);
  document.getElementById('li-pass').addEventListener('keydown', function(e){ if (e.key === 'Enter') doLogin(); });
}

async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pass = document.getElementById('li-pass').value;
  const btn = document.getElementById('li-btn');
  btn.disabled = true; btn.textContent = 'Ingresando...';
  try {
    const { error } = await sb.auth.signInWithPassword({ email: email, password: pass });
    if (error) {
      console.warn('[Admin] Error en signInWithPassword:', error.message, error);
      const msg = (error.message || '').toLowerCase();
      const esRed = msg.includes('failed to fetch') || msg.includes('networkerror') ||
                    msg.includes('load failed') || msg.includes('fetch') ||
                    msg.includes('timeout') || msg.includes('err_failed') ||
                    msg.includes('network') || msg.includes('connect');
      if (esRed) {
        errorConexion = true;
        renderLogin('⚠️ No se pudo conectar con el servidor. Puede deberse a firewall, VPN o red corporativa. Intenta desde otra red o con datos móviles.');
      } else {
        // Credenciales inválidas u otro error de auth
        renderLogin('Correo o contraseña incorrectos.');
      }
    }
  } catch (e) {
    // Error de red que no llegó como { error } sino como excepción JS
    console.warn('[Admin] Excepción en signInWithPassword:', e);
    errorConexion = true;
    renderLogin('⚠️ No se pudo conectar con el servidor. Puede deberse a firewall, VPN o red corporativa. Intenta desde otra red o con datos móviles.');
  }
}

async function doLogout() {
  if (channel) { sb.removeChannel(channel); channel = null; }
  await sb.auth.signOut();
}

// FASE 4.3 -- Antes: cargarCotizaciones() siempre llamaba renderDashboard(),
// sin importar la vista activa. Si Realtime disparaba una actualizacion
// mientras el usuario estaba en Dashboard Piloto o en la Matriz
// Institucional, la UI lo devolvia a la vista de Cotizaciones sin que el
// usuario lo pidiera. Esta funcion centraliza que renderizar segun
// vistaActiva, respetando en que vista esta el usuario. No cambia ningun
// dato ni logica comercial -- solo decide que funcion de render llamar.
function renderVistaActiva() {
  if (vistaActiva === 'dashboard') {
    renderDashboardPiloto();
  } else if (vistaActiva === 'matriz') {
    renderMatrizInstitucional();
  } else {
    renderDashboard();
  }
}

async function cargarCotizaciones() {
  try {
    const { data, error } = await sb.from('cotizaciones').select('*').is('deleted_at', null).order('created_at', { ascending: false });
    if (!error && data) {
      cotizaciones = data;
      errorConexion = false;
      errorConexionMsg = '';
    } else if (error) {
      console.warn('[Admin] Error en cargarCotizaciones:', error.message, error);
      const msg = (error.message || '').toLowerCase();
      const code = String(error.code || error.status || '');
      if (msg.includes('failed to fetch') || msg.includes('networkerror') ||
          msg.includes('load failed') || msg.includes('fetch') ||
          msg.includes('network') || msg.includes('timeout') || msg.includes('connect')) {
        errorConexionMsg = 'Error de red o firewall. La consulta no llegó al servidor. Intenta desde otra red o con datos móviles.';
      } else if (code === '401' || code === '403' || msg.includes('permission') ||
                 msg.includes('unauthorized') || msg.includes('rls') || msg.includes('policy')) {
        errorConexionMsg = 'Error de permisos (RLS/Auth). Tu sesión puede haber expirado. Cierra sesión y vuelve a ingresar.';
      } else {
        errorConexionMsg = 'Error al cargar cotizaciones: ' + (error.message || 'error desconocido') + ' (código: ' + (code || '-') + ')';
      }
      // NO limpiar cotizaciones — mantener los datos ya cargados visibles
      errorConexion = true;
    }
  } catch (e) {
    // Excepción JS: red completamente bloqueada
    console.warn('[Admin] Excepción en cargarCotizaciones:', e);
    errorConexionMsg = 'No se pudo conectar con el servidor. Puede deberse a firewall, VPN o red corporativa.';
    // NO limpiar cotizaciones
    errorConexion = true;
  }
  renderVistaActiva(); // FASE 4.3: antes renderDashboard() incondicional
}

function suscribirRealtime() {
  if (channel) return;
  try {
    channel = sb.channel('cotizaciones-cambios')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'cotizaciones' }, function () { cargarCotizaciones(); })
      .subscribe(function (status) {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') { channel = null; }
      });
  } catch (e) { channel = null; }
}

async function cambiarEstado(id, nuevoEstado) {
  if (esObservador()) {
    alert('Tu rol es de solo lectura. No puedes cambiar estados.');
    return;
  }
  const row = cotizaciones.find(function (c) { return c.id === id; });
  const historial = (row && row.historial) ? row.historial.slice() : [];
  historial.push({ estado: nuevoEstado, fecha: new Date().toISOString() });
  try {
    const { error } = await sb.rpc('actualizar_estado_cotizacion', { p_id: id, p_estado: nuevoEstado, p_historial: historial });
    if (error) {
      // Error de Supabase (respuesta válida pero con error)
      alert('No se pudo cambiar el estado: ' + (error.message || 'error desconocido') + '\nRecarga la página para verificar el estado actual.');
      errorConexion = true;
      renderDashboard();
    } else {
      // Actualizar localmente y re-renderizar para que color/UI queden consistentes
      if (row) { row.estado = nuevoEstado; }
      renderDashboard();
    }
  } catch (e) {
    // Error de red: Supabase no alcanzable
    alert('⚠️ No se pudo cambiar el estado por un problema de red o firewall.\nEl cambio NO fue guardado. Verifica tu conexión e intenta nuevamente.');
    errorConexion = true;
    renderDashboard();
  }
}

async function copiarLinkComprobante(path, btn) {
  const original = btn.textContent;
  btn.textContent = 'Generando…';
  btn.disabled = true;
  try {
    const { data, error } = await sb.storage.from('comprobantes').createSignedUrl(path, 604800); // 7 días — link para compartir por correo, uso diferido

function copiarTexto(value, btn) {
  function done() {
    const original = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(function () { btn.textContent = original; }, 1200);
  }
  if (navigator.clipboard) { navigator.clipboard.writeText(value).then(done).catch(done); }
  else { done(); }
}

async function copiarGestionCompleta(id, btn) {
  const c = cotizaciones.find(function (x) { return x.id === id; });
  if (!c) { alert('No se encontró la cotización.'); return; }

  const original = btn.textContent;
  btn.textContent = 'Copiando…';
  btn.disabled = true;

  function finalizar() {
    btn.textContent = '✓ Copiado';
    setTimeout(function () { btn.textContent = original; btn.disabled = false; }, 1200);
  }

  // Sección comprobante: si falla, no rompe el resto del bloque (degradación controlada)
  let comprobanteTxt = '-';
  let comprobanteEsLink = false;
  if (c.comprobante_path) {
    try {
      const { data, error } = await sb.storage.from('comprobantes').createSignedUrl(c.comprobante_path, 604800); // 7 días — link va dentro de correo a Nicole/Customer
      if (error || !data || !data.signedUrl) throw error || new Error('sin url');
      comprobanteTxt = data.signedUrl;
      comprobanteEsLink = true;
    } catch (e) {
      console.warn('[Admin] No se pudo generar link de comprobante para gestión completa:', e);
      comprobanteTxt = 'No se pudo generar link';
    }
  }

  // Datos paciente — SIN "Link de pago"
  const inst = institucionInfo(c.institucion);
  const tel = c.paciente_whatsapp ? ('+56 9 ' + c.paciente_whatsapp) : '-';
  const datosLineas = [
    'Institución: ' + (c.institucion || inst.label || '-'),
    'N° Cotización: ' + valorSeguro(c.numero),
    'Nombre paciente: ' + valorSeguro(c.paciente),
    'RUT paciente: ' + valorSeguro(c.rut),
    'Correo paciente: ' + valorSeguro(c.paciente_email),
    'Dirección paciente: ' + valorSeguro(c.paciente_direccion),
    'Teléfono paciente: ' + tel,
    'Dr. tratante: ' + valorSeguro(c.doctor)
  ];

  // Dirección de despacho: para todas las instituciones es la dirección
  // institucional fija (inst.despacho). Excepción ARMADA: el despacho se
  // hace a la misma dirección de facturación del paciente, por lo que se
  // usa c.paciente_direccion en su lugar.
  const direccionDespacho = (inst.codigo === 'ARMADA')
    ? valorSeguro(c.paciente_direccion)
    : (inst.despacho || '-');

  // Productos: misma data y misma lógica de descuento que el detalle visual
  // (descuentoEfectivo / fmt), reutilizadas sin modificar
  const items = c.items || [];
  const filasProductosTxt = items.map(function (it) {
    return [
      valorSeguro(it.codigo),
      valorSeguro(it.descripcion),
      valorSeguro(it.cantidad),
      descuentoEfectivo(it),
      fmt(it.subtotal)
    ].join(' | ');
  });

  // ── Texto plano (fallback si el navegador no soporta ClipboardItem) ──────────
  const textoPlano = [
    datosLineas.join('\n'),
    '',
    'Despachar a: ' + direccionDespacho,
    '',
    'Link comprobante de pago: ' + comprobanteTxt,
    '',
    'PEDIDO / PRODUCTOS',
    'Código | Descripción | Cant. | Dscto. | Subtotal',
    filasProductosTxt.join('\n'),
    '',
    'Total: ' + fmt(c.total)
  ].join('\n');

  // ── HTML — tabla real para que no se descuadre al pegar en correo ───────────
  const filasProductosHtml = items.map(function (it) {
    return '<tr>' +
      '<td style="border:1px solid #ddd;padding:6px;text-align:left;">' + esc(it.codigo) + '</td>' +
      '<td style="border:1px solid #ddd;padding:6px;text-align:left;">' + esc(it.descripcion) + '</td>' +
      '<td style="border:1px solid #ddd;padding:6px;text-align:right;">' + esc(it.cantidad) + '</td>' +
      '<td style="border:1px solid #ddd;padding:6px;text-align:right;">' + esc(descuentoEfectivo(it)) + '</td>' +
      '<td style="border:1px solid #ddd;padding:6px;text-align:right;">' + esc(fmt(it.subtotal)) + '</td>' +
    '</tr>';
  }).join('');

  const tablaHtml = '<table style="border-collapse:collapse;width:100%;font-family:Arial,sans-serif;font-size:13px;">' +
    '<thead><tr>' +
      '<th style="border:1px solid #ddd;padding:6px;text-align:left;background:#f5f5f5;">Código</th>' +
      '<th style="border:1px solid #ddd;padding:6px;text-align:left;background:#f5f5f5;">Descripción</th>' +
      '<th style="border:1px solid #ddd;padding:6px;text-align:right;background:#f5f5f5;">Cant.</th>' +
      '<th style="border:1px solid #ddd;padding:6px;text-align:right;background:#f5f5f5;">Dscto.</th>' +
      '<th style="border:1px solid #ddd;padding:6px;text-align:right;background:#f5f5f5;">Subtotal</th>' +
    '</tr></thead>' +
    '<tbody>' + filasProductosHtml + '</tbody>' +
  '</table>';

  const comprobanteHtml = comprobanteEsLink
    ? '<a href="' + esc(comprobanteTxt) + '">' + esc(comprobanteTxt) + '</a>'
    : esc(comprobanteTxt);

  const datosHtml = datosLineas.map(function (linea) {
    const idx = linea.indexOf(': ');
    const label = idx >= 0 ? linea.slice(0, idx + 1) : linea;
    const valor = idx >= 0 ? linea.slice(idx + 2) : '';
    return '<div>' + esc(label) + ' ' + esc(valor) + '</div>';
  }).join('');

  // Se usan <br> reales (contenido) en vez de depender solo de margin/padding,
  // porque Gmail/Outlook suelen "limpiar" el HTML pegado y descartan márgenes
  // en divs vacíos — un salto de línea real sobrevive ese proceso.
  const html = '<div style="font-family:Arial,sans-serif;font-size:13px;">' +
    datosHtml +
    '<br><br>' +
    '<div>Despachar a: ' + esc(direccionDespacho) + '</div>' +
    '<br><br>' +
    '<div>Link comprobante de pago: ' + comprobanteHtml + '</div>' +
    '<br><br>' +
    '<div style="font-weight:bold;">PEDIDO / PRODUCTOS</div>' +
    '<br>' +
    tablaHtml +
    '<br><br>' +
    '<div style="font-weight:bold;">Total: ' + esc(fmt(c.total)) + '</div>' +
  '</div>';

  // ── Copiar: HTML real (tabla) + texto plano como fallback dentro del mismo portapapeles ──
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      await navigator.clipboard.write([
        new ClipboardItem({
          'text/html': new Blob([html], { type: 'text/html' }),
          'text/plain': new Blob([textoPlano], { type: 'text/plain' })
        })
      ]);
      finalizar();
    } else if (navigator.clipboard) {
      await navigator.clipboard.writeText(textoPlano);
      finalizar();
    } else {
      copiarTexto(textoPlano, btn);
    }
  } catch (e) {
    console.warn('[Admin] Falló copia con formato HTML, reintentando solo texto plano:', e);
    try {
      await navigator.clipboard.writeText(textoPlano);
      finalizar();
    } catch (e2) {
      alert('No se pudo copiar al portapapeles.');
      btn.textContent = original;
      btn.disabled = false;
    }
  }
}

function esSuperAdmin() { return !!(miPerfil && miPerfil.es_super_admin); }

function calcDash(datos) {
  // Usar hora local del navegador para clasificar correctamente con DST de Chile
  // new Date(iso) + getHours/getDay usan la zona horaria configurada en el SO del admin
  function esFueraHorario(iso) {
    var d = new Date(iso);
    var dia = d.getDay(); // 0=dom, 6=sab, en hora local del navegador
    if (dia === 0 || dia === 6) return true;
    var minutos = d.getHours() * 60 + d.getMinutes();
    return minutos < 8 * 60 + 30 || minutos >= 18 * 60 + 30;
  }
  function fmtFecha(iso) {
    var d = new Date(iso);
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }

  var total = datos.length;
  var montoTotal = datos.reduce(function(s,c){ return s + (Number(c.total)||0); }, 0);
  var pedidos = datos.filter(function(c){ return c.estado === 'Pedido ingresado al sistema'; });
  var montoPedidos = pedidos.reduce(function(s,c){ return s + (Number(c.total)||0); }, 0);
  var anuladas = datos.filter(function(c){ return c.estado === 'Anulado'; });
  var pendientes = datos.filter(function(c){
    return c.estado !== 'Pedido ingresado al sistema' && c.estado !== 'Anulado';
  });

  // Por institución
  var porInst = {};
  datos.forEach(function(c) {
    var label = institucionInfo(c.institucion).label;
    if (!porInst[label]) porInst[label] = { n: 0, monto: 0 };
    porInst[label].n++;
    porInst[label].monto += Number(c.total) || 0;
  });

  // Por estado
  var porEstado = {};
  datos.forEach(function(c) {
    var e = c.estado || '(sin estado)';
    if (!porEstado[e]) porEstado[e] = { n: 0, monto: 0 };
    porEstado[e].n++;
    porEstado[e].monto += Number(c.total) || 0;
  });

  // Por día
  var porDia = {};
  datos.forEach(function(c) {
    if (!c.created_at) return;
    var fecha = fmtFecha(c.created_at);
    if (!porDia[fecha]) porDia[fecha] = { n: 0, monto: 0 };
    porDia[fecha].n++;
    porDia[fecha].monto += Number(c.total) || 0;
  });

  // Fuera de horario
  var fuera = datos.filter(function(c){ return c.created_at && esFueraHorario(c.created_at); });

  function pct(val, tot) {
    if (!tot) return '0%';
    var p = (val / tot * 100);
    return (Number.isInteger(p) ? p : p.toFixed(1)) + '%';
  }

  // Serie de evolución ordenada para el gráfico
  var serieEvolucion = Object.keys(porDia).sort().map(function(fecha, i, arr) {
    return { fecha: fecha, n: porDia[fecha].n };
  });
  var acum = 0;
  serieEvolucion.forEach(function(s) { acum += s.n; s.acum = acum; });

  // Implantes cotizados: clasificar por descripción del ítem
  // Regla: descripción empieza con "implante" (case-insensitive) y NO contiene "por implante"
  // (los autos-agregados usan frases como "agregado automático por implante" / "precio especial por implante")
  // Straumann: descripción además contiene "straumann" — cubre BLT, BLC, BLX
  // Neodent: cumple la regla de implante pero no contiene "straumann"
  var implantesNeodent = 0, implantesStraumann = 0;
  datos.forEach(function(cot) {
    (cot.items || []).forEach(function(it) {
      var desc = (it.descripcion || '').toLowerCase().trimStart();
      if (!desc.startsWith('implante')) return;
      if (desc.includes('por implante')) return;       // excluir autos-agregados y precios especiales
      var cant = parseInt(it.cantidad, 10) || 1;
      if (desc.includes('straumann')) {
        implantesStraumann += cant;
      } else {
        implantesNeodent += cant;
      }
    });
  });
  var implantesTotal = implantesNeodent + implantesStraumann;

  // Monto pendiente por convertir
  var montoPendiente = pendientes.reduce(function(s,c){ return s + (Number(c.total)||0); }, 0);

  // Pendientes con más de 48 horas desde su creación
  var ahora48 = Date.now();
  var MS_48H = 48 * 60 * 60 * 1000;
  var pendientes48h = pendientes.filter(function(c) {
    if (!c.created_at) return false;
    return (ahora48 - new Date(c.created_at).getTime()) > MS_48H;
  }).length;

  // Por institución enriquecida
  var porInstEnriq = {};
  datos.forEach(function(c) {
    var label = institucionInfo(c.institucion).label;
    if (!porInstEnriq[label]) porInstEnriq[label] = { n: 0, pedidos: 0, montoCot: 0, montoIng: 0 };
    var r = porInstEnriq[label];
    r.n++;
    r.montoCot += Number(c.total) || 0;
    if (c.estado === 'Pedido ingresado al sistema') { r.pedidos++; r.montoIng += Number(c.total) || 0; }
  });

  return {
    total: total, montoTotal: montoTotal,
    pedidos: pedidos.length, montoPedidos: montoPedidos,
    anuladas: anuladas.length, pendientes: pendientes.length,
    montoPendiente: montoPendiente, pendientes48h: pendientes48h,
    porInst: porInst, porInstEnriq: porInstEnriq, porEstado: porEstado,
    porDia: porDia, fuera: fuera.length,
    pctPedidos: pct(pedidos.length, total),
    pctPendientes: pct(pendientes.length, total),
    pctAnuladas: pct(anuladas.length, total),
    pctFuera: pct(fuera.length, total),
    serieEvolucion: serieEvolucion,
    implantesNeodent: implantesNeodent,
    implantesStraumann: implantesStraumann,
    implantesTotal: implantesTotal,
    pctImplantesNeodent: pct(implantesNeodent, implantesTotal),
    pctImplantesStraumann: pct(implantesStraumann, implantesTotal)
  };
}

function filtrarPorPeriodo(datos, periodo) {
  var ahora = new Date();
  var limite = null;
  if (periodo === 'hoy') {
    limite = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
  } else if (periodo === '7d') {
    limite = new Date(ahora.getTime() - 7 * 24 * 60 * 60 * 1000);
  } else if (periodo === '30d') {
    limite = new Date(ahora.getTime() - 30 * 24 * 60 * 60 * 1000);
  }
  if (!limite) return datos;
  return datos.filter(function(c) {
    return c.created_at && new Date(c.created_at) >= limite;
  });
}

function renderGraficoEvolucion(serie) {
  if (!serie || serie.length === 0) {
    return '<div class="dash-section"><h3>Evolución de cotizaciones</h3>' +
      '<div style="color:var(--muted);font-size:13px;padding:24px 0;text-align:center;">Sin datos para el período seleccionado.</div></div>';
  }

  var W = 680, H = 200, PL = 38, PR = 16, PT = 18, PB = 36;
  var iW = W - PL - PR, iH = H - PT - PB;

  var maxN = Math.max.apply(null, serie.map(function(s){ return s.n; }));
  var maxA = Math.max.apply(null, serie.map(function(s){ return s.acum; }));
  // Escalar la línea diaria sobre eje izquierdo (max = max diario * 1.2 para aire)
  var scaleY_n = maxN > 0 ? iH / (maxN * 1.2) : iH;
  // Escalar acumulado sobre eje derecho (independiente)
  var scaleY_a = maxA > 0 ? iH / (maxA * 1.1) : iH;

  var n = serie.length;
  function xPos(i) { return PL + (n === 1 ? iW / 2 : i * iW / (n - 1)); }
  function yN(val)  { return PT + iH - val * scaleY_n; }
  function yA(val)  { return PT + iH - val * scaleY_a; }

  // Polylines
  var ptsN = serie.map(function(s, i){ return xPos(i).toFixed(1) + ',' + yN(s.n).toFixed(1); }).join(' ');
  var ptsA = serie.map(function(s, i){ return xPos(i).toFixed(1) + ',' + yA(s.acum).toFixed(1); }).join(' ');

  // Etiquetas eje X (mostrar máx 8 labels para no amontonar)
  var step = Math.max(1, Math.ceil(n / 8));
  var xLabels = '';
  serie.forEach(function(s, i) {
    if (i % step !== 0 && i !== n - 1) return;
    var label = s.fecha.slice(5); // MM-DD
    xLabels += '<text x="' + xPos(i).toFixed(1) + '" y="' + (H - 6) + '" text-anchor="middle" font-size="10" fill="#a1a1aa">' + label + '</text>';
  });

  // Etiquetas eje Y izquierdo (4 niveles)
  var yLabels = '';
  for (var l = 0; l <= 4; l++) {
    var val = Math.round(maxN * 1.2 * l / 4);
    var y = PT + iH - (val * scaleY_n);
    yLabels += '<text x="' + (PL - 4) + '" y="' + (y + 3).toFixed(1) + '" text-anchor="end" font-size="9" fill="#a1a1aa">' + val + '</text>';
    yLabels += '<line x1="' + PL + '" y1="' + y.toFixed(1) + '" x2="' + (W - PR) + '" y2="' + y.toFixed(1) + '" stroke="#f0f0f0" stroke-width="1"/>';
  }

  // Puntos en línea diaria (visibles si pocos datos)
  var dots = n <= 14 ? serie.map(function(s, i) {
    return '<circle cx="' + xPos(i).toFixed(1) + '" cy="' + yN(s.n).toFixed(1) + '" r="3" fill="#991b1b"/>';
  }).join('') : '';

  var svg =
    '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:' + W + 'px;display:block;">' +
    yLabels +
    '<polyline points="' + ptsA + '" fill="none" stroke="#d4d4d8" stroke-width="1.5" stroke-dasharray="4 3"/>' +
    '<polyline points="' + ptsN + '" fill="none" stroke="#991b1b" stroke-width="2"/>' +
    dots +
    xLabels +
    '</svg>';

  // Leyenda
  var leyenda =
    '<div style="display:flex;gap:20px;font-size:11px;color:var(--muted);margin-top:6px;">' +
    '<span style="display:flex;align-items:center;gap:5px;"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="#991b1b" stroke-width="2"/></svg> Cotizaciones / día</span>' +
    '<span style="display:flex;align-items:center;gap:5px;"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="#d4d4d8" stroke-width="1.5" stroke-dasharray="4 3"/></svg> Acumulado</span>' +
    '</div>';

  return '<div class="dash-section"><h3>Evolución de cotizaciones</h3>' + svg + leyenda + '</div>';
}

async function cargarMatrizResumen() {
  matrizCargando = true;
  renderMatrizInstitucional();
  try {
    const { data, error } = await sb.rpc('matriz_resumen_instituciones');
    matrizResumenRows = (!error && data) ? data : [];
  } catch (e) {
    matrizResumenRows = [];
  }
  matrizCargando = false;
  renderMatrizInstitucional();
}

async function seleccionarInstitucionMatriz(codigo) {
  matrizInstitucionSel = codigo;
  matrizFiltro = { texto: '', marca: 'Todas', familia: 'Todas', soloOverride: false, soloDuplicado: false };
  matrizCatalogoRows = [];
  matrizDescuentosRows = [];
  matrizDuplicadosRows = [];
  matrizOverridesRows = [];
  // FASE 5.2B -- MODIFICACION JUSTIFICADA: se limpia el resultado del simulador
  // al cambiar de institucion. Motivo: un resultado simulado de la institucion
  // anterior quedaria visualmente engañoso si el usuario cambia de institucion
  // sin volver a simular -- se prefiere mostrar el formulario vacio a mostrar
  // un impacto que ya no corresponde a la institucion seleccionada.
  matrizSimuladorFamilia = '';
  matrizSimuladorDescuentoTexto = '';
  matrizSimuladorResumen = null;
  matrizSimuladorDetalle = [];
  matrizSimuladorErrorValidacion = '';
  matrizCargando = true;
  renderMatrizInstitucional();
  try {
    // FASE 4.2B -- MODIFICACION JUSTIFICADA: se agregan matriz_codigos_duplicados
    // y matriz_overrides_precio a esta misma carga (antes, en Fase 4.2A, solo
    // cargaba catalogo+descuentos). Motivo: mantener un unico punto de carga por
    // institucion en vez de fragmentar la logica en cada sub-tab nuevo -- cambiar
    // de institucion sigue disparando exactamente 1 ciclo de carga (ahora de 4
    // llamadas en paralelo en vez de 2), y cambiar entre los sub-tabs Catalogo/
    // Descuentos/Duplicados/Overrides para la MISMA institucion ya seleccionada
    // no vuelve a llamar a Supabase.
    const resultados = await Promise.all([
      sb.rpc('matriz_catalogo_institucion', { p_institucion_codigo: codigo }),
      sb.rpc('matriz_descuentos_institucion', { p_institucion_codigo: codigo }),
      sb.rpc('matriz_codigos_duplicados', { p_institucion_codigo: codigo }),
      sb.rpc('matriz_overrides_precio', { p_institucion_codigo: codigo })
    ]);
    matrizCatalogoRows = (!resultados[0].error && resultados[0].data) ? resultados[0].data : [];
    matrizDescuentosRows = (!resultados[1].error && resultados[1].data) ? resultados[1].data : [];
    matrizDuplicadosRows = (!resultados[2].error && resultados[2].data) ? resultados[2].data : [];
    matrizOverridesRows = (!resultados[3].error && resultados[3].data) ? resultados[3].data : [];
  } catch (e) {
    matrizCatalogoRows = [];
    matrizDescuentosRows = [];
    matrizDuplicadosRows = [];
    matrizOverridesRows = [];
  }
  matrizCargando = false;
  renderMatrizInstitucional();
}

function refrescarMatriz() {
  // FASE 4.2B -- MODIFICACION JUSTIFICADA: si el sub-tab activo es Comparador o
  // Auditoria (secciones que no dependen de institucion seleccionada), refrescar
  // debe recargar esa seccion en vez de no hacer nada o recargar solo el resumen.
  // FASE 5.4 -- se agrega 'solicitudes' al mismo patron (tambien independiente
  // de institucion seleccionada).
  if (matrizInstitucionSel) { seleccionarInstitucionMatriz(matrizInstitucionSel); }
  else if (matrizSubTab === 'comparador') { cargarMatrizComparador(); }
  else if (matrizSubTab === 'auditoria') { cargarMatrizAuditoria(); }
  else if (matrizSubTab === 'solicitudes') { cargarMatrizSolicitudes(); }
  else { cargarMatrizResumen(); }
}

function limpiarFiltrosMatrizCatalogo() {
  matrizFiltro = { texto: '', marca: 'Todas', familia: 'Todas', soloOverride: false, soloDuplicado: false };
  renderMatrizInstitucional();
}

function matrizCatalogoFiltrado() {
  const t = (matrizFiltro.texto || '').trim().toLowerCase();
  return matrizCatalogoRows.filter(function (r) {
    if (t && (r.codigo || '').toLowerCase().indexOf(t) === -1 && (r.descripcion || '').toLowerCase().indexOf(t) === -1) return false;
    if (matrizFiltro.marca !== 'Todas' && r.marca !== matrizFiltro.marca) return false;
    if (matrizFiltro.familia !== 'Todas' && r.familia !== matrizFiltro.familia) return false;
    if (matrizFiltro.soloOverride && !r.tiene_override) return false;
    if (matrizFiltro.soloDuplicado && !r.es_codigo_duplicado) return false;
    return true;
  });
}

// Exportacion generica reutilizando XLSX (ya cargado por CDN) -- misma
// libreria que usa exportarExcel(), sin agregar ninguna dependencia nueva.
function exportarMatrizExcel(rows, columnas, nombreHoja, nombreArchivoBase) {
  if (!rows || !rows.length) { alert('No hay datos para exportar con los filtros actuales.'); return; }
  const hoja = rows.map(function (r) {
    const obj = {};
    columnas.forEach(function (c) { obj[c.label] = (typeof c.value === 'function') ? c.value(r) : r[c.key]; });
    return obj;
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(hoja);
  XLSX.utils.book_append_sheet(wb, ws, nombreHoja);
  const ahora = new Date();
  const pad2 = function (n) { return String(n).padStart(2, '0'); };
  const fechaArchivo = ahora.getFullYear() + pad2(ahora.getMonth() + 1) + pad2(ahora.getDate());
  XLSX.writeFile(wb, nombreArchivoBase + '_' + fechaArchivo + '.xlsx');
}

// Ambas secciones son independientes de la institucion seleccionada, por eso

// --- Fase 5.2B: Simulador de impacto (solo lectura) ---
// Llama a las 2 RPCs de solo lectura creadas y validadas en Fase 5.2A.
// No inserta en solicitudes_cambio_precio, no modifica descuentos_institucionales,
// productos, precio_compartido_override ni reglas_cierre_institucional.

async function ejecutarSimulacionMatriz() {
  matrizSimuladorErrorValidacion = '';

  const familiaEl = document.getElementById('simulador-familia');
  const descuentoEl = document.getElementById('simulador-descuento');
  const familia = familiaEl ? familiaEl.value : '';
  const descuentoTexto = descuentoEl ? descuentoEl.value : '';

  // Validaciones de entrada -- ninguna llamada a Supabase si algo falta o es invalido.
  if (!matrizInstitucionSel) {
    matrizSimuladorErrorValidacion = 'Selecciona una institución antes de simular.';
    renderMatrizInstitucional();
    return;
  }
  if (!familia) {
    matrizSimuladorErrorValidacion = 'Selecciona una familia antes de simular.';
    renderMatrizInstitucional();
    return;
  }
  if (descuentoTexto === '' || descuentoTexto === null || descuentoTexto === undefined) {
    matrizSimuladorErrorValidacion = 'Ingresa un descuento nuevo antes de simular.';
    renderMatrizInstitucional();
    return;
  }
  const descuentoNum = Number(descuentoTexto);
  if (isNaN(descuentoNum)) {
    matrizSimuladorErrorValidacion = 'El descuento debe ser un número.';
    renderMatrizInstitucional();
    return;
  }
  if (descuentoNum < 0) {
    matrizSimuladorErrorValidacion = 'El descuento no puede ser menor a 0.';
    renderMatrizInstitucional();
    return;
  }
  if (descuentoNum > 100) {
    matrizSimuladorErrorValidacion = 'El descuento no puede ser mayor a 100.';
    renderMatrizInstitucional();
    return;
  }

  matrizSimuladorFamilia = familia;
  matrizSimuladorDescuentoTexto = descuentoTexto;
  matrizSimuladorCargando = true;
  matrizSimuladorResumen = null;
  matrizSimuladorDetalle = [];
  // FASE 5.3 -- MODIFICACION JUSTIFICADA: se limpia cualquier confirmacion de
  // solicitud previa al lanzar una nueva simulacion. Motivo: una confirmacion
  // de "solicitud creada" de una simulacion anterior seria enganosa si se
  // muestra junto a un resultado de simulacion distinto.
  matrizSolicitudExito = null;
  matrizSolicitudError = '';
  renderMatrizInstitucional();

  try {
    const resultados = await Promise.all([
      sb.rpc('simular_cambio_descuento_familia_resumen', {
        p_institucion_codigo: matrizInstitucionSel, p_familia_nombre: familia, p_descuento_nuevo: descuentoNum
      }),
      sb.rpc('simular_cambio_descuento_familia', {
        p_institucion_codigo: matrizInstitucionSel, p_familia_nombre: familia, p_descuento_nuevo: descuentoNum
      })
    ]);
    matrizSimuladorResumen = (!resultados[0].error && resultados[0].data && resultados[0].data[0]) ? resultados[0].data[0] : null;
    matrizSimuladorDetalle = (!resultados[1].error && resultados[1].data) ? resultados[1].data : [];
    if (resultados[0].error || resultados[1].error) {
      matrizSimuladorErrorValidacion = 'Error al simular: ' +
        ((resultados[0].error && resultados[0].error.message) || (resultados[1].error && resultados[1].error.message) || 'error desconocido');
    }
  } catch (e) {
    matrizSimuladorErrorValidacion = 'No se pudo ejecutar la simulación (error de red).';
  }
  matrizSimuladorCargando = false;
  renderMatrizInstitucional();
}

// --- Fase 5.3: Crear solicitud desde una simulacion ya ejecutada ---
// Inserta UNA fila en solicitudes_cambio_precio, siempre con estado='simulada'
// (nunca 'pendiente_aprobacion' -- ese flujo queda para una fase futura).
// No modifica productos, descuentos_institucionales, precio_compartido_override,
// reglas_cierre_institucional, cotizaciones ni auditoria_cambios.

function abrirModalSolicitud() {

  matrizSolicitudModalAbierto = true;
  matrizSolicitudMotivo = '';
  matrizSolicitudError = '';

}

function cerrarModalSolicitud() {
  matrizSolicitudModalAbierto = false;
  matrizSolicitudError = '';

}

async function crearSolicitudCambio() {
  const motivoEl = document.getElementById('solicitud-motivo');
  const motivo = motivoEl ? motivoEl.value.trim() : '';

  if (!motivo) {
    matrizSolicitudError = 'El motivo es obligatorio para crear una solicitud.';
    renderMatrizInstitucional();
    return;
  }
  if (!matrizSimuladorResumen || !matrizInstitucionSel || !matrizSimuladorFamilia) {
    matrizSolicitudError = 'No hay una simulación válida para convertir en solicitud.';
    renderMatrizInstitucional();
    return;
  }

  matrizSolicitudMotivo = motivo;
  matrizSolicitudGuardando = true;
  matrizSolicitudError = '';
  renderMatrizInstitucional();

  try {
    const { data: userData } = await sb.auth.getUser();
    const uid = (userData && userData.user) ? userData.user.id : null;
    const r = matrizSimuladorResumen;

    // FASE 5.6A -- Plan de reversa estructurado (NO SQL ejecutable). Se
    // guarda como texto JSON en la columna rollback_sql (columna ya
    // existente desde Fase 5.1, tipo text -- no requiere cambio de esquema).
    // Es solo informativo/de referencia: ninguna funcion de este archivo lo
    // interpreta ni lo ejecuta. Hoy este simulador solo crea solicitudes de
    // tipo 'descuento_familia', por eso el plan siempre usa esa forma.
    const planReversa = {
      tipo: 'plan_reversa',
      accion: 'restaurar_descuento_familia',
      institucion_codigo: matrizInstitucionSel,
      familia_nombre: matrizSimuladorFamilia,
      valor_anterior: Math.round((r.promedio_descuento_actual || 0) * 100),
      valor_propuesto: Math.round((r.descuento_nuevo || 0) * 100),
      tabla_objetivo: 'descuentos_institucionales',
      descripcion: 'Si este cambio se ejecuta en el futuro, la reversa consistiría en restaurar el descuento base anterior de la familia para la institución indicada.',
      validacion_posterior_sugerida: [
        'Verificar matriz_catalogo_institucion para la institución y familia afectada',
        'Validar precio final de producto de referencia',
        'Confirmar que reglas automáticas no fueron modificadas',
        'Confirmar que cotizaciones históricas no fueron alteradas'
      ],
      advertencia: 'Este plan no ejecuta reversa automáticamente. Es una guía de control previo.'
    };

    // Mapeo (Fase 5.1, seccion 10): impacto_estimado <- resumen agregado;
    // validacion_previa <- detalle por producto usado para calcular ese resumen.
    const payload = {
      tipo_cambio: 'descuento_familia',
      institucion_codigo: matrizInstitucionSel,
      familia_nombre: matrizSimuladorFamilia,
      descripcion: 'Cambio de descuento base de "' + matrizSimuladorFamilia + '" en ' + matrizInstitucionSel,
      valor_actual: { porcentaje: r.promedio_descuento_actual },
      valor_propuesto: { porcentaje: r.descuento_nuevo },
      impacto_estimado: r,
      productos_afectados: r.total_productos_afectados,
      motivo: motivo,
      estado: 'simulada',
      solicitado_por: uid,
      origen: 'matriz_admin',
      validacion_previa: { detalle: matrizSimuladorDetalle },
      rollback_sql: JSON.stringify(planReversa)
    };

    const { data, error } = await sb.from('solicitudes_cambio_precio').insert(payload).select().single();
    if (error) {
      matrizSolicitudError = 'No se pudo crear la solicitud: ' + error.message;
    } else {
      matrizSolicitudExito = data;
      matrizSolicitudModalAbierto = false;
      matrizSolicitudMotivo = '';
      // FASE 5.4A -- HOTFIX: antes, la bandeja de Solicitudes quedaba con
      // cache obsoleta (matrizSolicitudesCargadas=true desde una visita
      // anterior con la lista vacia) y crearSolicitudCambio() nunca la
      // invalidaba ni actualizaba matrizSolicitudesRows. Se corrige en 2
      // pasos: (1) se agrega la fila recien creada al array local de
      // inmediato -- feedback instantaneo si algo la lee antes de recargar;
      // (2) se invalida matrizSolicitudesCargadas para forzar una recarga
      // REAL desde Supabase la proxima vez que se entre al sub-tab
      // Solicitudes (cubre tanto "ya la habia visitado antes" como "todavia
      // no la habia visitado"). Tambien se resetean los filtros para que la
      // nueva solicitud nunca quede oculta por un filtro previo.
      matrizSolicitudesRows = [data].concat(matrizSolicitudesRows);

async function confirmarEjecutarCambio() {
  if (!matrizEjecutarCambioAbierto) return;
  const s = matrizEjecutarCambioAbierto;
  const confirmEl = document.getElementById('ejecutar-cambio-confirm-texto');
  const textoEscrito = confirmEl ? confirmEl.value.trim().toUpperCase() : '';

  if (textoEscrito !== 'EJECUTAR') {
    matrizEjecutarCambioError = 'Debes escribir EJECUTAR (en mayúsculas) para confirmar.';
    renderMatrizInstitucional();
    return;
  }

  matrizEjecutarCambioGuardando = true;
  matrizEjecutarCambioError = '';
  renderMatrizInstitucional();

  try {
    // FASE 5.8C -- unica escritura de esta funcion: llamar a la RPC ya
    // creada y validada en Fase 5.8B. No hay ningun .insert/.update/.delete
    // directo a ninguna tabla comercial en todo este archivo para esta accion.
    const { data, error } = await sb.rpc('ejecutar_solicitud_cambio_descuento_familia', { p_solicitud_id: s.id });
    if (error) {
      matrizEjecutarCambioError = 'No se pudo ejecutar el cambio: ' + error.message;
      matrizEjecutarCambioGuardando = false;
      renderMatrizInstitucional();
      return;
    }
    matrizEjecutarCambioResultado = Array.isArray(data) ? data[0] : data;

    // Refrescar la fila completa desde la base -- ejecutado_por/ejecutado_en/
    // validacion_posterior/observaciones no vienen en el resumen de la RPC,
    // solo se traen con un SELECT normal, ya permitido por la politica
    // solicitudes_select_admin existente (sin necesitar ningun permiso nuevo).
    const { data: filaActualizada, error: errorFila } = await sb
      .from('solicitudes_cambio_precio')
      .select('*')
      .eq('id', s.id)
      .single();
    if (!errorFila && filaActualizada) {
      matrizSolicitudesRows = matrizSolicitudesRows.map(function (row) { return row.id === s.id ? filaActualizada : row; });
    }

    // Refrescar los descuentos de la Matriz si la institucion afectada es la
    // que esta seleccionada -- reutiliza la RPC de solo lectura ya existente
    // desde Fase 4.1, sin agregar ninguna llamada de escritura nueva.
    // FASE 5.9A -- se agrega el mismo refresco para matrizCatalogoRows (sub-tab
    // Catalogo), que mostraba precioFinal desactualizado hasta reseleccionar
    // la institucion (hallazgo de Fase 5.9). Mismo patron: RPC de solo
    // lectura ya existente, sin recalcular nada en el cliente -- la fuente
    // de verdad sigue siendo Supabase.
    if (matrizInstitucionSel && matrizEjecutarCambioResultado && matrizInstitucionSel === matrizEjecutarCambioResultado.institucion_codigo) {
      const { data: descData } = await sb.rpc('matriz_descuentos_institucion', { p_institucion_codigo: matrizInstitucionSel });
      if (descData) matrizDescuentosRows = descData;

      const { data: catData } = await sb.rpc('matriz_catalogo_institucion', { p_institucion_codigo: matrizInstitucionSel });
      if (catData) matrizCatalogoRows = catData;
    }
  } catch (e) {
    matrizEjecutarCambioError = 'Error de red al ejecutar el cambio.';
  }
  matrizEjecutarCambioGuardando = false;
  renderMatrizInstitucional();
}

// ============================================================
// FASE 6.0A -- Simulador de visibilidad institucional de productos.
// TODO este bloque es de solo lectura. Ninguna funcion aqui abajo

// puede confirmar leyendo cada funcion completa, ninguna contiene
// sb.from(...).insert/update/delete ni sb.rpc con un nombre de
// escritura conocido (ejecutar_*, aprobar_*, crear_*).
// ============================================================

function buscarProductoVisibilidad() {
  const termino = (matrizSimVisBusqueda || '').trim().toLowerCase();
  matrizSimVisError = '';
  matrizSimVisResultados = [];
  if (!termino || !matrizInstitucionSel) {
    renderMatrizInstitucional();
    return;
  }

  // FASE 6.0A-HOTFIX -- CAUSA RAIZ del bug original: la version anterior
  // consultaba productos/producto_familias directamente via sb.from(...),
  // ejecutandose como el rol 'authenticated' del admin logueado. Ambas
  // tablas tienen RLS activo con 0 politicas definidas -- confirmado con
  // SET ROLE authenticated + SELECT real, que devolvio 0 filas SIN
  // ningun error (RLS filtra filas silenciosamente, no lanza excepcion).
  // Por eso nunca aparecia resultado ni mensaje de error.
  //
  // Correccion: buscar exclusivamente dentro de matrizCatalogoRows, que
  // ya esta cargado en memoria via matriz_catalogo_institucion (RPC
  // SECURITY DEFINER, sin problema de RLS -- mismo dato que ya usa la
  // tabla del sub-tab Catalogo). Sin ninguna consulta de red nueva.
  //
  // LIMITACION CONOCIDA que este hotfix acepta explicitamente: esto solo
  // encuentra productos actualmente VISIBLES para la institucion
  // seleccionada. Un producto excluido por marca (marca_excluida) no
  // aparece en matrizCatalogoRows y por lo tanto no aparecera en esta
  // busqueda -- restaurar esa capacidad requeriria una RPC de solo
  // lectura nueva en Supabase, fuera de alcance de este hotfix (que
  // tiene prohibido modificar Supabase o crear RPC).
  matrizSimVisResultados = matrizCatalogoRows.filter(function (r) {
    return (r.codigo || '').toLowerCase().indexOf(termino) !== -1 ||
           (r.descripcion || '').toLowerCase().indexOf(termino) !== -1 ||
           (r.familia || '').toLowerCase().indexOf(termino) !== -1;
  }).slice(0, 20);

  renderMatrizInstitucional();
}

// Determina disponibilidad actual de un producto para la institucion
// seleccionada, cruzando contra matrizCatalogoRows (fuente unica de
// verdad de "que ve la RPC hoy"). Funcion PURA, sin ningun acceso a red.
function determinarDisponibilidadVisibilidad(producto) {
  const filaVisible = matrizCatalogoRows.find(function (r) { return r.codigo === producto.codigo; });
  if (filaVisible) {
    return {
      disponible: true,
      motivo: null,
      precioFinalRef: filaVisible.precioFinal,
      tieneOverride: !!filaVisible.tiene_override,
      overrideInfo: filaVisible.tiene_override ? { tipo: filaVisible.tipo_override, motivo: filaVisible.motivo_override } : null,
    };
  }
  return {
    disponible: false,
    motivo: 'No aparece en el catálogo maestro de ' + matrizInstitucionSel + ' -- probablemente excluido por marca (marca_excluida). No se pudo confirmar la causa exacta de forma automática; verificar institucion_catalogo manualmente si es necesario.',
    precioFinalRef: null,
    tieneOverride: false,
    overrideInfo: null,
  };
}

function abrirSimulacionVisibilidad(codigo) {
  const producto = matrizSimVisResultados.find(function (p) { return p.codigo === codigo; });
  if (!producto) return;
  matrizSimVisAbierto = producto;
  matrizSimVisImpacto = null;
  matrizSimVisCalculando = true;
  renderMatrizInstitucional();
  calcularImpactoVisibilidad(producto);
}

function cerrarSimulacionVisibilidad() {
  matrizSimVisAbierto = null;
  matrizSimVisImpacto = null;
  matrizSimVisCalculando = false;
  renderMatrizInstitucional();
}

// Extrae un mensaje legible de cualquier forma de error que Supabase/
// PostgREST pueda devolver -- nunca produce "[object Object]". Usado tanto
// para el log tecnico en consola como, si alguna vez hiciera falta, para
// mostrar un mensaje al usuario.
function mensajeErrorSeguro(error) {
  if (!error) return 'Error desconocido';
  if (typeof error === 'string') return error;
  return error.message || error.details || JSON.stringify(error);
}

async function calcularImpactoVisibilidad(producto) {
  const disponibilidad = determinarDisponibilidadVisibilidad(producto);
  const familiaLower = (producto.familia || '').toLowerCase();
  const esPosibleCierre = familiaLower.indexOf('tapa') !== -1 || familiaLower.indexOf('cicatrizador') !== -1;

  // HOTFIX 2 -- el conteo de cotizaciones historicas es informacion
  // COMPLEMENTARIA, nunca una condicion necesaria para abrir la
  // simulacion. Si esta consulta falla, la simulacion continua igual --
  // el detalle tecnico del error se registra SOLO en consola (con
  // message/code/details/hint reales, nunca "[object Object]"), y el
  // modal muestra un texto neutro en su lugar, sin bloquear nada.
  let cotizacionesAfectadas = null;
  let impactoHistoricoDisponible = true;

  try {
    // Confirmar el impacto REAL en cotizaciones historicas de la
    // institucion seleccionada especificamente -- HOTFIX 2 tambien
    // corrige un defecto real encontrado en el diagnostico: la version
    // anterior no filtraba por institucion_codigo, contando el codigo
    // en TODAS las instituciones en vez de solo en la seleccionada.
    const { count, error } = await sb
      .from('cotizaciones')
      .select('id', { count: 'exact', head: true })
      .eq('institucion_codigo', matrizInstitucionSel)
      .is('deleted_at', null)
      .contains('items', [{ codigo: producto.codigo }]);
    if (error) throw error;
    cotizacionesAfectadas = count || 0;
  } catch (e) {
    impactoHistoricoDisponible = false;
    console.error('[simuladorVisibilidad] No se pudo calcular el impacto histórico:', mensajeErrorSeguro(e), {
      message: e && e.message,
      code: e && e.code,
      details: e && e.details,
      hint: e && e.hint,
    });
  }

  matrizSimVisImpacto = {
    cotizacionesAfectadas: cotizacionesAfectadas,
    impactoHistoricoDisponible: impactoHistoricoDisponible,
    esPosibleCierre: esPosibleCierre,
    esHosmil: matrizInstitucionSel === 'HOSMIL',
    disponibilidad: disponibilidad,
  };
  matrizSimVisCalculando = false;
  renderMatrizInstitucional();
}

async function confirmarAccionSolicitud() {
  if (!matrizSolicitudAccionAbierta) return;
  const id = matrizSolicitudAccionAbierta.id;
  const accion = matrizSolicitudAccionAbierta.accion;
  const motivoEl = document.getElementById('accion-solicitud-motivo');
  const motivo = motivoEl ? motivoEl.value.trim() : '';

  // FASE 5.7 -- "aprobar" muestra el campo de observacion pero NO la exige
  // (a diferencia de anular/rechazar, que siguen requiriendo motivo).
  const requiereMotivo = (accion === 'anular' || accion === 'rechazar');
  if (requiereMotivo && !motivo) {
    matrizSolicitudAccionError = 'El motivo es obligatorio para ' + (accion === 'anular' ? 'anular' : 'rechazar') + ' una solicitud.';
    renderMatrizInstitucional();
    return;
  }

  let updatePayload;
  if (accion === 'enviar_aprobacion') {
    updatePayload = { estado: 'pendiente_aprobacion', observaciones: 'Enviada a aprobación desde Matriz Admin.' + (motivo ? ' ' + motivo : '') };
  } else if (accion === 'anular') {
    updatePayload = { estado: 'anulada', observaciones: 'Anulada desde Matriz Admin. Motivo: ' + motivo };
  } else if (accion === 'rechazar') {
    updatePayload = { estado: 'rechazada', observaciones: 'Rechazada desde Matriz Admin. Motivo: ' + motivo };
  } else if (accion === 'aprobar') {
    // FASE 5.7 -- unica accion que ademas puebla aprobado_por/aprobado_en
    // (columnas ya existentes desde Fase 5.1A, nunca usadas hasta ahora), y
    // que AGREGA texto a observaciones en vez de sobreescribirlas, para no
    // perder el historial previo (ej. el motivo de "enviar a aprobacion").
    const { data: userData } = await sb.auth.getUser();
    const uid = (userData && userData.user) ? userData.user.id : null;
    const observacionesPrevias = (matrizSolicitudAccionAbierta.observacionesPrevias || '').trim();
    const notaAprobacion = 'Aprobada desde Matriz Admin.' + (motivo ? ' ' + motivo : '');
    updatePayload = {
      estado: 'aprobada',
      aprobado_por: uid,
      aprobado_en: new Date().toISOString(),
      observaciones: observacionesPrevias ? (observacionesPrevias + ' | ' + notaAprobacion) : notaAprobacion
    };
  } else {
    return; // accion desconocida -- defensivo, no deberia ocurrir
  }

  matrizSolicitudAccionGuardando = true;
  matrizSolicitudAccionError = '';
  renderMatrizInstitucional();

  try {
    // FASE 5.5/5.7 -- solo se actualizan estado/observaciones (y, unicamente
    // en 'aprobar', aprobado_por/aprobado_en). NUNCA validacion_posterior en
    // esta fase (queda para el flujo de ejecucion real, todavia no
    // implementado). Ningun cambio a productos/descuentos_institucionales/
    // precio_compartido_override/reglas_cierre_institucional/cotizaciones/
    // auditoria_cambios. Esta fase NO ejecuta ningun cambio comercial --
    // "aprobada" sigue siendo solo un estado dentro de solicitudes_cambio_precio.
    const { data, error } = await sb.from('solicitudes_cambio_precio')
      .update(updatePayload)
      .eq('id', id)
      .select()
      .single();
    if (error) {
      matrizSolicitudAccionError = 'No se pudo actualizar la solicitud: ' + error.message;
    } else {
      matrizSolicitudesRows = matrizSolicitudesRows.map(function (s) { return s.id === id ? data : s; });
      matrizSolicitudAccionAbierta = null;
      matrizSolicitudAccionMotivo = '';
    }
  } catch (e) {
    matrizSolicitudAccionError = 'Error de red al actualizar la solicitud.';
  }
  matrizSolicitudAccionGuardando = false;
  renderMatrizInstitucional();
}

function renderMatrizInstitucional() {
  document.getElementById('login-view').style.display = 'none';
  const v = document.getElementById('dashboard-view');

          '<td>' + (d.tiene_regla_automatica ? '<span style="font-size:10px;font-weight:700;background:#fef3c7;color:#92400e;border-radius:5px;padding:2px 6px;">Sí</span>' : '') + '</td>' +

      // FASE 5.3 -- MODIFICACION JUSTIFICADA respecto a Fase 5.2B: el boton que

      '</tr></thead><tbody>' + (filas || '<tr><td colspan="13" style="color:var(--muted);padding:16px 10px">Sin solicitudes' + (matrizSolicitudesFiltroEstado !== 'todos' || matrizSolicitudesFiltroInstitucion !== 'todas' ? ' con los filtros actuales.' : ' todavía.') + '</td></tr>') + '</tbody></table></div>' +

  function construirModalDetalleSolicitud() {
    if (!matrizSolicitudDetalleAbierta) return '';
    const s = matrizSolicitudDetalleAbierta;
    const bloqueJson = function (titulo, obj) {
      if (obj === null || obj === undefined) return '';
      return '<div style="margin-top:10px;"><label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:3px;">' + esc(titulo) + '</label>' +
        '<pre style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-size:11px;overflow-x:auto;white-space:pre-wrap;word-break:break-word;margin:0;">' + esc(JSON.stringify(obj, null, 2)) + '</pre></div>';
    };
    // Fase 5.6B -- bloque legible del plan de reversa guardado en
    // rollback_sql (Fase 5.6A). Solo lectura -- ningun boton de ejecucion,
    // aplicacion ni aprobacion. rollback_sql se guarda como TEXTO (columna
    // text), por eso siempre llega como string desde Supabase y hay que
    // parsearlo aqui -- nunca se interpreta ni se ejecuta, solo se muestra.
    const construirBloquePlanReversa = function (rollbackSqlRaw) {
      if (!rollbackSqlRaw) {
        return '<div style="margin-top:14px;background:#f4f4f5;border:1px solid var(--border);border-radius:8px;padding:12px 16px;">' +

  // FASE 6.0A -- modal de simulacion de visibilidad. UNICO boton de accion

  function construirModalSimulacionVisibilidad() {
    if (!matrizSimVisAbierto) return '';
    const p = matrizSimVisAbierto;

    if (matrizSimVisCalculando || !matrizSimVisImpacto) {
      return '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1002;">' +

    // HOTFIX 2 -- ya NO existe un branch que bloquee el modal por error.
    // El impacto historico es informacion complementaria: si la consulta

    // modal muestra un texto neutro en su lugar (mas abajo), sin impedir
    // que el resto de la simulacion se vea normalmente.

    const disp = matrizSimVisImpacto.disponibilidad;
    const accion = disp.disponible ? 'Desactivar' : 'Activar';
    const estadoPropuesto = disp.disponible ? 'No disponible' : 'Disponible';

    let advertencias = '';
    if (matrizSimVisImpacto.esPosibleCierre) {
      advertencias += '<div style="margin-top:8px;padding:8px 12px;background:#fef3c7;border:1px solid #fde68a;border-radius:7px;font-size:12px;color:#92400e;">⚠️ La familia de este producto sugiere que podría participar en la regla de tapa/cicatrizador automático al 99%. Esa regla se calcula desde <code>precioLista</code> directamente, no depende de <code>precioFinal</code> ni de este simulador, pero cambiar la disponibilidad de este código podría afectar el flujo de agregado automático. Verificar manualmente en el recetario antes de un cambio real.</div>';
    }
    if (matrizSimVisImpacto.esHosmil) {
      advertencias += '<div style="margin-top:8px;padding:8px 12px;background:#f4f4f5;border-radius:7px;font-size:12px;color:var(--muted);">ℹ️ HOSMIL tiene una lista adicional de productos ocultos (<code>PRODUCTOS_OCULTOS</code>) hardcodeada directamente en <code>recetario.html</code> -- no está en Supabase, por lo que este simulador no puede confirmar si este código está en esa lista. Verificar manualmente el archivo si es relevante.</div>';
    }
    if (!disp.disponible) {
      advertencias += '<div style="margin-top:8px;padding:8px 12px;background:#f4f4f5;border-radius:7px;font-size:12px;color:var(--muted);">' + esc(disp.motivo) + '</div>';
    }
    if (disp.tieneOverride) {
      advertencias += '<div style="margin-top:8px;padding:8px 12px;background:#d1fae5;border-radius:7px;font-size:12px;color:#065f46;">🔒 Este producto tiene un override de precio activo (' + esc(disp.overrideInfo.tipo || '-') + '). Activar/desactivar visibilidad no modifica el override ni el precio.</div>';
    }

    return '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1002;" onclick="if(event.target===this){cerrarSimulacionVisibilidad();}">' +
      '<div style="background:#fff;border-radius:12px;padding:24px;max-width:480px;width:92%;box-shadow:0 10px 40px rgba(0,0,0,0.25);">' +
        '<h3 style="margin:0 0 6px;">🔍 Simulación -- ' + esc(accion) + '</h3>' +
        '<p style="margin:0 0 12px;font-size:12px;color:var(--muted);">Esta es solo una simulación visual. No se modificará ningún dato en Supabase.</p>' +
        '<div style="font-size:13px;line-height:1.8;background:var(--bg);border-radius:8px;padding:10px 14px;">' +
          '<b>Institución:</b> ' + esc(matrizInstitucionSel) + '<br>' +
          '<b>Producto:</b> ' + esc(p.codigo) + ' -- ' + esc(p.descripcion) + '<br>' +
          '<b>Familia:</b> ' + esc(p.familia || '-') + '<br>' +
          '<b>Estado actual:</b> ' + (disp.disponible ? '<span style="color:#166534;">Disponible</span>' : '<span style="color:#991b1b;">No disponible</span>') + '<br>' +
          '<b>Estado propuesto:</b> ' + estadoPropuesto + '<br>' +
          '<b>Cambio de visibilidad:</b> ' + (disp.disponible ? 'Dejaría de aparecer en nuevas cotizaciones' : 'Aparecería en el catálogo institucional en la próxima carga') + '<br>' +
          '<b>Cotizaciones históricas afectadas:</b> ' + (matrizSimVisImpacto.impactoHistoricoDisponible ? (matrizSimVisImpacto.cotizacionesAfectadas + ' (verificado, no modificarían su contenido)') : 'no disponible para esta sesión') + '<br>' +
          '<b>Precio y descuentos:</b> Sin cambios' +
        '</div>' +
        (matrizSimVisImpacto.impactoHistoricoDisponible ? '' : '<div style="margin-top:8px;padding:8px 12px;background:#f4f4f5;border-radius:7px;font-size:12px;color:var(--muted);">La activación o desactivación no modifica cotizaciones históricas.</div>') +
        advertencias +
        '<div style="display:flex;justify-content:flex-end;margin-top:16px;">' +
          '<button class="btn-logout" onclick="cerrarSimulacionVisibilidad()" style="background:#1a1a1a;color:#fff;">Cerrar</button>' +

      '</div>' +

      '<div style="background:#fff;border-radius:12px;padding:24px;max-width:480px;width:92%;box-shadow:0 10px 40px rgba(0,0,0,0.25);">' +
        '<h3 style="margin:0 0 6px;color:#991b1b;">⚠️ Ejecutar cambio aprobado</h3>' +

        '<div style="font-size:13px;line-height:1.8;background:var(--bg);border-radius:8px;padding:10px 14px;">' +

  v.innerHTML =
    '<header class="topbar"><div><div class="brand-name">STRAUMANN</div><div class="brand-sub">GROUP CHILE · NEODENT</div></div>' +

    '<main>' +
    tabsHtml +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px;">' +
      '<h2 style="margin:0;font-size:18px;">Matriz Institucional</h2>' +
      '<button class="btn-logout" onclick="refrescarMatriz()">🔄 Refrescar</button>' +
    '</div>' +
    '<p style="margin:0 0 18px;font-size:12px;color:var(--muted);">🔒 Vista de solo lectura. Ningún control de esta pantalla modifica precios, descuentos, productos, overrides ni el catálogo — para cambios, contactar a Daniel.</p>' +
    cardsHtml +
    tablaResumenHtml +
    selectorHtml +
    subTabsHtml +
    seccionesHtml +
    '</main>';

  document.getElementById('btn-logout').addEventListener('click', doLogout);

  const selInst = document.getElementById('matriz-selector-institucion');
  if (selInst) selInst.addEventListener('change', function (e) { seleccionarInstitucionMatriz(e.target.value); });

  const ft = document.getElementById('matriz-filtro-texto');
  if (ft) {
    ft.addEventListener('input', function (e) { matrizFiltro.texto = e.target.value; matrizFiltroTextoFoco = true; renderMatrizInstitucional(); });
    if (matrizFiltroTextoFoco) {
      ft.focus();
      const p = ft.value.length;
      try { ft.setSelectionRange(p, p); } catch (e) {}
    }
  }
  const fm = document.getElementById('matriz-filtro-marca');
  if (fm) fm.addEventListener('change', function (e) { matrizFiltro.marca = e.target.value; renderMatrizInstitucional(); });
  const ff = document.getElementById('matriz-filtro-familia');
  if (ff) ff.addEventListener('change', function (e) { matrizFiltro.familia = e.target.value; renderMatrizInstitucional(); });
  const fo = document.getElementById('matriz-filtro-override');
  if (fo) fo.addEventListener('change', function (e) { matrizFiltro.soloOverride = e.target.checked; renderMatrizInstitucional(); });
  const fd = document.getElementById('matriz-filtro-duplicado');
  if (fd) fd.addEventListener('change', function (e) { matrizFiltro.soloDuplicado = e.target.checked; renderMatrizInstitucional(); });

  // FASE 6.0A -- input del buscador de visibilidad, mismo patron de
  // preservacion de foco que matriz-filtro-texto. Enter dispara la
  // busqueda (misma funcion de solo lectura que el boton "Buscar").
  const svq = document.getElementById('matriz-simvis-busqueda');
  if (svq) {
    svq.addEventListener('input', function (e) { matrizSimVisBusqueda = e.target.value; });
    svq.addEventListener('keydown', function (e) { if (e.key === 'Enter') buscarProductoVisibilidad(); });
  }

  // Fase 4.2B -- filtros del Comparador (mismo patron de "no perder foco" que
  // el filtro de texto de Catalogo, adaptado a esta seccion nueva).
  const ct = document.getElementById('matriz-comparador-texto');
  if (ct) {
    ct.addEventListener('input', function (e) { matrizComparadorFiltro.texto = e.target.value; matrizFiltroTextoFoco = true; renderMatrizInstitucional(); });
    if (matrizFiltroTextoFoco) {
      ct.focus();
      const p = ct.value.length;
      try { ct.setSelectionRange(p, p); } catch (e) {}
    }
  }
  const cd = document.getElementById('matriz-comparador-solo-diferencias');
  if (cd) cd.addEventListener('change', function (e) { matrizComparadorFiltro.soloDiferencias = e.target.checked; renderMatrizInstitucional(); });

  // Fase 5.2B -- el select de familia se recuerda para re-render (ej. tras
  // simular), pero NO dispara ninguna llamada a Supabase por si solo -- la
  // llamada ocurre unicamente al hacer click en "Simular impacto".
  const sf = document.getElementById('simulador-familia');
  if (sf) sf.addEventListener('change', function (e) { matrizSimuladorFamilia = e.target.value; });

  // Fase 5.3 -- textarea de motivo dentro del modal, mismo patron de
  // preservacion de foco ya usado en los filtros de texto de la Matriz.
  const sm = document.getElementById('solicitud-motivo');
  if (sm) {
    sm.addEventListener('input', function (e) { matrizSolicitudMotivo = e.target.value; matrizSolicitudMotivoFoco = true; renderMatrizInstitucional(); });
    if (matrizSolicitudMotivoFoco) {
      sm.focus();
      const p = sm.value.length;
      try { sm.setSelectionRange(p, p); } catch (e) {}
    }
  }

  // Fase 5.4 -- filtros de la bandeja de solicitudes (solo filtran sobre los
  // datos ya cargados, no vuelven a llamar a Supabase).
  const sfe = document.getElementById('solicitudes-filtro-estado');
  if (sfe) sfe.addEventListener('change', function (e) { matrizSolicitudesFiltroEstado = e.target.value; renderMatrizInstitucional(); });
  const sfi = document.getElementById('solicitudes-filtro-institucion');
  if (sfi) sfi.addEventListener('change', function (e) { matrizSolicitudesFiltroInstitucion = e.target.value; renderMatrizInstitucional(); });

  // Fase 5.5 -- textarea de motivo dentro del modal de accion (Anular/
  // Rechazar), mismo patron de preservacion de foco ya usado en el resto
  // de la Matriz.
  const asm = document.getElementById('accion-solicitud-motivo');
  if (asm) {
    asm.addEventListener('input', function (e) { matrizSolicitudAccionMotivo = e.target.value; matrizSolicitudAccionMotivoFoco = true; renderMatrizInstitucional(); });
    if (matrizSolicitudAccionMotivoFoco) {
      asm.focus();
      const p = asm.value.length;
      try { asm.setSelectionRange(p, p); } catch (e) {}
    }
  }
}

sb.auth.onAuthStateChange(function (event, session) {
  if (session) {
    suscribirRealtime();
    cargarMiPerfil().then(cargarCotizaciones);
  } else {
    miPerfil = null;
    if (channel) { sb.removeChannel(channel); channel = null; }
    renderLogin();
  }
});

async function cargarMiPerfil() {
  try {
    const { data: userData } = await sb.auth.getUser();
    if (!userData || !userData.user) { miPerfil = null; return; }
    const { data, error } = await sb.from('admin_perfiles')
      .select('es_super_admin, es_observador')
      .eq('user_id', userData.user.id)
      .maybeSingle();
    miPerfil = (!error && data) ? data : null;
  } catch (e) {
    miPerfil = null;
  }
}

(async function init() {
  const { data } = await sb.auth.getSession();
  if (data && data.session) {
    await cargarMiPerfil();
    suscribirRealtime();
    cargarCotizaciones();
  } else {
    renderLogin();
  }
})();
</script>
</body>
</html>
