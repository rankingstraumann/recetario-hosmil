<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tu cotización | Straumann Group Chile</title>
<style>
  /* FASE E2 -- estilos reutilizados del patron visual ya validado en el
     Recetario Institucional (index.html de la raiz del repo): mismos
     tokens de color, misma estructura de .card/.card-head/tabla/totales/
     disclaimer/boton imprimir. Se omite deliberadamente todo el bloque
     de confirmacion de pago (transferencia/Webpay/comprobante), que es
     especifico del flujo paciente-institucion y no aplica aqui. */
  :root {
    --red: #991b1b;
    --red-dark: #7f1d1d;
    --ink: #18181b;
    --muted: #71717a;
    --border: #e4e4e7;
    --bg: #f8fafc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow-x: hidden;
  }
  header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: calc(12px + env(safe-area-inset-top)) 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .brand-name { color: var(--red); font-weight: 800; font-size: 18px; letter-spacing: -0.02em; line-height: 1; }
  .brand-sub { color: #a1a1aa; font-size: 10px; letter-spacing: 0.2em; font-weight: 600; margin-top: 2px; }
  main { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); margin-bottom: 20px; }
  .card-head { display:flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .qnum-label { font-size:11px; color:#a1a1aa; }
  .qnum { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-weight:700; font-size:14px; }
  .qdate { font-size:11px; color:#a1a1aa; margin-top:2px; }
  .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap:16px; font-size:14px; margin-bottom: 18px; }
  @media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }
  .field-label { font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:#a1a1aa; }
  .field-value { font-weight:600; margin-top:2px; }

  .estado-badge { display:inline-block; font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; margin-bottom:18px; }
  .estado-enviada { background:#eff6ff; color:#1d4ed8; }
  .estado-aceptada { background:#ecfdf5; color:#047857; }
  .estado-rechazada { background:#fef2f2; color:#b91c1c; }
  .estado-vencida { background:#fffbeb; color:#92400e; }
  .estado-anulada { background:#f4f4f5; color:#52525b; }
  .estado-borrador { background:#f4f4f5; color:#52525b; }

  table { width:100%; table-layout: fixed; border-collapse: collapse; font-size:13px; margin-bottom: 16px; }
  thead th { text-align:left; font-size:11px; text-transform:uppercase; color:#a1a1aa; border-bottom:1px solid var(--border); padding:0 6px 8px 0; font-weight:500; line-height:1.3; }
  thead th:first-child { padding-left:0; }
  thead th:last-child { padding-right:0; }
  tbody td { padding: 9px 6px 9px 0; border-bottom: 1px solid #f4f4f5; vertical-align: top; word-break: break-word; }
  tbody td:first-child { padding-left:0; }
  tbody td:last-child { padding-right:0; }
  .code { font-family: ui-monospace, monospace; font-size:10px; color:#a1a1aa; }
  .right { text-align:right; }
  .center { text-align:center; }
  /* FASE E2.1 -- ancho fijo para las 3 columnas numericas via colgroup;
     "Producto" toma automaticamente el resto. Esto evita que la tabla
     comprima erraticamente Precio unit./Subtotal hasta pegarlas, que era
     la causa real reportada en iPhone. */
  col.col-cant { width: 13%; }
  col.col-precio { width: 25%; }
  col.col-subtotal { width: 25%; }
  @media (max-width: 400px) {
    table { font-size: 11.5px; }
    thead th { font-size: 9.5px; }
    col.col-cant { width: 12%; }
    col.col-precio { width: 27%; }
    col.col-subtotal { width: 27%; }
  }
  .total-row { display:flex; justify-content:flex-end; }
  .total-box { width: 240px; max-width: 100%; }
  .total-line { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
  .total-line.grand { border-top:2px solid var(--ink); margin-top:6px; padding-top:10px; }
  .total-line.grand .label { font-weight:700; font-size:14px; }
  .total-line.grand .value { font-weight:800; font-size:16px; color: var(--red); }
  .disclaimer { font-size:10px; color:#a1a1aa; line-height:1.5; border-top:1px solid #f4f4f5; padding-top:12px; margin-top:20px; }

  .approve-card { background:#fff; border:2px dashed var(--border); border-radius:14px; padding:22px; text-align:center; color:#a1a1aa; font-size:12px; }
  .approve-card .btn-disabled { width:100%; margin-top:12px; background:#e4e4e7; color:#a1a1aa; border:none; border-radius:10px; padding:13px; font-size:14px; font-weight:700; cursor:not-allowed; }
  /* FASE 5 -- flujo de confirmacion inline, mismos tokens de color ya
     usados en el resto del archivo (--red, --border), sin clases
     tomadas de otro archivo que aqui no existen. */
  .approve-card .btn-primary { width:100%; margin-top:12px; background:var(--red); color:#fff; border:none; border-radius:10px; padding:13px; font-size:14px; font-weight:700; cursor:pointer; }
  .approve-card .btn-primary:disabled { background:#e4e4e7; color:#a1a1aa; cursor:not-allowed; }
  .approve-card .btn-secondary { width:100%; margin-top:8px; background:#fff; color:var(--ink); border:1px solid var(--border); border-radius:10px; padding:11px; font-size:13px; font-weight:600; cursor:pointer; }
  .approve-card .checkbox-row { display:flex; align-items:flex-start; gap:8px; font-size:13px; text-align:left; margin-bottom:4px; color:var(--ink); }
  .approve-success { background:#ecfdf5; border:2px solid #a7f3d0; border-radius:14px; padding:22px; text-align:center; }
  .approve-success .title { font-weight:700; color:#047857; font-size:15px; }
  .approve-success .sub { font-size:12px; color:#047857; margin-top:4px; }
  .approve-error { font-size:12px; color:#b91c1c; margin:8px 0; }

  .state-msg { text-align:center; padding: 60px 20px; color:#71717a; font-size:14px; line-height:1.6; }
  .print-btn { display:flex; align-items:center; gap:6px; font-size:12px; color:#71717a; background:none; border:none; cursor:pointer; }
  @media print { .no-print { display:none !important; } }
</style>
</head>
<body>
  <header class="no-print">
    <div>
      <div class="brand-name">STRAUMANN</div>
      <div class="brand-sub">COTIZADOR COMERCIAL</div>
    </div>
    <button class="print-btn" onclick="window.print()" id="printBtn" style="display:none;">🖨️ Imprimir / Guardar PDF</button>
  </header>
  <main id="main">
    <div class="state-msg" id="loading">Cargando tu cotización…</div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// FASE E2 -- pagina publica de solo lectura para el cliente. Sin login.
// Unica fuente de datos: la RPC publica ya creada y probada en la Fase 1
// (obtener_cotizacion_comercial_publica). No hay ninguna otra consulta a
// tablas, ni SELECT *, ni busqueda por folio/UUID/otro identificador --
// el unico parametro aceptado es el token tomado de la URL.
const SUPABASE_URL = 'https://gzimllusbxjorbsbtsse.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6aW1sbHVzYnhqb3Jic2J0c3NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDQ4NDcsImV4cCI6MjA5NzUyMDg0N30.DFq-_PY10hyr2QmMUXk-v8VW2LKYz3bAW37VCutwmzY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function fmt(n) { return '$' + Math.round(n || 0).toLocaleString('es-CL'); }
function fechaCorta(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric' });
  } catch (e) { return '-'; }
}
function esc(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

const ETIQUETAS_ESTADO = {
  borrador: 'Borrador',
  enviada: 'Pendiente de aprobación',
  aceptada: 'Aprobada',
  rechazada: 'Rechazada',
  vencida: 'Vencida',
  anulada: 'Anulada'
};

// Mensaje generico unico para TODO caso de fallo (token vacio, invalido,
// malformado o inexistente) -- deliberadamente identico en los 4 casos
// para no revelar cual de ellos ocurrio.
function mostrarError() {
  document.getElementById('main').innerHTML =
    '<div class="state-msg">No pudimos encontrar esta cotización.<br>Revisa que el enlace esté completo, o pídele al ejecutivo que te lo reenvíe.</div>';
}

function construirFilaProducto(it) {
  return '<tr>' +
    '<td><div class="code">' + esc(it.codigo) + '</div>' + esc(it.descripcion) + '</td>' +
    '<td class="center">' + esc(it.cantidad) + '</td>' +
    '<td class="right">' + fmt(it.precio_neto_unitario) + '</td>' +
    '<td class="right" style="font-weight:600;">' + fmt(it.subtotal_item) + '</td>' +
    '</tr>';
}

// FASE 5 -- estado del flujo de aprobacion. currentToken se guarda una
// sola vez en init() y se reutiliza aqui -- nunca se guarda en
// localStorage ni se loggea. El backend (aprobar_cotizacion_comercial_publica,
// ya probada en la Fase 1) sigue siendo la unica autoridad real; todo
// esto es exclusivamente capa de experiencia de usuario.
let currentToken = null;
let currentQuote = null;
let mostrandoConfirmacionAprobacion = false;
let checkboxAprobacionMarcado = false;
let aprobando = false;
let aprobacionError = '';
let aprobacionExitosa = false;

// FASE D2.6 -- rechazo de cotizacion desde el link publico, mismo patron
// de seguridad y de compatibilidad Safari/iOS ya usado en D2.5. El
// motivo es opcional para el cliente; si no escribe nada, el backend
// guarda un texto generico SOLO para auditoria -- el mensaje de
// WhatsApp nunca usa ese texto generico, solo lo que el cliente
// realmente escribio (o nada, si dejo el campo vacio).
let mostrandoConfirmacionRechazo = false;
let rechazando = false;
let rechazoError = '';
let rechazoExitoso = false;
let rechazoMotivoTexto = '';

function mostrarPanelRechazo() {
  mostrandoConfirmacionRechazo = true;
  rechazoError = '';
  rechazoMotivoTexto = '';
  render(currentQuote);
}
function cancelarRechazo() {
  mostrandoConfirmacionRechazo = false;
  rechazoError = '';
  rechazoMotivoTexto = '';
  render(currentQuote);
}
function construirMensajeWhatsAppRechazo(q, motivo) {
  var lineaMotivo = motivo ? ('Motivo: ' + motivo + '\n\n') : '';
  return 'Hola ' + (q.ejecutivo_nombre || 'Ejecutivo Straumann') + ',\n\n' +
    'He rechazado la cotización ' + q.folio + ' por un total de ' + fmt(q.total) + '.\n\n' +
    lineaMotivo +
    'Por favor, contáctame para revisar alternativas.\n\nGracias.';
}

// FASE D2.5 -- confirmacion de pedido via WhatsApp al ejecutivo. La
// aprobacion en base de datos SIEMPRE tiene prioridad; WhatsApp es
// exclusivamente una capa adicional que nunca bloquea ni condiciona la
// aprobacion real.
let whatsappAvisoSinTelefono = '';
let whatsappUrlPendiente = null;
let whatsappAbierto = false;

// Normaliza al formato que wa.me exige: solo digitos, con codigo de
// pais, sin '+'. Nunca inventa un numero -- si el formato no se puede
// interpretar con confianza, devuelve null (sin telefono usable).
function normalizarTelefonoWhatsApp(telefono) {
  if (!telefono) return null;
  var limpio = String(telefono).replace(/[^\d+]/g, '');
  var traiaPlus = limpio.charAt(0) === '+';
  if (traiaPlus) limpio = limpio.slice(1);

  if (limpio.indexOf('56') === 0 && limpio.length === 11) {
    // ya viene con codigo de pais chileno completo -- no se toca
  } else if (limpio.length === 9 && limpio.charAt(0) === '9') {
    limpio = '56' + limpio; // movil chileno sin codigo de pais
  } else if (limpio.length === 10 && limpio.charAt(0) === '0') {
    limpio = '56' + limpio.slice(1); // formato antiguo con 0 inicial
  } else if (!traiaPlus && !(limpio.length >= 11 && limpio.length <= 13)) {
    return null; // formato no reconocido, no se adivina
  }

  if (!/^\d{8,15}$/.test(limpio)) return null;
  return limpio;
}

function construirMensajeWhatsApp(q) {
  return 'Hola ' + (q.ejecutivo_nombre || 'Ejecutivo Straumann') + ',\n\n' +
    'Confirmo la aprobación de la cotización ' + q.folio + ' por un total de ' + fmt(q.total) + '.\n\n' +
    'Autorizo continuar con la facturación del pedido.\n\nGracias.';
}

function mostrarPanelAprobacion() {
  mostrandoConfirmacionAprobacion = true;
  checkboxAprobacionMarcado = false;
  aprobacionError = '';
  render(currentQuote);
}
function cancelarAprobacion() {
  mostrandoConfirmacionAprobacion = false;
  checkboxAprobacionMarcado = false;
  aprobacionError = '';
  render(currentQuote);
}
function toggleCheckboxAprobacion(checked) {
  checkboxAprobacionMarcado = !!checked;
  render(currentQuote);
}
async function confirmarAprobacion() {
  if (aprobando || !checkboxAprobacionMarcado || !currentToken) return;
  aprobando = true;
  aprobacionError = '';
  whatsappAvisoSinTelefono = '';
  whatsappUrlPendiente = null;
  whatsappAbierto = false;
  render(currentQuote);

  // CRITICO para Safari/iOS: la ventana se abre de forma SINCRONA, aqui
  // mismo, dentro del gesto de clic original -- antes de cualquier
  // await. Si se abriera despues de la llamada a la RPC, Safari la
  // bloquearia como popup no solicitado por el usuario. Se navega a la
  // URL real recien cuando la aprobacion resulte exitosa.
  var numeroWhatsApp = normalizarTelefonoWhatsApp(currentQuote.ejecutivo_telefono);
  var ventanaWhatsApp = numeroWhatsApp ? window.open('', '_blank') : null;

  try {
    var textoConfirmacion = 'Cliente confirmó la aprobación desde el link público el ' + new Date().toLocaleString('es-CL');
    const { data, error } = await sb.rpc('aprobar_cotizacion_comercial_publica', {
      p_token: currentToken, p_confirmacion: textoConfirmacion
    });
    if (error || !data || data.length === 0) throw (error || new Error('sin datos'));
    var resultado = data[0];
    // El estado que se muestra viene DIRECTO de la respuesta autoritativa
    // del backend, nunca se asume localmente.
    currentQuote = Object.assign({}, currentQuote, { estado: resultado.estado });
    mostrandoConfirmacionAprobacion = false;
    aprobacionExitosa = true;

    if (numeroWhatsApp) {
      whatsappUrlPendiente = 'https://wa.me/' + numeroWhatsApp + '?text=' + encodeURIComponent(construirMensajeWhatsApp(currentQuote));
      if (ventanaWhatsApp && !ventanaWhatsApp.closed) {
        try { ventanaWhatsApp.location.href = whatsappUrlPendiente; whatsappAbierto = true; }
        catch (e) { whatsappAbierto = false; }
      } // si ventanaWhatsApp es null o quedo cerrada, el navegador la bloqueo -- whatsappAbierto queda false
    } else {
      whatsappAvisoSinTelefono = 'Tu ejecutivo no tiene un número configurado. Contáctalo directamente para continuar.';
    }
  } catch (e) {
    // La aprobacion fallo: si se habia pre-abierto una ventana, se
    // cierra -- nunca debe quedar una pestana en blanco sin proposito.
    if (ventanaWhatsApp && !ventanaWhatsApp.closed) { try { ventanaWhatsApp.close(); } catch (e2) {} }
    // Mensaje generico -- nunca se expone el error SQL real (podria ser
    // "posible resolucion concurrente", "no encontrada", etc; el cliente
    // no necesita saber cual).
    aprobacionError = 'No pudimos registrar tu aprobación. Intenta nuevamente o contacta a tu ejecutivo.';
  }
  aprobando = false;
  render(currentQuote);
}

async function confirmarRechazo() {
  if (rechazando || !currentToken) return;
  rechazando = true;
  rechazoError = '';
  whatsappAvisoSinTelefono = '';
  whatsappUrlPendiente = null;
  whatsappAbierto = false;
  render(currentQuote);

  var motivoIngresado = (rechazoMotivoTexto || '').trim();
  // Mismo patron critico de D2.5: la ventana se abre SINCRONAMENTE,
  // dentro del gesto de clic, antes de cualquier await -- para no ser
  // bloqueada por Safari/iOS.
  var numeroWhatsApp = normalizarTelefonoWhatsApp(currentQuote.ejecutivo_telefono);
  var ventanaWhatsApp = numeroWhatsApp ? window.open('', '_blank') : null;

  try {
    const { data, error } = await sb.rpc('rechazar_cotizacion_comercial_publica', {
      p_token: currentToken, p_motivo: motivoIngresado || null
    });
    if (error || !data || data.length === 0) throw (error || new Error('sin datos'));
    var resultado = data[0];
    currentQuote = Object.assign({}, currentQuote, { estado: resultado.estado });
    mostrandoConfirmacionRechazo = false;
    rechazoExitoso = true;

    if (numeroWhatsApp) {
      // El mensaje usa EXACTAMENTE lo que el cliente escribio
      // (motivoIngresado) -- nunca el texto generico de auditoria que
      // el backend guarda cuando el campo llega vacio.
      whatsappUrlPendiente = 'https://wa.me/' + numeroWhatsApp + '?text=' + encodeURIComponent(construirMensajeWhatsAppRechazo(currentQuote, motivoIngresado));
      if (ventanaWhatsApp && !ventanaWhatsApp.closed) {
        try { ventanaWhatsApp.location.href = whatsappUrlPendiente; whatsappAbierto = true; }
        catch (e) { whatsappAbierto = false; }
      }
    } else {
      whatsappAvisoSinTelefono = 'Comunícate con tu ejecutivo para revisar alternativas.';
    }
  } catch (e) {
    if (ventanaWhatsApp && !ventanaWhatsApp.closed) { try { ventanaWhatsApp.close(); } catch (e2) {} }
    rechazoError = 'No pudimos registrar tu decisión. Intenta nuevamente o contacta a tu ejecutivo.';
  }
  rechazando = false;
  render(currentQuote);
}

// Bloque compartido de estado/fallback de WhatsApp -- misma logica para
// aprobacion y rechazo, ya que una cotizacion solo puede resolver por
// UNA de las dos vias (la barrera del backend lo garantiza).
function construirExtraWhatsApp(textoSiAbierto, textoSiNoAbierto, botonSiNoAbierto) {
  if (whatsappUrlPendiente) {
    var textoEstado = whatsappAbierto ? textoSiAbierto : textoSiNoAbierto;
    var textoBoton = whatsappAbierto ? 'Abrir WhatsApp nuevamente' : botonSiNoAbierto;
    return '<div class="sub" style="margin-top:6px;">' + textoEstado + '</div>' +
      '<a href="' + esc(whatsappUrlPendiente) + '" target="_blank" class="btn-primary" style="display:inline-block;text-decoration:none;margin-top:10px;box-sizing:border-box;">' + esc(textoBoton) + '</a>';
  } else if (whatsappAvisoSinTelefono) {
    return '<div class="sub" style="margin-top:6px;">' + esc(whatsappAvisoSinTelefono) + '</div>';
  }
  return '';
}

function construirBloqueAprobacion(q) {
  if (aprobacionExitosa && q.estado === 'aceptada') {
    var extraAprobacion = construirExtraWhatsApp(
      'Se abrió WhatsApp con tu mensaje de confirmación listo para enviar.',
      'Envía la confirmación por WhatsApp a tu ejecutivo para continuar con la facturación.',
      'Enviar confirmación por WhatsApp'
    );
    return '<div class="approve-success">' +
      '<div class="title">✅ ¡Cotización aprobada!</div>' +
      '<div class="sub">Tu pedido fue confirmado correctamente.</div>' +
      extraAprobacion +
    '</div>';
  }
  if (rechazoExitoso && q.estado === 'rechazada') {
    var extraRechazo = construirExtraWhatsApp(
      'Se abrió WhatsApp con tu mensaje listo para enviar.',
      'Comunícate con tu ejecutivo para revisar alternativas.',
      'Enviar mensaje por WhatsApp'
    );
    return '<div class="approve-success">' +
      '<div class="title">❌ Cotización rechazada</div>' +
      '<div class="sub">Hemos registrado tu decisión correctamente.</div>' +
      extraRechazo +
    '</div>';
  }
  if (q.estado !== 'enviada') return '';

  if (mostrandoConfirmacionRechazo) {
    return '<div class="approve-card">' +
      '<div style="font-weight:600;color:var(--ink);margin-bottom:10px;">¿Confirmas que deseas rechazar esta cotización?</div>' +
      '<div style="text-align:left;margin-bottom:12px;">' +
        '<div style="font-size:11px;color:#71717a;margin-bottom:4px;">Motivo del rechazo (opcional)</div>' +
        '<textarea id="txt-motivo-rechazo" maxlength="500" rows="3" placeholder="Cuéntanos brevemente el motivo para que tu ejecutivo pueda ayudarte." style="width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:10px;padding:8px;font-size:13px;font-family:inherit;resize:vertical;" oninput="rechazoMotivoTexto = this.value;">' + esc(rechazoMotivoTexto) + '</textarea>' +
      '</div>' +
      (rechazoError ? '<div class="approve-error">' + esc(rechazoError) + '</div>' : '') +
      '<button type="button" class="btn-primary"' + (rechazando ? ' disabled' : '') + ' onclick="confirmarRechazo()">' +
        (rechazando ? 'Enviando…' : 'Confirmar rechazo') +
      '</button>' +
      '<button type="button" class="btn-secondary"' + (rechazando ? ' disabled' : '') + ' onclick="cancelarRechazo()">Volver</button>' +
    '</div>';
  }

  if (!mostrandoConfirmacionAprobacion) {
    return '<div class="approve-card">' +
      '¿Ya revisaste tu cotización?' +
      '<button type="button" class="btn-primary" onclick="mostrarPanelAprobacion()">✅ Aprobar cotización</button>' +
      '<button type="button" class="btn-secondary" onclick="mostrarPanelRechazo()">Rechazar cotización</button>' +
    '</div>';
  }

  return '<div class="approve-card">' +
    '<label class="checkbox-row">' +
      '<input type="checkbox" id="chk-aprobar"' + (checkboxAprobacionMarcado ? ' checked' : '') + ' onchange="toggleCheckboxAprobacion(this.checked)">' +
      '<span>Confirmo que revisé y apruebo esta cotización</span>' +
    '</label>' +
    (aprobacionError ? '<div class="approve-error">' + esc(aprobacionError) + '</div>' : '') +
    '<button type="button" class="btn-primary"' + ((!checkboxAprobacionMarcado || aprobando) ? ' disabled' : '') + ' onclick="confirmarAprobacion()">' +
      (aprobando ? 'Enviando…' : 'Confirmar aprobación') +
    '</button>' +
    '<button type="button" class="btn-secondary"' + (aprobando ? ' disabled' : '') + ' onclick="cancelarAprobacion()">Cancelar</button>' +
  '</div>';
}

function render(q) {
  currentQuote = q;
  document.getElementById('printBtn').style.display = 'flex';

  var itemsHtml = (q.items || []).map(construirFilaProducto).join('');
  var etiquetaEstado = ETIQUETAS_ESTADO[q.estado] || q.estado;
  var claseEstado = 'estado-' + (q.estado || 'borrador');

  document.getElementById('main').innerHTML =
    '<div class="card">' +
      '<div class="card-head">' +
        '<div><div class="brand-name" style="font-size:20px;">STRAUMANN</div>' +
        '<div class="brand-sub">GROUP CHILE · NEODENT · STRAUMANN</div></div>' +
        '<div style="text-align:right;">' +
          '<div class="qnum-label">Folio</div>' +
          '<div class="qnum">' + esc(q.folio) + '</div>' +
          '<div class="qdate">Emitida: ' + fechaCorta(q.creado_en) + '</div>' +
          (q.vigencia_hasta ? '<div class="qdate">Vigente hasta: ' + fechaCorta(q.vigencia_hasta) + '</div>' : '') +
        '</div>' +
      '</div>' +
      '<span class="estado-badge ' + claseEstado + '">' + esc(etiquetaEstado) + '</span>' +
      '<div class="grid2">' +
        '<div><div class="field-label">Doctor</div><div class="field-value">' + esc(q.doctor_nombre) + '</div></div>' +
        '<div><div class="field-label">RUT</div><div class="field-value">' + esc(q.rut_enmascarado) + '</div></div>' +
        (q.razon_social ? '<div style="grid-column:1/-1;"><div class="field-label">Razón social</div><div class="field-value">' + esc(q.razon_social) + '</div></div>' : '') +
        '<div style="grid-column:1/-1;"><div class="field-label">Ejecutivo Straumann</div><div class="field-value">' + esc(q.ejecutivo_nombre) + '</div></div>' +
      '</div>' +
      '<table><colgroup><col><col class="col-cant"><col class="col-precio"><col class="col-subtotal"></colgroup><thead><tr><th>Producto</th><th class="center">Cant.</th><th class="right">Precio unit.</th><th class="right">Subtotal</th></tr></thead>' +
      '<tbody>' + itemsHtml + '</tbody></table>' +
      '<div class="total-row"><div class="total-box">' +
        '<div class="total-line"><span>Neto antes de descuento</span><span>' + fmt(q.neto_antes_descuento) + '</span></div>' +
        '<div class="total-line"><span>Descuento total</span><span>' + (q.descuento_total > 0 ? '-' + fmt(q.descuento_total) : fmt(0)) + '</span></div>' +
        '<div class="total-line"><span>Neto</span><span>' + fmt(q.subtotal) + '</span></div>' +
        '<div class="total-line"><span>IVA (19%)</span><span>' + fmt(q.iva) + '</span></div>' +
        '<div class="total-line grand"><span class="label">Total</span><span class="value">' + fmt(q.total) + '</span></div>' +
      '</div></div>' +
      '<p class="disclaimer">Cotización comercial referencial de Straumann Group Chile / Manohay Chile SpA. Precios y condiciones sujetos a validación comercial. La disponibilidad de productos está sujeta a stock al momento de confirmar el pedido.</p>' +
    '</div>' +
    construirBloqueAprobacion(q);
}

async function init() {
  var params = new URLSearchParams(window.location.search);
  var token = (params.get('t') || '').trim();

  if (!token) {
    mostrarError();
    return;
  }

  try {
    const { data, error } = await sb.rpc('obtener_cotizacion_comercial_publica', { p_token: token });
    if (error || !data || data.length === 0) {
      mostrarError();
      return;
    }
    currentToken = token;
    render(data[0]);
  } catch (e) {
    mostrarError();
  }
}
init();
</script>
</body>
</html>
