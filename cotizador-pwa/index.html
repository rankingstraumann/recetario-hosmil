<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#991b1b">
<link rel="icon" href="/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cotizador Straumann">
<meta name="mobile-web-app-capable" content="yes">
<title>Cotizador Comercial | Straumann Group Chile</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* FASE C6D.4 -- estilos tomados directamente del patron ya en
     produccion en recetario.html (mismas clases, mismos valores) para
     que el Cotizador se sienta como el mismo producto. Solo se adaptan
     los textos y se quitan clases exclusivamente institucionales
     (privacy-box de paciente, wsp-field, rule-summary, etc.). */
  :root {
    --red: #991b1b; --red-dark: #7f1d1d; --ink: #18181b; --muted: #71717a;
    --border: #e4e4e7; --bg: #f8fafc; --emerald-bg: #ecfdf5; --emerald-text: #047857;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { overscroll-behavior-y: contain; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); overflow-x:hidden; }

  header.topbar { background:#fff; border-bottom:1px solid var(--border); padding:calc(10px + env(safe-area-inset-top)) 20px 10px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20; gap:10px; flex-wrap:wrap; }
  .brand-name { color:var(--red); font-weight:800; font-size:18px; letter-spacing:-0.02em; line-height:1; }
  .brand-sub { color:#a1a1aa; font-size:10px; letter-spacing:0.2em; font-weight:600; margin-top:2px; }
  .topbar-right { font-size:12px; color:#a1a1aa; display:flex; align-items:center; gap:10px; }
  .btn-logout { font-size:12px; color:#71717a; background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px; cursor:pointer; white-space:nowrap; }

  .cc-subtabs { max-width:1180px; margin:14px auto 0; padding:0 16px; display:flex; gap:8px; }
  .cc-subtab { flex:1; max-width:220px; padding:10px; border-radius:10px; border:1px solid var(--border); background:#fff; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; }
  .cc-subtab.active { background:var(--ink); color:#fff; border-color:var(--ink); }

  main.layout { max-width:1180px; margin:0 auto; padding:20px 16px 100px; display:grid; grid-template-columns: 1fr; gap:20px; }
  @media (min-width: 1024px) { main.layout { grid-template-columns: 1fr 360px; } }

  .card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:16px; }
  .card h2 { font-size:14px; font-weight:600; color:#3f3f46; margin:0 0 12px; display:flex; align-items:center; gap:6px; }
  .form-grid { display:grid; grid-template-columns: 1fr; gap:10px; }
  @media (min-width:640px) { .form-grid { grid-template-columns: 1fr 1fr; } }
  .form-grid .span2 { grid-column: 1 / -1; }
  input[type=text], input[type=email], input[type=tel], select {
    width:100%; border:1px solid #d4d4d8; border-radius:8px; padding:9px 11px; font-size:16px; font-family:inherit; color:var(--ink);
  }
  input:focus, select:focus { outline:none; border-color:var(--red); box-shadow:0 0 0 3px rgba(153,27,27,0.12); }
  .cc-inline-err { color:#b91c1c; font-size:11px; margin-top:4px; }
  .cc-hint { font-size:11px; color:#a1a1aa; margin-top:6px; }
  /* FASE D2 -- etiqueta de campo en el detalle interno */
  .field-label-cc { font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:#a1a1aa; margin-bottom:2px; }
  /* FASE D2.3 -- correccion: el resumen de precios NUNCA debe usar
     .form-grid (esa clase pasa a 2 columnas desde 640px, pensada para el
     formulario de cabecera, no para una lista vertical de conceptos).
     Esta clase es siempre de 1 columna, en cualquier ancho. */
  .resumen-precios { display:flex; flex-direction:column; gap:10px; }
  /* FASE D2.1 -- rediseno compacto del detalle interno. Reutiliza los
     mismos tokens de color y el mismo patron de tabla compacta
     (colgroup + table-layout:fixed) ya validado en cotizacion.html. */
  .detalle-cab { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .detalle-grid { display:grid; grid-template-columns: 1fr; gap:10px 16px; }
  @media (min-width:640px) { .detalle-grid { grid-template-columns: repeat(3, 1fr); } }
  .detalle-grid .campo-label { font-size:10px; text-transform:uppercase; letter-spacing:0.04em; color:#a1a1aa; margin-bottom:1px; }
  .detalle-grid .campo-valor { font-size:13px; color:#27272a; font-weight:500; }
  .detalle-tabla-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:8px; }
  /* FASE D2.2 -- toggle responsive puro por CSS: la tabla de 7 columnas
     solo se muestra desde 640px; por debajo se muestra la lista compacta
     movil. Ambas se generan a partir del MISMO array items, sin volver a
     calcular ningun valor -- solo cambia el marcado/presentacion. */
  .detalle-tabla-wrap { display:none; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .detalle-mobile-lista { display:block; }
  @media (min-width:640px) {
    .detalle-tabla-wrap { display:block; }
    .detalle-mobile-lista { display:none; }
  }
  /* Tabla real compacta para movil (<640px): fila principal (codigo,
     producto, cant, desc) + fila secundaria de colspan (lista/neto/
     subtotal), manteniendo sensacion tabular real, no bloques de texto. */
  .detalle-tabla-mobile { width:100%; border-collapse:collapse; table-layout:fixed; font-size:11.5px; }
  .detalle-tabla-mobile th { text-align:left; font-size:9.5px; text-transform:uppercase; color:#a1a1aa; font-weight:600; padding:0 4px 6px 0; border-bottom:1px solid var(--border); }
  .detalle-tabla-mobile .num { text-align:right; }
  .detalle-tabla-mobile tr.fila-principal td { padding:7px 4px 1px 0; border-bottom:none; vertical-align:top; word-break:break-word; font-size:11.5px; color:#27272a; }
  .detalle-tabla-mobile tr.fila-principal td:first-child { font-family:ui-monospace,monospace; font-weight:700; color:var(--ink); white-space:nowrap; }
  .detalle-tabla-mobile tr.fila-secundaria td { padding:0 4px 8px 0; border-bottom:1px solid #f4f4f5; font-size:10.5px; color:#71717a; }
  .detalle-tabla-mobile .cierre-tag-mobile { font-size:9px; font-weight:700; background:#f4f4f5; color:#52525b; border-radius:6px; padding:1px 5px; margin-right:4px; white-space:nowrap; }
  .detalle-tabla-mobile .subtotal-mobile { font-weight:700; color:var(--red); }

  .detalle-tabla { width:100%; border-collapse:collapse; table-layout:fixed; font-size:12.5px; }
  .detalle-tabla th { text-align:left; font-size:10.5px; text-transform:uppercase; color:#a1a1aa; font-weight:600; padding:0 8px 8px 0; border-bottom:1px solid var(--border); }
  .detalle-tabla td { padding:9px 8px 9px 0; border-bottom:1px solid #f4f4f5; vertical-align:top; word-break:break-word; }
  .detalle-tabla .num { text-align:right; }
  .detalle-tabla .cierre-tag { display:inline-block; font-size:9px; font-weight:700; background:#f4f4f5; color:#52525b; border-radius:6px; padding:1px 5px; margin-left:4px; white-space:nowrap; }
  .btn-copiar-codigos { background:none; border:1px solid var(--border); color:var(--ink); font-size:11px; font-weight:600; padding:5px 10px; border-radius:8px; cursor:pointer; white-space:nowrap; }
  .btn-copiar-codigos.copiado { background:#ecfdf5; border-color:#a7f3d0; color:#047857; }
  .cc-collapsible summary { cursor:pointer; font-size:12px; font-weight:600; color:var(--muted); padding:8px 0; list-style:none; }
  .cc-collapsible summary::-webkit-details-marker { display:none; }
  .cc-collapsible summary::before { content:'▸ '; }
  .cc-collapsible[open] summary::before { content:'▾ '; }

  .search-row { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .search-row input { flex:1; min-width:200px; }

  .prod-row { display:flex; flex-direction:column; gap:8px; border:1px solid #f4f4f5; border-radius:10px; padding:10px 12px; margin-bottom:6px; }
  @media (min-width:640px) { .prod-row { flex-direction:row; align-items:center; justify-content:space-between; } }
  .prod-row:hover { border-color:#e4e4e7; background:#fafafa; }
  .prod-code { font-family:ui-monospace,monospace; font-size:11px; color:#a1a1aa; }
  .prod-desc { font-size:14px; color:#27272a; margin-top:2px; }
  .prod-price-row { display:flex; align-items:center; gap:8px; margin-top:4px; }
  .prod-price-new { font-size:14px; font-weight:600; color:var(--red); }
  .dup-tag { font-size:9px; font-weight:700; background:#fef3c7; color:#92400e; border-radius:4px; padding:1px 6px; margin-left:4px; }
  .btn-add { flex-shrink:0; display:flex; align-items:center; justify-content:center; gap:5px; background:#18181b; color:#fff; font-size:12px; font-weight:600; padding:8px 12px; border:none; border-radius:8px; cursor:pointer; width:100%; }
  @media (min-width:640px) { .btn-add { width:auto; } }
  .btn-add:hover { background:var(--red); }
  .btn-add:disabled { opacity:0.5; cursor:not-allowed; }
  .empty-msg { text-align:center; padding:36px 16px; color:#a1a1aa; font-size:13px; }

  aside.cart-aside { align-self:start; }
  @media (min-width:1024px) { aside.cart-aside { position:sticky; top:80px; } }
  .cart-card { background:#fff; border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .cart-head { padding:12px 16px; border-bottom:1px solid #f4f4f5; display:flex; justify-content:space-between; align-items:center; }
  .cart-head h3 { font-size:14px; font-weight:600; margin:0; display:flex; align-items:center; gap:6px; }
  .cart-clear { font-size:11px; color:#a1a1aa; background:none; border:none; cursor:pointer; }
  .cart-items { max-height:34vh; overflow-y:auto; }
  .cart-item { padding:10px 16px; border-bottom:1px solid #f4f4f5; }
  .cart-item-top { display:flex; justify-content:space-between; gap:8px; }
  .cart-item-code { font-family:ui-monospace,monospace; font-size:10px; color:#a1a1aa; }
  .cart-item-desc { font-size:12px; color:#27272a; line-height:1.3; }
  .cart-item-bottom { display:flex; justify-content:space-between; align-items:center; margin-top:6px; gap:8px; }
  .qty-stepper { display:flex; align-items:center; gap:6px; background:#f4f4f5; border-radius:8px; padding:4px 6px; }
  .qty-stepper button { border:none; background:none; cursor:pointer; color:#52525b; font-size:14px; width:18px; }
  .qty-val { font-size:12px; font-weight:600; width:18px; text-align:center; }
  .remove-btn { border:none; background:none; color:#d4d4d8; cursor:pointer; font-size:13px; flex-shrink:0; }
  .cart-foot { padding:14px 16px; border-top:1px solid #f4f4f5; background:#fafafa; }
  .cart-total-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:8px; }
  .cart-total-label { font-size:13px; font-weight:600; color:#3f3f46; }
  .cart-total-value { font-size:18px; font-weight:800; color:var(--red); }
  .btn-primary { width:100%; background:var(--red); color:#fff; border:none; border-radius:8px; padding:11px; font-size:14px; font-weight:600; cursor:pointer; }
  .btn-primary:hover { background:var(--red-dark); }
  .btn-primary:disabled { opacity:0.6; cursor:default; }
  .btn-outline { width:100%; display:flex; align-items:center; justify-content:center; gap:6px; background:#fff; border:1px solid #d4d4d8; color:#3f3f46; font-size:13px; font-weight:600; padding:10px; border-radius:8px; cursor:pointer; }
  .btn-outline:hover { border-color:var(--red); color:var(--red); }
  .msg-error { display:flex; gap:6px; background:#fef2f2; color:#b91c1c; font-size:12px; border-radius:8px; padding:8px 10px; margin-bottom:10px; }

  .floating-cart-btn { display:none; position:fixed; left:16px; right:16px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:30; background:var(--red); color:#fff; border:none; border-radius:12px; padding:14px 16px; align-items:center; justify-content:space-between; font-size:14px; font-weight:600; box-shadow:0 8px 20px rgba(127,29,29,0.25); cursor:pointer; }
  @media (max-width:1023px) { .floating-cart-btn.visible { display:flex; } }

  .compartir-wrap { max-width:560px; margin:0 auto; padding:32px 16px 60px; }
  .ok-circle { width:48px; height:48px; border-radius:999px; background:var(--emerald-bg); display:flex; align-items:center; justify-content:center; margin:0 auto 12px; font-size:22px; }
  .center-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:24px; text-align:center; margin-bottom:16px; }
  .send-buttons { display:flex; flex-direction:column; gap:8px; margin-top:14px; }
  @media (min-width:480px) { .send-buttons { flex-direction:row; } }
  .btn-solid-red { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; background:var(--red); color:#fff; border:none; font-size:14px; font-weight:600; padding:11px; border-radius:8px; cursor:pointer; }
  .btn-solid-red:hover { background:var(--red-dark); }
  .hint { font-size:11px; color:#a1a1aa; margin-top:8px; }

  .login-wrap { max-width:360px; margin:60px auto; background:#fff; border:1px solid var(--border); border-radius:14px; padding:28px; }
  .login-wrap h1 { font-size:18px; margin:0 0 4px; }
  .login-wrap p { font-size:12px; color:#71717a; margin:0 0 18px; }
  .login-wrap input { width:100%; border:1px solid #d4d4d8; border-radius:8px; padding:11px 12px; font-size:15px; margin-bottom:10px; }
  .login-err { background:#fef2f2; color:#b91c1c; font-size:12px; border-radius:8px; padding:8px 10px; margin-bottom:10px; }

  .cc-mis-wrap { max-width:720px; margin:0 auto; padding:20px 16px 60px; }
  .cc-mis-filtros { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .cc-mis-filtros input { flex:1; min-width:200px; }
  .cc-mis-filtros select { flex:1; min-width:140px; }
  /* FASE 4 -- badges de estado, mismos colores y criterio visual que
     cotizacion.html (pagina publica), para consistencia entre ambas
     vistas. El VALOR real de estado en la base de datos nunca cambia --
     esto es unicamente la etiqueta/color mostrados al ejecutivo. */
  .cc-estado-tag { font-size:10px; font-weight:700; border-radius:999px; padding:3px 9px; white-space:nowrap; }
  .cc-estado-tag.estado-borrador { background:#f4f4f5; color:#52525b; }
  .cc-estado-tag.estado-enviada { background:#eff6ff; color:#1d4ed8; }
  .cc-estado-tag.estado-aceptada { background:#ecfdf5; color:#047857; }
  .cc-estado-tag.estado-rechazada { background:#fef2f2; color:#b91c1c; }
  .cc-estado-tag.estado-vencida { background:#fffbeb; color:#92400e; }
  .cc-estado-tag.estado-anulada { background:#f4f4f5; color:#52525b; }
</style>
</head>
<body>

<div id="login-view"></div>
<div id="app-view" style="display:none;"></div>

<script>
// FASE C6D.4 -- Cotizador Comercial, pantalla unica estilo Recetario
// Institucional (sin asistente por pasos). Reutiliza el mismo backend ya
// validado en C3A-C6D.3. Nunca accede directamente a tablas comerciales
// -- solo llama las 5 RPC autorizadas: buscar_productos_comercial,
// listar_modalidades_comerciales, simular_cotizacion_comercial,
// crear_cotizacion_comercial, listar_cotizaciones_comerciales.
const APP_VERSION = '0.8.3-2026-07-19';
console.log('Cotizador Comercial version:', APP_VERSION);

const SUPABASE_URL = 'https://gzimllusbxjorbsbtsse.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6aW1sbHVzYnhqb3Jic2J0c3NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDQ4NDcsImV4cCI6MjA5NzUyMDg0N30.DFq-_PY10hyr2QmMUXk-v8VW2LKYz3bAW37VCutwmzY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let miPerfil = null;
let miUserId = null;
let vistaComercial = 'nueva'; // 'nueva' | 'mis' | 'detalle'
// FASE D2.7 -- busqueda dinamica del catalogo con debounce + proteccion
// contra respuestas antiguas (stale response guard). catalogoBusquedaToken
// se incrementa en CADA disparo real de busqueda (boton, Enter, o
// debounce); si al volver de la red el token capturado ya no coincide
// con el mas reciente, la respuesta se descarta sin tocar el estado.
let catalogoBusquedaTimer = null;
let catalogoBusquedaToken = 0;
// FASE D2 -- detalle interno de cotizacion, exclusivamente para el
// vendedor/Super Admin dentro de la SPA (nunca publico, nunca otra
// pestana). Unica fuente de datos: obtener_detalle_cotizacion_comercial
// (RPC D1, ya validada). El frontend nunca recalcula nada, solo muestra
// exactamente lo que la RPC devuelve, en el orden que la RPC devuelve.
let detalleCotizacionId = null;
let detalleCotizacionData = null;
let detalleCotizacionCargando = false;
let detalleCotizacionError = '';

const ETIQUETAS_FACTURACION_COMERCIAL = {
  pendiente: 'Pendiente',
  enviada_customer_service: 'Enviada a Customer Service',
  facturada: 'Facturada',
  parcialmente_facturada: 'Parcialmente facturada',
  cerrada: 'Cerrada'
};

async function abrirDetalleCotizacion(cotizacionId) {
  vistaComercial = 'detalle';
  detalleCotizacionId = cotizacionId;
  detalleCotizacionData = null;
  detalleCotizacionError = '';
  detalleCotizacionCargando = true;
  renderApp();
  try {
    const { data, error } = await sb.rpc('obtener_detalle_cotizacion_comercial', { p_cotizacion_id: cotizacionId });
    if (error || !data || data.length === 0) throw (error || new Error('sin datos'));
    detalleCotizacionData = data[0];
  } catch (e) {
    // Mensaje generico -- nunca se expone el error SQL real de la RPC
    // (podria ser "No autorizado", "Cotizacion no encontrada", etc; el
    // usuario solo necesita saber que no pudo abrirse).
    detalleCotizacionError = 'No se pudo abrir el detalle de esta cotización. Verifica que tengas acceso o inténtalo nuevamente.';
  }
  detalleCotizacionCargando = false;
  renderApp();
}

function volverAMisCotizaciones() {
  vistaComercial = 'mis';
  detalleCotizacionId = null;
  detalleCotizacionData = null;
  detalleCotizacionError = '';
  // misCotState (filas, filtros, offset) se deja intacto a proposito --
  // asi la lista y sus filtros siguen exactamente donde estaban.
  renderApp();
}

// FASE D2.1 -- diseno compacto. Misma logica de datos que D2 (nada
// recalculado, nada reordenado) -- unicamente cambia como se presenta.
function construirFilaProductoDetalle(it) {
  var esCierre = it.tipo_linea === 'cierre';
  var pct = Math.round((it.porcentaje_aplicado_snapshot || 0) * 100);
  return '<tr>' +
    '<td>' + esc(it.codigo) + (esCierre ? '<span class="cierre-tag">cierre/tapa</span>' : '') + '</td>' +
    '<td>' + esc(it.descripcion) + '</td>' +
    '<td class="num">' + esc(it.cantidad) + '</td>' +
    '<td class="num">' + fmt(it.precio_lista_snapshot) + '</td>' +
    '<td class="num">' + pct + '%</td>' +
    '<td class="num">' + fmt(it.precio_neto_unitario) + '</td>' +
    '<td class="num" style="font-weight:600;">' + fmt(it.subtotal_item) + '</td>' +
  '</tr>';
}

// FASE D2.3 -- tabla real compacta para movil (<640px): fila principal
// (codigo | producto | cant | desc) + fila secundaria con colspan
// (lista/neto/subtotal), manteniendo estructura tabular real, no
// bloques de texto sueltos. Lee exactamente los mismos campos del mismo
// objeto "it" que la version de escritorio -- ningun calculo nuevo.
function construirFilasProductoDetalleMobile(it) {
  var esCierre = it.tipo_linea === 'cierre';
  var pct = Math.round((it.porcentaje_aplicado_snapshot || 0) * 100);
  return '<tr class="fila-principal">' +
    '<td>' + esc(it.codigo) + '</td>' +
    '<td>' + esc(it.descripcion) + '</td>' +
    '<td class="num">' + esc(it.cantidad) + '</td>' +
    '<td class="num">' + pct + '%</td>' +
  '</tr>' +
  '<tr class="fila-secundaria">' +
    '<td colspan="4">' +
      (esCierre ? '<span class="cierre-tag-mobile">cierre/tapa</span>' : '') +
      'Lista ' + fmt(it.precio_lista_snapshot) + ' · Neto ' + fmt(it.precio_neto_unitario) + ' · <span class="subtotal-mobile">Subtotal ' + fmt(it.subtotal_item) + '</span>' +
    '</td>' +
  '</tr>';
}

function campoGrid(label, valor) {
  return '<div><div class="campo-label">' + esc(label) + '</div><div class="campo-valor">' + esc(valor || '—') + '</div></div>';
}

// Copia SOLO los codigos, uno por linea, en el mismo orden ya entregado
// por la RPC (detalleCotizacionData.items) -- nunca se reordena ni se
// consulta el catalogo, solo se usa el campo "codigo" ya presente.
function copiarCodigosDetalle() {
  if (!detalleCotizacionData || !detalleCotizacionData.items) return;
  var texto = detalleCotizacionData.items.map(function (it) { return it.codigo + ' ' + it.cantidad; }).join('\n');
  var btn = document.getElementById('btn-copiar-codigos');
  function marcarCopiado() {
    if (!btn) return;
    var original = 'Copiar códigos';
    btn.textContent = '✓ Códigos copiados';
    btn.classList.add('copiado');
    setTimeout(function () {
      btn.textContent = original;
      btn.classList.remove('copiado');
    }, 1800);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texto).then(marcarCopiado).catch(function () {});
  } else {
    var ta = document.createElement('textarea');
    ta.value = texto; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); marcarCopiado(); } catch (e) {}
    document.body.removeChild(ta);
  }
}

let errorConexion = false;
let errorConexionMsg = '';

function esc(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmt(n) { return '$' + Math.round(n || 0).toLocaleString('es-CL'); }

function interpretarError(e) {
  var msg = (e && (e.message || e.details || '')) || '';
  var low = msg.toLowerCase();
  if (!msg) return 'Ocurrió un error inesperado. Intenta nuevamente.';
  if (low.indexOf('jwt') !== -1 || low.indexOf('refresh_token') !== -1 || low.indexOf('session') !== -1) return 'Tu sesión expiró. Vuelve a iniciar sesión.';
  if (low.indexOf('42501') !== -1 || low.indexOf('no autorizado') !== -1) return 'No tienes permiso para realizar esta acción.';
  if (low.indexOf('modalidad') !== -1) return 'Esta modalidad comercial todavía no está activa. El cálculo real se habilitará cuando se active.';
  if (low.indexOf('pertenece a otro ejecutivo') !== -1) return 'Este RUT ya se encuentra registrado y asociado a otro ejecutivo. Si necesitas gestionar este cliente, contacta al administrador.';
  if (low.indexOf('rut') !== -1) return 'El RUT ingresado no es válido. Revísalo e intenta de nuevo.';
  if (low.indexOf('producto') !== -1 || low.indexOf('precio de lista') !== -1) return 'Uno de los productos seleccionados ya no está disponible. Actualiza la búsqueda.';
  if (low.indexOf('failed to fetch') !== -1 || low.indexOf('networkerror') !== -1 || low.indexOf('load failed') !== -1 || low.indexOf('timeout') !== -1 || low.indexOf('network') !== -1) return 'No se pudo conectar con el servidor. Revisa tu conexión e intenta de nuevo.';
  return msg;
}

function renderLogin(errMsg) {
  document.getElementById('app-view').style.display = 'none';
  const v = document.getElementById('login-view');
  v.style.display = 'block';
  v.innerHTML =
    '<header class="topbar"><div><div class="brand-name">STRAUMANN</div><div class="brand-sub">COTIZADOR COMERCIAL</div></div></header>' +
    (errorConexion ? '<div style="background:#fff3cd;border:1px solid #fde68a;border-radius:10px;padding:14px 18px;margin:16px;text-align:center;font-size:13px;">⚠️ ' + esc(errorConexionMsg || 'No se pudo conectar. Puede deberse a firewall, VPN o red corporativa.') + '<br><button onclick="location.reload()" style="margin-top:8px;padding:7px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;">🔄 Reintentar</button></div>' : '') +
    '<div class="login-wrap">' +
      '<h1>Cotizador Comercial</h1>' +
      '<p>Ingresa con tu correo corporativo</p>' +
      (errMsg ? '<div class="login-err">⚠️ ' + esc(errMsg) + '</div>' : '') +
      '<input type="email" id="li-email" placeholder="Correo" autocomplete="username">' +
      '<input type="password" id="li-pass" placeholder="Contraseña" autocomplete="current-password">' +
      '<button class="btn-primary" id="li-btn">Iniciar sesión</button>' +
      '<p style="font-size:11px;color:var(--muted);margin-top:16px;text-align:center;line-height:1.5;">📲 Puedes instalar este Cotizador en la pantalla de inicio de tu celular.</p>' +
    '</div>';
  document.getElementById('li-btn').addEventListener('click', doLogin);
  document.getElementById('li-pass').addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
}

async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pass = document.getElementById('li-pass').value;
  const btn = document.getElementById('li-btn');
  btn.disabled = true; btn.textContent = 'Ingresando...';
  try {
    const { error } = await sb.auth.signInWithPassword({ email: email, password: pass });
    if (error) {
      const msg = interpretarError(error);
      const esRed = msg.indexOf('conectar') !== -1;
      if (esRed) { errorConexion = true; }
      renderLogin(esRed ? msg : 'Correo o contraseña incorrectos.');
      return;
    }
  } catch (e) {
    errorConexion = true;
    renderLogin(interpretarError(e));
    return;
  }
}

function tieneAccesoComercial() {
  return !!(miPerfil && (miPerfil.es_vendedor || miPerfil.es_super_admin || miPerfil.es_coordinador || miPerfil.es_observador));
}
function esSoloCustomerService() {
  return !!(miPerfil && miPerfil.es_customer_service && !miPerfil.es_vendedor && !miPerfil.es_super_admin && !miPerfil.es_coordinador && !miPerfil.es_observador);
}
function puedeCrearCotizaciones() {
  return !!(miPerfil && (miPerfil.es_vendedor || miPerfil.es_super_admin));
}

async function cargarMiPerfilYEntrar() {
  try {
    const { data: userData } = await sb.auth.getUser();
    if (!userData || !userData.user) { miPerfil = null; renderLogin(); return; }
    miUserId = userData.user.id;
    const { data, error } = await sb.from('admin_perfiles')
      .select('es_super_admin, es_observador, es_vendedor, es_coordinador, es_customer_service, coordinador_id, nombre')
      .eq('user_id', userData.user.id)
      .maybeSingle();
    miPerfil = (!error && data) ? data : null;

      await sb.auth.signOut();
      miPerfil = null;

      return;
    }

  vistaComercial = puedeCrearCotizaciones() ? 'nueva' : 'mis';
  renderApp();
}

// FASE D1.3 -- validacion real de RUT chileno (modulo 11), espejo exacto
// del backend (_normalizar_rut + _rut_valido). Acepta digitos y K/k en
// cualquier posicion de entrada (con puntos, guion, mayuscula/minuscula,
// pegado) -- la limpieza real ocurre en limpiarRutInput(). Esta funcion
// SOLO da feedback visual temprano; el backend sigue siendo autoritativo.
function limpiarRutInput(valor) {
  var v = (valor || '').toUpperCase().replace(/[^0-9K]/g, '');
  // K solo es valida como digito verificador (ultimo caracter). Cualquier
  // K que no sea la ultima se descarta.
  var terminaConK = v.charAt(v.length - 1) === 'K';
  var soloNumeros = v.replace(/K/g, '');
  if (terminaConK) { return soloNumeros.slice(0, 8) + 'K'; }
  return soloNumeros.slice(0, 9);
}

function rutFormatoBasicoValido(rut) {
  var limpio = limpiarRutInput(rut);
  if (limpio.length < 2) return false;
  var cuerpo = limpio.slice(0, -1);
  var dv = limpio.slice(-1);
  if (!/^[0-9]+$/.test(cuerpo) || cuerpo.length < 7 || cuerpo.length > 8) return false;
  var suma = 0, mult = 2;
  for (var i = cuerpo.length - 1; i >= 0; i--) {
    suma += parseInt(cuerpo.charAt(i), 10) * mult;
    mult = (mult === 7) ? 2 : mult + 1;
  }
  var resto = 11 - (suma % 11);
  var dvCalc = (resto === 11) ? '0' : (resto === 10) ? 'K' : String(resto);
  return dvCalc === dv;
}
function cotComClienteValido() {
  var c = cotComState.cliente;
  var completo = rutCompletoCliente();
  return !!(completo && rutFormatoBasicoValido(completo) && c.doctorNombre && c.doctorNombre.trim() !== '');
}

function firmaCotizacion() {
  var c = cotComState.cliente;
  var items = cotComState.carrito.map(function (ci) { return ci.producto_id + ':' + ci.cantidad; }).sort().join('|');
  return JSON.stringify([c.rutCuerpo, c.rutDv, c.tipoCliente, c.doctorNombre, c.razonSocial, c.direccion, c.correo, c.telefono, c.codigoSap, c.observaciones, cotComState.modalidadCodigo, cotComState.biomaterialesDescuentoPct, items]);
}

}

// FASE D1.3 -- navegacion del catalogo comercial por marca/familia, sin
// necesidad de buscar primero (autorizado explicitamente). Usa las 2 RPC
// nuevas de solo lectura: listar_marcas_familias_comerciales y
// listar_productos_comercial_catalogo. buscar_productos_comercial ya no
// se usa desde este frontend (sigue intacta en el backend).
const ETIQUETAS_MARCA_CATALOGO = { Straumann: 'Straumann BLC/BLX', Neodent: 'Neodent', BLT: 'Straumann BLT', Compartida: 'Otras marcas' };
const ORDEN_MARCAS_CATALOGO = ['Straumann', 'Neodent', 'BLT', 'Compartida'];

async function cargarCatalogoMarcasFamilias() {
  cotComState.catalogoCargado = true;
  try {
    const { data, error } = await sb.rpc('listar_marcas_familias_comerciales');
    if (error) throw error;
    var porMarca = {};
    (data || []).forEach(function (fila) {
      if (!porMarca[fila.marca]) porMarca[fila.marca] = { marca: fila.marca, total: 0, familias: [] };
      porMarca[fila.marca].total += fila.cantidad_productos;
      porMarca[fila.marca].familias.push({ familia_id: fila.familia_id, familia: fila.familia, cantidad: fila.cantidad_productos });
    });
    var marcas = Object.keys(porMarca).map(function (m) { return porMarca[m]; });
    marcas.sort(function (a, b) {
      var ia = ORDEN_MARCAS_CATALOGO.indexOf(a.marca); if (ia === -1) ia = 99;
      var ib = ORDEN_MARCAS_CATALOGO.indexOf(b.marca); if (ib === -1) ib = 99;
      return ia - ib || a.marca.localeCompare(b.marca);
    });
    marcas.forEach(function (m) { m.familias.sort(function (a, b) { return a.familia.localeCompare(b.familia); }); });
    cotComState.catalogoMarcas = marcas;
    if (!cotComState.marcaActiva && marcas.length > 0) { cotComState.marcaActiva = marcas[0].marca; }
  } catch (e) {
    cotComState.catalogoMarcas = [];
  }
  cargarProductosCatalogo(true);
}

function seleccionarMarcaCatalogo(marca) {
  cotComState.marcaActiva = marca;
  cotComState.familiaActivaId = null;
  cargarProductosCatalogo(true);
}
function seleccionarFamiliaCatalogo(familiaId) {
  cotComState.familiaActivaId = familiaId || null;
  cargarProductosCatalogo(true);
}

async function cargarProductosCatalogo(reiniciar) {
  // Cancela cualquier debounce pendiente -- si el usuario dispara una
  // busqueda manual (boton/Enter) mientras el debounce del input aun no
  // se ejecuto, esto evita que se dispare una segunda vez despues,
  // reiniciando visualmente la lista sin necesidad (parpadeo).
  if (catalogoBusquedaTimer) { clearTimeout(catalogoBusquedaTimer); catalogoBusquedaTimer = null; }
  if (reiniciar) { cotComState.catalogoOffset = 0; cotComState.productosCatalogo = []; cotComState.catalogoHayMas = true; }
  var miToken = ++catalogoBusquedaToken;
  cotComState.catalogoCargandoProductos = true;
  cotComState.catalogoErrorProductos = '';
  renderApp();
  try {
    // FASE D2.7.1 -- mientras haya texto real de busqueda, se ignora
    // marcaActiva/familiaActivaId en los PARAMETROS enviados a la RPC
    // (nunca se resetean esas variables de estado, solo se dejan de usar
    // temporalmente) para que la busqueda sea global sobre todo el
    // catalogo. Al borrar el texto, ambas vuelven a aplicarse solas.
    var hayBusquedaGlobal = !!(cotComState.busquedaCatalogo && cotComState.busquedaCatalogo.trim());
    const { data, error } = await sb.rpc('listar_productos_comercial_catalogo', {
      p_marca: hayBusquedaGlobal ? null : (cotComState.marcaActiva || null),
      p_familia_id: hayBusquedaGlobal ? null : (cotComState.familiaActivaId || null),
      p_busqueda: cotComState.busquedaCatalogo || null,
      p_limite: 30,
      p_offset: cotComState.catalogoOffset
    });
    if (miToken !== catalogoBusquedaToken) return; // una busqueda mas reciente ya se disparo -- descartar esta respuesta tardia
    if (error) throw error;
    var filas = data || [];
    cotComState.productosCatalogo = cotComState.productosCatalogo.concat(filas);
    cotComState.catalogoHayMas = filas.length === 30;
    cotComState.catalogoOffset += filas.length;
  } catch (e) {
    if (miToken !== catalogoBusquedaToken) return;
    cotComState.productosCatalogo = [];
    cotComState.catalogoErrorProductos = interpretarError(e);
  }
  if (miToken !== catalogoBusquedaToken) return;
  cotComState.catalogoCargandoProductos = false;
  renderApp();
}

// Debounce del input de busqueda -- dispara cargarProductosCatalogo(true)
// 300ms despues de la ultima tecla. El boton "Buscar" y Enter siguen
// funcionando exactamente igual, disparando de inmediato sin esperar.
function cotComOnInputBusquedaCatalogo(valor) {
  cotComState.busquedaCatalogo = valor;
  if (catalogoBusquedaTimer) clearTimeout(catalogoBusquedaTimer);
  catalogoBusquedaTimer = setTimeout(function () { cargarProductosCatalogo(true); }, 300);
}

function cotComAgregarProductoCatalogo(productoId) {
  var p = cotComState.productosCatalogo.find(function (r) { return String(r.producto_id) === String(productoId); });
  if (!p) return;
  var existente = cotComState.carrito.find(function (ci) { return ci.producto_id === p.producto_id; });
  if (existente) {
    existente.cantidad += 1;
  } else {
    cotComState.carrito.push({
      producto_id: p.producto_id, codigo: p.codigo, descripcion: p.descripcion,
      marca: p.marca, familia: p.familia, precio_lista: p.precio_lista, cantidad: 1,
      es_codigo_duplicado: p.es_codigo_duplicado, es_biomateriales: !!p.es_biomateriales
    });
  }
  cotComAjustarDescuentoBiomateriales();
  renderApp();
}
function cotComCambiarCantidad(productoId, delta) {
  var ci = cotComState.carrito.find(function (c) { return c.producto_id === productoId; });
  if (!ci) return;
  ci.cantidad += delta;
  if (ci.cantidad <= 0) { cotComState.carrito = cotComState.carrito.filter(function (c) { return c.producto_id !== productoId; }); }
  cotComAjustarDescuentoBiomateriales();
  renderApp();
}
function cotComQuitarProducto(productoId) {
  cotComState.carrito = cotComState.carrito.filter(function (c) { return c.producto_id !== productoId; });
  cotComAjustarDescuentoBiomateriales();
  renderApp();
}
function vaciarCarritoComercial() {
  cotComState.carrito = [];
  cotComAjustarDescuentoBiomateriales();
  renderApp();
}

// FASE B6 -- descuento independiente de Biomateriales, calculado siempre
// a partir del carrito real (nunca de un valor guardado aparte que
// pudiera desincronizarse). Suma por CANTIDAD, no por numero de SKUs --
// mismo criterio que el backend (_biomateriales_unidades_totales).
function cotComTieneBiomateriales() {
  return cotComState.carrito.some(function (ci) { return ci.es_biomateriales; });
}
function cotComUnidadesBiomateriales() {
  return cotComState.carrito.reduce(function (s, ci) { return s + (ci.es_biomateriales ? ci.cantidad : 0); }, 0);
}
// Se llama despues de CUALQUIER cambio al carrito. Mantiene el selector
// siempre en un estado valido: si ya no hay Biomateriales, resetea a 0%;
// si el 25% ya no cumple el minimo de 5 unidades, baja a 15% y deja un
// aviso breve para el usuario -- nunca deja el frontend en un estado
// que el backend fuera a rechazar.
function cotComAjustarDescuentoBiomateriales() {
  cotComState.biomaterialesAvisoCambio = '';
  if (!cotComTieneBiomateriales()) {
    cotComState.biomaterialesDescuentoPct = 0;
    return;
  }
  if (cotComState.biomaterialesDescuentoPct === 25 && cotComUnidadesBiomateriales() < 5) {
    cotComState.biomaterialesDescuentoPct = 15;
    cotComState.biomaterialesAvisoCambio = 'El 25% en Biomateriales dejó de estar disponible (menos de 5 unidades). Se ajustó a 15%.';
  }
}
function cotComSeleccionarBiomaterialesDescuento(valor) {
  cotComState.biomaterialesDescuentoPct = parseInt(valor, 10) || 0;
  cotComState.biomaterialesAvisoCambio = '';
  renderApp();
}

function cotComParamsRpc() {
  var modalidadReal = cotComState.modalidades.find(function (m) { return m.codigo === cotComState.modalidadCodigo; });
  var c = cotComState.cliente;
  var items = cotComState.carrito.map(function (ci) { return { producto_id: ci.producto_id, cantidad: ci.cantidad }; });
  return {
    modalidadReal: modalidadReal,
    params: {
      p_rut: rutCompletoCliente(), p_tipo_cliente: c.tipoCliente, p_doctor_nombre: c.doctorNombre,
      p_modalidad_id: modalidadReal ? modalidadReal.id : null, p_items: items,
      p_descuento_biomateriales_pct: cotComState.biomaterialesDescuentoPct || 0,
      p_razon_social: c.razonSocial || null, p_direccion: c.direccion || null,
      p_correo: c.correo || null, p_telefono: c.telefono || null,
      p_codigo_sap: c.codigoSap || null, p_observaciones: c.observaciones || null
    }
  };
}

async function intentarSimularCotizacion() {
  if (!cotComState.modalidadCodigo) { cotComState.simulacionError = 'Selecciona el descuento comercial.'; renderApp(); return; }
  if (!cotComClienteValido()) { cotComState.rutTocado = true; cotComState.simulacionError = 'Completa el nombre del doctor y un RUT válido.'; renderApp(); return; }
  if (cotComState.carrito.length === 0) { cotComState.simulacionError = 'Agrega al menos un producto antes de calcular.'; renderApp(); return; }

  cotComState.simulando = true;
  cotComState.simulacion = null;
  cotComState.simulacionError = '';
  renderApp();

  var pr = cotComParamsRpc();
  if (!pr.modalidadReal) {
    cotComState.simulando = false;
    cotComState.simulacionError = 'La modalidad ' + (cotComState.modalidadCodigo || '') + ' todavía no está disponible en el sistema.';
    renderApp();
    return;
  }

  try {
    const { data, error } = await sb.rpc('simular_cotizacion_comercial', pr.params);
    if (error) throw error;
    cotComState.simulacion = data;
    cotComState.firmaSimulada = firmaCotizacion();
  } catch (e) {
    cotComState.simulacion = null;
    cotComState.simulacionError = interpretarError(e);
  }
  cotComState.simulando = false;
  renderApp();
}

async function crearCotizacionReal() {
  if (cotComCreando) return;
  if (!cotComClienteValido()) { cotComState.rutTocado = true; cotComCrearError = 'Completa el nombre del doctor y un RUT válido.'; renderApp(); return; }
  if (!simulacionEstaVigente()) {
    cotComCrearError = 'Los datos cambiaron desde el último cálculo. Vuelve a calcular antes de generar.';
    renderApp();
    return;
  }
  cotComCreando = true;
  cotComCrearError = '';
  renderApp();

  var pr = cotComParamsRpc();
  try {
    const { data, error } = await sb.rpc('crear_cotizacion_comercial', pr.params);
    if (error) throw error;
    cotComState.creada = { folio: data.folio, id: data.id, estadoActual: 'borrador' };
    misCotState.cargado = false;
  } catch (e) {
    cotComCrearError = interpretarError(e);
  }
  cotComCreando = false;
  renderApp();
}

function construirSelectorModalidad() {
  var etiquetas = { COM0: '0%', COM10: '10%', COM25: '25%', COM30: '30%' };

  var optionsHtml = '<option value="">Descuento comercial *</option>' + orden.map(function (codigo) {
    var real = cotComState.modalidades.find(function (m) { return m.codigo === codigo; });

    return '<option value="' + codigo + '"' +

// FASE B6 -- selector independiente de descuento para Biomateriales.
// Solo se muestra si el carrito ya tiene al menos un producto de esa
// familia (dato que ya viene del catalogo via es_biomateriales, Fase B5
// -- nunca se infiere por nombre, marca ni codigo). El 25% se deshabilita
// visualmente por debajo de 5 unidades, pero el backend sigue siendo
// quien realmente lo exige (esto es solo UX).
function construirSelectorBiomateriales() {
  if (!cotComTieneBiomateriales()) return '';
  var unidades = cotComUnidadesBiomateriales();
  var puede25 = unidades >= 5;
  var opciones = [0, 10, 15, 25].map(function (v) {
    var deshabilitado = (v === 25 && !puede25);
    return '<option value="' + v + '"' +
      (cotComState.biomaterialesDescuentoPct === v ? ' selected' : '') +
      (deshabilitado ? ' disabled' : '') +
      '>' + v + '%' + (deshabilitado ? ' (requiere 5+ unidades)' : '') + '</option>';
  }).join('');
  return '<div style="margin-top:10px;padding:10px 12px;background:#f8fafc;border:1px solid var(--border);border-radius:10px;">' +
    '<label style="font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;">🧪 Descuento Biomateriales (independiente del descuento general)</label>' +
    '<select id="cc-select-biomateriales">' + opciones + '</select>' +
    '<div class="cc-hint" style="margin-top:4px;">' +
      (puede25 ? 'Llevas ' + unidades + ' unidad(es) de Biomateriales.' : '25% disponible desde 5 unidades de Biomateriales. Actualmente llevas ' + unidades + '.') +
    '</div>' +
    (cotComState.biomaterialesAvisoCambio ? '<div class="cc-inline-err" style="margin-top:4px;">' + esc(cotComState.biomaterialesAvisoCambio) + '</div>' : '') +
  '</div>';
}

// FASE E3 -- compartir por WhatsApp. Unica fuente de verdad: la RPC
// compartir_cotizacion_comercial (ya creada y probada en la Fase E1). El
// frontend nunca genera ni calcula el token -- solo lo recibe de la RPC
// y lo usa para armar el link y el mensaje. La RPC nunca bloquea por
// estado (solo transiciona borrador->enviada la primera vez; en
// cualquier otro estado devuelve los datos actuales sin modificarlos),
// asi que la decision de CUANDO mostrar el boton es enteramente del
// frontend.
const COTIZACION_PUBLICA_BASE_URL = 'https://cotizador-comercial-straumann.vercel.app/cotizacion.html';

function permiteCompartir(estado) {
  return estado === 'borrador' || estado === 'enviada' || estado === 'aceptada';
}
function textoBotonCompartir(estado) {
  if (estado === 'enviada') return '📤 Reenviar por WhatsApp';
  if (estado === 'aceptada') return '🔗 Compartir link';
  return '📤 Compartir por WhatsApp';
}
function puedeCompartirFila(f) {
  if (!permiteCompartir(f.estado)) return false;
  return !!(miPerfil && (miPerfil.es_super_admin || f.vendedor_id === miUserId));
}

let compartirEnCurso = null; // id de la cotizacion cuyo compartir esta en curso, o null
let compartirError = '';
// FASE D3 -- control simple de ingreso de pedidos. Disponible para
// cualquier cotizacion EXCEPTO las rechazadas por el cliente; la
// validacion real vive en la RPC marcar_cotizacion_ingresada, este
// estado es exclusivamente para UX (evitar doble clic, revertir
// visualmente si falla).
let ingresadoEnCurso = null; // id de la cotizacion cuyo toggle esta en curso, o null
let ingresadoError = '';

// FASE D3 -- marcar/desmarcar "Ingresado". El estado local solo se
// actualiza DESPUES de que la RPC confirme exito -- si falla, el
// checkbox nunca se toco visualmente (porque nunca se cambio de forma
// optimista), asi que "vuelve" a su valor anterior automaticamente.
async function toggleIngresado(cotizacionId, valorActual) {
  if (ingresadoEnCurso) return; // evita doble clic mientras hay una operacion en curso
  ingresadoEnCurso = cotizacionId;
  ingresadoError = '';
  renderApp();
  try {
    const { data, error } = await sb.rpc('marcar_cotizacion_ingresada', {
      p_cotizacion_id: cotizacionId, p_ingresado: !valorActual
    });
    if (error || !data || data.length === 0) throw (error || new Error('sin datos'));
    var resultado = data[0];
    var fila = misCotState.filas.find(function (x) { return x.id === cotizacionId; });
    if (fila) { fila.ingresado = resultado.ingresado; fila.ingresado_en = resultado.ingresado_en; }
  } catch (e) {
    ingresadoError = 'No se pudo actualizar. Intenta nuevamente.';
  }
  ingresadoEnCurso = null;
  renderApp();
}

async function compartirPorWhatsApp(cotizacionId) {
  if (compartirEnCurso) return;
  compartirEnCurso = cotizacionId;
  compartirError = '';
  renderApp();
  try {
    const { data, error } = await sb.rpc('compartir_cotizacion_comercial', { p_cotizacion_id: cotizacionId });
    if (error) throw error;
    var fila = Array.isArray(data) ? data[0] : data;
    if (!fila || !fila.token_publico) throw new Error('Respuesta incompleta');

    var link = COTIZACION_PUBLICA_BASE_URL + '?t=' + fila.token_publico;
    var vigenciaTxt = '';
    if (fila.vigencia_hasta) {
      try { vigenciaTxt = new Date(fila.vigencia_hasta + 'T00:00:00').toLocaleDateString('es-CL'); } catch (e) {}
    }
    var nombreEjecutivo = (miPerfil && miPerfil.nombre) ? miPerfil.nombre : 'Ejecutivo Straumann';
    var mensaje = 'Hola ' + (fila.doctor_nombre || '') + ',\n\n' +
      'Te comparto la cotización comercial de Straumann correspondiente al folio ' + fila.folio + '.\n\n' +
      'Puedes revisar el detalle aquí:\n' + link +
      (vigenciaTxt ? '\n\nVigencia de la cotización: ' + vigenciaTxt : '') +
      '\n\nSaludos,\n' + nombreEjecutivo;

    // Actualizar el estado local si corresponde, para que el boton refleje
    // el nuevo estado sin necesidad de recargar la lista.
    if (cotComState.creada && cotComState.creada.id === cotizacionId) {
      cotComState.creada.estadoActual = fila.estado;
    }
    var filaLocal = misCotState.filas.find(function (x) { return x.id === cotizacionId; });
    if (filaLocal) { filaLocal.estado = fila.estado; }

    window.open('https://wa.me/?text=' + encodeURIComponent(mensaje), '_blank');
  } catch (e) {
    compartirError = 'No se pudo compartir la cotización. Intenta de nuevo.';
  }
  compartirEnCurso = null;
  renderApp();
}

function construirConfirmacionCreacion() {
  var cr = cotComState.creada;
  var estado = (cr && cr.estadoActual) || 'borrador';
  var enCurso = compartirEnCurso === (cr ? cr.id : null);
  return '<div class="compartir-wrap">' +
    '<div class="center-card">' +
      '<div class="ok-circle">✅</div>' +
      '<h2 style="margin:0 0 6px;">Cotización generada correctamente</h2>' +
      '<p style="color:#71717a;font-size:13px;margin:0 0 4px;">Folio</p>' +
      '<p style="font-size:20px;font-weight:800;color:var(--red);margin:0 0 4px;">' + esc(cr ? cr.folio : '') + '</p>' +
      (compartirError ? '<p class="msg-error" style="margin:8px 0 0;">⚠️ ' + esc(compartirError) + '</p>' : '') +
      '<button type="button" class="btn-solid-red" style="width:100%;margin-top:14px;" ' +
        'onclick="compartirPorWhatsApp(\'' + (cr ? cr.id : '') + '\')" ' + (enCurso ? 'disabled' : '') + '>' +
        (enCurso ? 'Abriendo WhatsApp…' : esc(textoBotonCompartir(estado))) +
      '</button>' +
      '<div class="send-buttons" style="margin-top:10px;">' +
        '<button class="btn-outline" onclick="vistaComercial=\'mis\';cargarMisCotizaciones(true);">Ver Mis cotizaciones</button>' +
        '<button class="btn-outline" onclick="reiniciarCotizadorComercial()">Nueva cotización</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderNuevaCotizacion() {
  if (cotComState.creada) { return construirConfirmacionCreacion(); }
  return '<main class="layout">' +
    '<section>' + construirCardDatosCotizacion() + construirCardProductos() + '</section>' +
    construirAsideCarrito() +
  '</main>' + construirBotonFlotanteCarrito();
}

function wireCotizadorComercialInputs() {
  // FASE D1.4 -- RUT en dos campos (cuerpo + DV). Ninguno de los 3
  // listeners de esta seccion (cuerpo, DV, doctor) llama renderApp() en
  // cada tecla -- solo actualizan el estado interno directamente, sin
  // reconstruir el DOM. Esto elimina de raiz cualquier salto de foco o
  // cursor durante la escritura (ya no hace falta ningun mecanismo de
  // "recordar y restaurar el foco" para estos campos, como si hacia
  // falta antes cuando cada tecla disparaba un render completo).
  var rutCuerpoEl = document.getElementById('cc-input-rut-cuerpo');
  if (rutCuerpoEl) {
    rutCuerpoEl.addEventListener('input', function (e) {
      var limpio = e.target.value.replace(/\D/g, '').slice(0, 8);
      e.target.value = limpio;
      cotComState.cliente.rutCuerpo = limpio;
    });
    rutCuerpoEl.addEventListener('blur', function () { cotComState.rutTocado = true; renderApp(); });
    rutCuerpoEl.addEventListener('paste', function (e) {
      var texto = (e.clipboardData || window.clipboardData).getData('text');
      var limpio = limpiarRutInput(texto);
      if (limpio.length >= 2) {
        e.preventDefault();
        cotComState.cliente.rutCuerpo = limpio.slice(0, -1).slice(0, 8);
        cotComState.cliente.rutDv = limpio.slice(-1);
        renderApp();
      }
    });
  }
  var rutDvEl = document.getElementById('cc-input-rut-dv');
  if (rutDvEl) {
    rutDvEl.addEventListener('input', function (e) {
      var v = e.target.value.toUpperCase().replace(/[^0-9K]/g, '').slice(0, 1);
      e.target.value = v;
      cotComState.cliente.rutDv = v;
    });
    rutDvEl.addEventListener('blur', function () { cotComState.rutTocado = true; renderApp(); });
  }
  var doctorEl = document.getElementById('cc-input-doctor');
  if (doctorEl) {
    doctorEl.addEventListener('input', function (e) { cotComState.cliente.doctorNombre = e.target.value; });
  }
  var modalidadEl = document.getElementById('cc-select-modalidad');
  if (modalidadEl) { modalidadEl.addEventListener('change', function (e) { cotComSeleccionarModalidad(e.target.value); }); }
  // FASE B6 -- selector independiente. Nunca toca cotComState.modalidadCodigo.
  var biomaterialesEl = document.getElementById('cc-select-biomateriales');
  if (biomaterialesEl) { biomaterialesEl.addEventListener('change', function (e) { cotComSeleccionarBiomaterialesDescuento(e.target.value); }); }
  [['razon', 'razonSocial'], ['direccion', 'direccion'], ['correo', 'correo'], ['telefono', 'telefono'], ['sap', 'codigoSap'], ['obs', 'observaciones']].forEach(function (par) {
    var el = document.getElementById('cc-input-' + par[0]);
    if (el) el.addEventListener('input', function (e) { cotComState.cliente[par[1]] = e.target.value; });
  });
  var busqCat = document.getElementById('cc-input-busqueda-catalogo');
  if (busqCat) {
    busqCat.addEventListener('input', function (e) { cotComOnInputBusquedaCatalogo(e.target.value); });
    busqCat.addEventListener('keydown', function (e) { if (e.key === 'Enter') { cargarProductosCatalogo(true); } });
  }
  var familiaCatSel = document.getElementById('cc-select-familia-catalogo');
  if (familiaCatSel) familiaCatSel.addEventListener('change', function (e) { seleccionarFamiliaCatalogo(e.target.value); });
}

// ============================================================
// MIS COTIZACIONES
// ============================================================
const MIS_COT_PAGINA = 20;
let misCotState = { cargado: false, cargando: false, error: '', filas: [], filtroBusqueda: '', filtroEstado: '', filtroFacturacion: '', offset: 0, hayMas: true };
let misCotBusquedaFoco = false;

async function cargarMisCotizaciones(reiniciar) {
  if (reiniciar) { misCotState.offset = 0; misCotState.filas = []; misCotState.hayMas = true; }
  misCotState.cargando = true;
  misCotState.error = '';
  renderApp();
  try {
    const { data, error } = await sb.rpc('listar_cotizaciones_comerciales', {
      p_estado_comercial: misCotState.filtroEstado || null,
      p_estado_facturacion: misCotState.filtroFacturacion || null,
      p_fecha_desde: null, p_fecha_hasta: null,
      p_busqueda: misCotState.filtroBusqueda || null,
      p_limite: MIS_COT_PAGINA, p_offset: misCotState.offset
    });
    if (error) throw error;
    var filas = data || [];
    misCotState.filas = misCotState.filas.concat(filas);
    misCotState.hayMas = filas.length === MIS_COT_PAGINA;
    misCotState.offset += filas.length;
    misCotState.cargado = true;
  } catch (e) {
    misCotState.error = interpretarError(e);
  }
  misCotState.cargando = false;
  renderApp();
}

const ESTADOS_COMERCIALES = ['borrador', 'enviada', 'aceptada', 'rechazada', 'vencida', 'anulada'];
const ESTADOS_FACTURACION = ['pendiente', 'enviada_customer_service', 'facturada', 'parcialmente_facturada', 'cerrada'];

// FASE 4 -- mismas etiquetas amigables ya usadas en cotizacion.html
// (pagina publica), para que ambas vistas se sientan consistentes. El
// valor real de "estado" en la base de datos (incluido "aceptada") NUNCA
// cambia -- esto solo afecta el texto mostrado al ejecutivo.
const ETIQUETAS_ESTADO_COMERCIAL = {
  borrador: 'Borrador',
  enviada: 'Pendiente de aprobación',
  aceptada: 'Aprobada',
  rechazada: 'Rechazada',
  vencida: 'Vencida',
  anulada: 'Anulada'
};
function construirBadgeEstadoComercial(estado) {
  var etiqueta = ETIQUETAS_ESTADO_COMERCIAL[estado] || estado;
  return '<span class="cc-estado-tag estado-' + esc(estado) + '">' + esc(etiqueta) + '</span>';
}

function construirMisCotizaciones() {
  var opcionesEstado = '<option value="">Todos los estados</option>' + ESTADOS_COMERCIALES.map(function (e) {
    return '<option value="' + e + '"' + (misCotState.filtroEstado === e ? ' selected' : '') + '>' + e + '</option>';
  }).join('');

  var filtrosHtml =
    '<div class="cc-mis-filtros">' +
      '<input id="mc-input-busqueda" type="text" placeholder="Folio, RUT o doctor..." value="' + esc(misCotState.filtroBusqueda) + '">' +
      '<select id="mc-select-estado">' + opcionesEstado + '</select>' +
      '<button type="button" class="btn-add" style="width:auto;" onclick="cargarMisCotizaciones(true)">Buscar</button>' +
    '</div>';

  var listaHtml;
  if (misCotState.cargando && misCotState.filas.length === 0) {
    listaHtml = '<div class="empty-msg">Cargando...</div>';
  } else if (misCotState.error) {
    listaHtml = '<div class="msg-error">⚠️ ' + esc(misCotState.error) + '</div>';
  } else if (misCotState.filas.length === 0) {
    listaHtml = '<div class="empty-msg">Todavía no hay cotizaciones para mostrar.</div>';
  } else {
    listaHtml = misCotState.filas.map(function (f) {
      var mostrarBoton = puedeCompartirFila(f);
      var enCurso = compartirEnCurso === f.id;
      return '<div class="prod-row" style="align-items:flex-start;">' +
        '<div style="flex:1;">' +
          '<div style="display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:4px;">' +
            '<span class="prod-code" style="font-size:13px;font-weight:700;color:var(--ink);">' + esc(f.folio) + '</span>' +
            construirBadgeEstadoComercial(f.estado) +
          '</div>' +
          '<div class="prod-desc">' + esc(f.doctor_nombre) + '</div>' +
          '<div style="font-size:11px;color:#a1a1aa;margin-top:2px;">' + esc(f.rut) + ' · ' + esc(f.modalidad_codigo) + ' · Facturación: ' + esc(f.estado_facturacion) + '</div>' +
          (f.vigencia_hasta ? '<div style="font-size:11px;color:#a1a1aa;">Vigente hasta: ' + esc(f.vigencia_hasta) + '</div>' : '') +
          (mostrarBoton ? '<button type="button" class="btn-outline" style="margin-top:8px;padding:6px 10px;font-size:11px;width:auto;" ' +
            'onclick="compartirPorWhatsApp(\'' + f.id + '\')" ' + (enCurso ? 'disabled' : '') + '>' +
            (enCurso ? 'Abriendo…' : esc(textoBotonCompartir(f.estado))) + '</button>' : '') +
          (f.estado !== 'rechazada' ?
            '<label style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--ink);' + (ingresadoEnCurso === f.id ? 'opacity:0.6;' : 'cursor:pointer;') + '">' +
              '<input type="checkbox" style="width:auto;margin:0;"' + (f.ingresado ? ' checked' : '') + (ingresadoEnCurso === f.id ? ' disabled' : '') +
              ' onchange="toggleIngresado(\'' + f.id + '\', ' + (f.ingresado ? 'true' : 'false') + ')">' +
              (ingresadoEnCurso === f.id ? 'Actualizando…' : 'Ingresado') +
            '</label>' : '') +
        '</div>' +
        '<div style="text-align:right;">' +
          '<div class="prod-price-new" style="font-size:16px;">' + fmt(f.total) + '</div>' +
          (f.creado_en ? '<div style="font-size:11px;color:#a1a1aa;">' + esc(new Date(f.creado_en).toLocaleDateString('es-CL')) + '</div>' : '') +
          '<button type="button" onclick="abrirDetalleCotizacion(\'' + f.id + '\')" ' +
            'style="margin-top:6px;background:none;border:none;color:var(--red);font-size:11px;font-weight:600;cursor:pointer;padding:2px 0;">Ver detalle →</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  var cargarMasHtml = '';
  if (misCotState.filas.length > 0 && misCotState.cargando) {
    cargarMasHtml = '<div class="empty-msg">Cargando más...</div>';
  } else if (misCotState.hayMas && misCotState.filas.length > 0) {
    cargarMasHtml = '<button type="button" class="btn-outline" style="margin-top:10px;" onclick="cargarMisCotizaciones(false)">Cargar más</button>';
  }

  var alcanceTexto = miPerfil && miPerfil.es_coordinador && !miPerfil.es_vendedor && !miPerfil.es_super_admin
    ? 'Cotizaciones de tu equipo.'
    : (miPerfil && miPerfil.es_observador && !miPerfil.es_vendedor && !miPerfil.es_super_admin ? 'Todas las cotizaciones.' : 'Tus propias cotizaciones.');

  return '<div class="cc-mis-wrap">' +
    '<div class="card">' +
      '<h2>🧾 Mis cotizaciones</h2>' +
      '<p style="font-size:12px;color:var(--muted);margin:0 0 14px;">' + esc(alcanceTexto) + '</p>' +
      (compartirError ? '<div class="msg-error" style="margin-bottom:10px;">⚠️ ' + esc(compartirError) + '</div>' : '') +
      (ingresadoError ? '<div class="msg-error" style="margin-bottom:10px;">⚠️ ' + esc(ingresadoError) + '</div>' : '') +
      filtrosHtml + listaHtml + cargarMasHtml +
    '</div>' +
  '</div>';
}

function wireMisCotizacionesInputs() {
  var b = document.getElementById('mc-input-busqueda');
  if (b) {
    b.addEventListener('input', function (e) { misCotState.filtroBusqueda = e.target.value; misCotBusquedaFoco = true; });
    b.addEventListener('keydown', function (e) { if (e.key === 'Enter') cargarMisCotizaciones(true); });
    if (misCotBusquedaFoco) { b.focus(); var p = b.value.length; try { b.setSelectionRange(p, p); } catch (er) {} }
  }
  var se = document.getElementById('mc-select-estado');
  if (se) se.addEventListener('change', function (e) { misCotState.filtroEstado = e.target.value; cargarMisCotizaciones(true); });
  var sf = document.getElementById('mc-select-facturacion');
  if (sf) sf.addEventListener('change', function (e) { misCotState.filtroFacturacion = e.target.value; cargarMisCotizaciones(true); });
}

// ============================================================
// NAVEGACION Y RENDER PRINCIPAL
// ============================================================
function construirNavComercial() {
  var botones = '';
  if (puedeCrearCotizaciones()) {
    botones += '<button class="cc-subtab' + (vistaComercial === 'nueva' ? ' active' : '') + '" onclick="vistaComercial=\'nueva\';renderApp();">Nueva cotización</button>';
  }
  botones += '<button class="cc-subtab' + (vistaComercial === 'mis' ? ' active' : '') + '" onclick="vistaComercial=\'mis\';cargarMisCotizaciones(true);">Mis cotizaciones</button>';
  return '<div class="cc-subtabs">' + botones + '</div>';
}

function renderApp() {
  document.getElementById('login-view').style.display = 'none';
  const v = document.getElementById('app-view');
  v.style.display = 'block';

  if (!cotComState.modalidadesCargadas) { cargarModalidadesComerciales(); }

  var contenidoHtml;
  var mostrarNav = !esSoloCustomerService();
  if (esSoloCustomerService()) {
    contenidoHtml = '<div class="cc-mis-wrap"><div class="card"><div class="empty-msg">Este Cotizador es para Ejecutivos Comerciales.<br><span style="font-size:11px;">Tu rol de Customer Service gestiona facturación desde el Admin general.</span></div></div></div>';
  } else if (vistaComercial === 'mis') {
    contenidoHtml = construirMisCotizaciones();
  } else if (vistaComercial === 'detalle') {
    contenidoHtml = construirDetalleCotizacion();
  } else if (!puedeCrearCotizaciones()) {
    contenidoHtml = '<div class="cc-mis-wrap"><div class="card"><div class="empty-msg">Tu perfil no tiene el rol de Ejecutivo Comercial habilitado para crear cotizaciones.</div></div></div>';
  } else {
    contenidoHtml = renderNuevaCotizacion();
  }

  v.innerHTML =
    '<header class="topbar">' +
      '<div><div class="brand-name">STRAUMANN</div><div class="brand-sub">COTIZADOR COMERCIAL</div></div>' +
      '<div class="topbar-right"><span>v' + APP_VERSION + '</span><button class="btn-logout" id="btn-logout">Cerrar sesión</button></div>' +
    '</header>' +
    (mostrarNav ? construirNavComercial() : '') +
    contenidoHtml;

  document.getElementById('btn-logout').addEventListener('click', function () { sb.auth.signOut(); });
  wireCotizadorComercialInputs();
  wireMisCotizacionesInputs();
}

  window.addEventListener('load', function () {

  });
}

// AUTENTICACION
// ============================================================
sb.auth.onAuthStateChange(function (event, session) {
  if (session) {
    cargarMiPerfilYEntrar();
  } else {
    miPerfil = null;
    renderLogin();
  }
});

(async function init() {
  try {
    const { data } = await sb.auth.getSession();
    if (data && data.session) {
      await cargarMiPerfilYEntrar();
    } else {
      renderLogin();
    }
  } catch (e) {
    errorConexion = true;
    renderLogin(interpretarError(e));
  }
})();
</script>
